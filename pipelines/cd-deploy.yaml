trigger: none

parameters:
  - name: deploymentMode
    type: string
    displayName: "Deployment Mode"
    default: pod
    values:
      - pod
      - daemonset

  - name: captureMode
    type: string
    displayName: "Capture Mode  (tcpdump = auto-start capture | shell = kubectl exec only)"
    default: tcpdump
    values:
      - tcpdump
      - shell

  - name: nodeName
    type: string
    displayName: "Target Node Name  (pod mode only — leave blank for daemonset)"
    default: " "

  - name: tcpdumpInterface
    type: string
    displayName: "Network Interface"
    default: any
    values:
      - any
      - eth0

  - name: tcpdumpRotateSeconds
    type: number
    displayName: "Rotate .pcap every N seconds  (60 | 300 | 600)"
    default: 300

  - name: tcpdumpFilterHost
    type: string
    displayName: "BPF Host Filter  (e.g. 10.0.0.1 or apigw.example.com) — blank = all traffic"
    default: " "

  - name: tcpdumpFilePrefix
    type: string
    displayName: "Output File Prefix"
    default: capture

  - name: tcpdumpVerbose
    type: boolean
    displayName: "Verbose mode  (print to stdout only, no .pcap file written)"
    default: false

stages:
  - stage: Deploy
    displayName: Deploy NetProbe
    jobs:
      - job: DeployNetProbe
        displayName: Deploy NetProbe to AKS
        pool:
          name: rnd-thevindu-vmss
        steps:
          - checkout: none

          - bash: |
              set -euo pipefail

              LOCAL_BIN="$HOME/.local/bin"
              mkdir -p "$LOCAL_BIN"
              export PATH="$LOCAL_BIN:$PATH"
              echo "##vso[task.prependpath]$LOCAL_BIN"

              if ! command -v kubectl &>/dev/null; then
                echo "Installing kubectl..."
                KVER="$(curl -fsSL https://dl.k8s.io/release/stable.txt)"
                curl -fsSLo "$LOCAL_BIN/kubectl" \
                  "https://dl.k8s.io/release/${KVER}/bin/linux/amd64/kubectl"
                chmod +x "$LOCAL_BIN/kubectl"
              fi
              kubectl version --client

              if ! command -v helm &>/dev/null; then
                echo "Installing helm..."
                curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 \
                  | USE_SUDO=false HELM_INSTALL_DIR="$LOCAL_BIN" bash
              fi
              helm version --short

              if ! command -v az &>/dev/null; then
                echo "Installing azure-cli..."
                if command -v apt-get &>/dev/null && sudo -n true 2>/dev/null; then
                  curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
                else
                  if ! python3 -m venv --help &>/dev/null; then
                    echo "ERROR: python3-venv is not available and sudo install failed." >&2
                    exit 1
                  fi
                  python3 -m venv "$HOME/.azure-cli-venv"
                  "$HOME/.azure-cli-venv/bin/pip" install --upgrade pip --quiet
                  "$HOME/.azure-cli-venv/bin/pip" install azure-cli --quiet
                  ln -sf "$HOME/.azure-cli-venv/bin/az" "$LOCAL_BIN/az"
                fi
              fi
              az version --output table
            displayName: Install kubectl, Helm, and Azure CLI

          - task: AzureCLI@2
            displayName: Fetch Storage Account Key
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                KEY=$(az storage account keys list \
                  --resource-group "$(STORAGE_RESOURCE_GROUP)" \
                  --account-name "$(STORAGE_ACCOUNT_NAME)" \
                  --query "[0].value" -o tsv)
                echo "##vso[task.setvariable variable=storageAccountKey;issecret=true]$KEY"

          - bash: |
              cat > "$(Agent.TempDirectory)/storage-secret.yaml" <<EOF
              apiVersion: v1
              kind: Secret
              metadata:
                name: azure-storage-account-credentials-secret
                namespace: $(NAMESPACE)
              stringData:
                azurestorageaccountname: "$(STORAGE_ACCOUNT_NAME)"
                azurestorageaccountkey: "$(storageAccountKey)"
              EOF
            displayName: Generate Storage Secret Manifest

          - task: Kubernetes@1
            displayName: Apply Storage Credentials to Cluster
            inputs:
              connectionType: 'Kubernetes Service Connection'
              kubernetesServiceEndpoint: $(AKS_SERVICE_CONNECTION)
              namespace: $(NAMESPACE)
              command: apply
              useConfigurationFile: true
              configuration: $(Agent.TempDirectory)/storage-secret.yaml
              outputFormat: ''

          - script: |
              FILTER_HOST="${{ parameters.tcpdumpFilterHost }}"
              FILTER_HOST="${FILTER_HOST// /}"
              NODE_NAME="${{ parameters.nodeName }}"
              NODE_NAME="${NODE_NAME// /}"
              OVERRIDES=(
                "deploymentMode=${{ parameters.deploymentMode }}"
                "captureMode=${{ parameters.captureMode }}"
                "pod.name=netprobe"
                "azureFileShare.shareName=$(SHARE_NAME)"
                "image.registry=$(IMAGE_REGISTRY)"
                "image.digest=$(IMAGE_DIGEST)"
                "tcpdump.interface=${{ parameters.tcpdumpInterface }}"
                "tcpdump.rotateSeconds=${{ parameters.tcpdumpRotateSeconds }}"
                "tcpdump.filterHost=${FILTER_HOST}"
                "tcpdump.filePrefix=${{ parameters.tcpdumpFilePrefix }}"
                "tcpdump.verbose=${{ parameters.tcpdumpVerbose }}"
              )

              if [ -n "${NODE_NAME}" ]; then
                OVERRIDES+=("pod.nodeName=${NODE_NAME}")
              fi

              OVERRIDE_STR=$(IFS=,; echo "${OVERRIDES[*]}")
              echo "##vso[task.setvariable variable=helmOverrides]$OVERRIDE_STR"
              echo "Helm overrides: $OVERRIDE_STR"
            displayName: Resolve Helm Override Values

          - bash: |
              wget -q -O "$(Agent.TempDirectory)/netprobe.tgz" \
                "https://github.com/thev1ndu/netprobe-helm/releases/download/netprobe-0.1.0/netprobe-0.1.0.tgz"
            displayName: Download NetProbe Helm Chart

          - task: HelmDeploy@0
            displayName: Deploy NetProbe Chart to AKS
            inputs:
              connectionType: 'Kubernetes Service Connection'
              kubernetesServiceConnection: $(AKS_SERVICE_CONNECTION)
              namespace: $(NAMESPACE)
              command: upgrade
              chartType: FilePath
              chartPath: $(Agent.TempDirectory)/netprobe.tgz
              releaseName: netprobe
              overrideValues: $(helmOverrides)
              arguments: '--timeout 180s --atomic --create-namespace'

          - task: Kubernetes@1
            displayName: Verify NetProbe Pod Status
            inputs:
              connectionType: 'Kubernetes Service Connection'
              kubernetesServiceEndpoint: $(AKS_SERVICE_CONNECTION)
              namespace: $(NAMESPACE)
              command: get
              arguments: 'pods -l app.kubernetes.io/name=netprobe -o wide'
              outputFormat: ''
