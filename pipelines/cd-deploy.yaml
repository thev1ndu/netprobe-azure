trigger: none

parameters:
  - name: aksServiceConnection
    type: string
    displayName: "AKS Service Connection"
    default: rnd-aks-thevindu

  - name: azureServiceConnection
    type: string
    displayName: "Azure Resource Manager Service Connection"
    default: thevindu-rnd-sc

  - name: storageResourceGroup
    type: string
    displayName: "Storage Resource Group"
    default: rg-thevindu

  - name: storageAccountName
    type: string
    displayName: "Storage Account Name"
    default: sa18436

  - name: namespace
    type: string
    displayName: "Kubernetes Namespace"
    default: kube-system

  - name: deploymentMode
    type: string
    displayName: "Deployment Mode"
    default: pod
    values:
      - pod
      - daemonset

  - name: captureMode
    type: string
    displayName: "Capture Mode  (tcpdump = auto-start capture | shell = kubectl exec only)"
    default: tcpdump
    values:
      - tcpdump
      - shell

  - name: nodeName
    type: string
    displayName: "Target Node Name  (pod mode only — leave blank to let scheduler pick)"
    default: ""

  - name: imageRegistry
    type: string
    displayName: "Container Registry  (e.g. acrrrrrrrr.azurecr.io)"
    default: ""

  - name: imageDigest
    type: string
    displayName: "Image Digest  (sha256:... — leave blank to use the digest baked into the chart)"
    default: ""

  - name: shareName
    type: string
    displayName: "Azure File Share Name"
    default: fileshare

  - name: tcpdumpInterface
    type: string
    displayName: "Network Interface"
    default: any
    values:
      - any
      - eth0

  - name: tcpdumpRotateSeconds
    type: number
    displayName: "Rotate .pcap every N seconds  (60 | 300 | 600)"
    default: 300

  - name: tcpdumpFilterHost
    type: string
    displayName: "BPF Host Filter  (e.g. 10.0.0.1 or apigw.example.com) — blank = all traffic"
    default: " "

  - name: tcpdumpFilePrefix
    type: string
    displayName: "Output File Prefix"
    default: capture

  - name: tcpdumpVerbose
    type: boolean
    displayName: "Verbose mode  (print to stdout only, no .pcap file written)"
    default: false

stages:
  - stage: Deploy
    displayName: Deploy NetProbe
    jobs:
      - job: DeployNetProbe
        displayName: helm upgrade --install netprobe
        pool:
          name: rnd-thevindu-vmss
        steps:
          - checkout: none

          - bash: |
              set -euo pipefail

              LOCAL_BIN="$HOME/.local/bin"
              mkdir -p "$LOCAL_BIN"
              # Make tools available BOTH in this step (export) and in later steps (prependpath).
              export PATH="$LOCAL_BIN:$PATH"
              echo "##vso[task.prependpath]$LOCAL_BIN"

              # ----- kubectl -----
              if ! command -v kubectl &>/dev/null; then
                echo "Installing kubectl..."
                KVER="$(curl -fsSL https://dl.k8s.io/release/stable.txt)"
                curl -fsSLo "$LOCAL_BIN/kubectl" \
                  "https://dl.k8s.io/release/${KVER}/bin/linux/amd64/kubectl"
                chmod +x "$LOCAL_BIN/kubectl"
              fi
              kubectl version --client

              # ----- helm -----
              if ! command -v helm &>/dev/null; then
                echo "Installing helm..."
                curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 \
                  | USE_SUDO=false HELM_INSTALL_DIR="$LOCAL_BIN" bash
              fi
              helm version --short

              # ----- azure-cli -----
              if ! command -v az &>/dev/null; then
                echo "Installing azure-cli..."
                if command -v apt-get &>/dev/null && sudo -n true 2>/dev/null; then
                  # Preferred on Debian/Ubuntu when passwordless sudo is available.
                  curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
                else
                  # Fallback: isolated venv. Avoids PEP 668 "externally-managed-environment"
                  # and needs no sudo / no system package pollution.
                  if ! python3 -m venv --help &>/dev/null; then
                    echo "ERROR: python3-venv is not available and sudo install failed." >&2
                    exit 1
                  fi
                  python3 -m venv "$HOME/.azure-cli-venv"
                  "$HOME/.azure-cli-venv/bin/pip" install --upgrade pip --quiet
                  "$HOME/.azure-cli-venv/bin/pip" install azure-cli --quiet
                  ln -sf "$HOME/.azure-cli-venv/bin/az" "$LOCAL_BIN/az"
                fi
              fi
              az version --output table
            displayName: Install tools (kubectl, helm, azure-cli)

          - task: AzureCLI@2
            displayName: Fetch storage account key
            inputs:
              azureSubscription: ${{ parameters.azureServiceConnection }}
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                KEY=$(az storage account keys list \
                  --resource-group "${{ parameters.storageResourceGroup }}" \
                  --account-name "${{ parameters.storageAccountName }}" \
                  --query "[0].value" -o tsv)
                echo "##vso[task.setvariable variable=storageAccountKey;issecret=true]$KEY"

          - bash: |
              cat > "$(Agent.TempDirectory)/storage-secret.yaml" <<EOF
              apiVersion: v1
              kind: Secret
              metadata:
                name: azure-storage-account-credentials-secret
                namespace: ${{ parameters.namespace }}
              stringData:
                azurestorageaccountname: "${{ parameters.storageAccountName }}"
                azurestorageaccountkey: "$(storageAccountKey)"
              EOF
            displayName: Write storage secret manifest

          - task: Kubernetes@1
            displayName: Upsert storage secret
            inputs:
              connectionType: 'Kubernetes Service Connection'
              kubernetesServiceEndpoint: ${{ parameters.aksServiceConnection }}
              namespace: ${{ parameters.namespace }}
              command: apply
              useConfigurationFile: true
              configuration: $(Agent.TempDirectory)/storage-secret.yaml
              outputFormat: ''

          - script: |
              FILTER_HOST="${{ parameters.tcpdumpFilterHost }}"
              FILTER_HOST="${FILTER_HOST// /}"
              OVERRIDES=(
                "deploymentMode=${{ parameters.deploymentMode }}"
                "captureMode=${{ parameters.captureMode }}"
                "pod.name=netprobe"
                "azureFileShare.shareName=${{ parameters.shareName }}"
                "tcpdump.interface=${{ parameters.tcpdumpInterface }}"
                "tcpdump.rotateSeconds=${{ parameters.tcpdumpRotateSeconds }}"
                "tcpdump.filterHost=${FILTER_HOST}"
                "tcpdump.filePrefix=${{ parameters.tcpdumpFilePrefix }}"
                "tcpdump.verbose=${{ parameters.tcpdumpVerbose }}"
              )

              if [ -n "${{ parameters.nodeName }}" ]; then
                OVERRIDES+=("pod.nodeName=${{ parameters.nodeName }}")
              fi

              if [ -n "${{ parameters.imageRegistry }}" ]; then
                OVERRIDES+=("image.registry=${{ parameters.imageRegistry }}")
              fi

              if [ -n "${{ parameters.imageDigest }}" ]; then
                OVERRIDES+=("image.digest=${{ parameters.imageDigest }}")
              fi

              OVERRIDE_STR=$(IFS=,; echo "${OVERRIDES[*]}")
              echo "##vso[task.setvariable variable=helmOverrides]$OVERRIDE_STR"
              echo "Helm overrides: $OVERRIDE_STR"
            displayName: Build helm overrides

          - bash: |
              wget -q -O "$(Agent.TempDirectory)/netprobe.tgz" \
                "https://github.com/thev1ndu/netprobe-helm/releases/download/netprobe-0.1.0/netprobe-0.1.0.tgz"
            displayName: Download netprobe chart

          - task: HelmDeploy@0
            displayName: Helm upgrade --install
            inputs:
              connectionType: 'Kubernetes Service Connection'
              kubernetesServiceConnection: ${{ parameters.aksServiceConnection }}
              namespace: ${{ parameters.namespace }}
              command: upgrade
              chartType: FilePath
              chartPath: $(Agent.TempDirectory)/netprobe.tgz
              releaseName: netprobe
              overrideValues: $(helmOverrides)
              arguments: '--timeout 300s --atomic --create-namespace'

          - task: Kubernetes@1
            displayName: Show pod status
            inputs:
              connectionType: 'Kubernetes Service Connection'
              kubernetesServiceEndpoint: ${{ parameters.aksServiceConnection }}
              namespace: ${{ parameters.namespace }}
              command: get
              arguments: 'pods -l app.kubernetes.io/name=netprobe -o wide'
              outputFormat: ''