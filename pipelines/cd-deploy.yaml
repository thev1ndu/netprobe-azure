trigger: none

parameters:
  - name: azureServiceConnection
    type: string
    displayName: "Azure Resource Manager Service Connection"

  - name: aksResourceGroup
    type: string
    displayName: "AKS Resource Group  (must contain the storage account)"

  - name: vmssName
    type: string
    displayName: "Jumpbox VMSS Name"

  - name: vmssResourceGroup
    type: string
    displayName: "Jumpbox VMSS Resource Group  (leave blank to use AKS Resource Group)"
    default: ""

  - name: vmssInstanceId
    type: string
    displayName: "VMSS Instance ID  (0 for the first instance)"
    default: "0"

  - name: storageAccountName
    type: string
    displayName: "Storage Account Name"

  - name: namespace
    type: string
    displayName: "Kubernetes Namespace"
    default: kube-system

  - name: deploymentMode
    type: string
    displayName: "Deployment Mode"
    default: pod
    values:
      - pod
      - daemonset

  - name: captureMode
    type: string
    displayName: "Capture Mode  (tcpdump = auto-start capture | shell = kubectl exec only)"
    default: tcpdump
    values:
      - tcpdump
      - shell

  - name: releaseName
    type: string
    displayName: "Helm Release Name  (also used as the Pod name in pod mode)"
    default: netprobe

  - name: nodeName
    type: string
    displayName: "Target Node Name  (pod mode only — leave blank to let scheduler pick)"
    default: ""

  - name: imageRegistry
    type: string
    displayName: "Container Registry  (e.g. myacr.azurecr.io)"
    default: ""

  - name: imageDigest
    type: string
    displayName: "Image Digest  (sha256:... — leave blank to use the digest baked into the chart)"
    default: ""

  - name: shareName
    type: string
    displayName: "Azure File Share Name"
    default: fileshare

  - name: tcpdumpInterface
    type: string
    displayName: "Network Interface"
    default: any
    values:
      - any
      - eth0

  - name: tcpdumpRotateSeconds
    type: number
    displayName: "Rotate .pcap every N seconds  (60 | 300 | 600)"
    default: 300

  - name: tcpdumpFilterHost
    type: string
    displayName: "BPF Host Filter  (e.g. 10.0.0.1 or apigw.example.com) — blank = all traffic"
    default: " "

  - name: tcpdumpFilePrefix
    type: string
    displayName: "Output File Prefix"
    default: capture

  - name: tcpdumpVerbose
    type: boolean
    displayName: "Verbose mode  (print to stdout only, no .pcap file written)"
    default: false

stages:
  - stage: Deploy
    displayName: Deploy NetProbe
    jobs:
      - job: DeployNetProbe
        displayName: helm upgrade --install netprobe
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: none

          - task: AzureCLI@2
            displayName: Fetch storage account key
            inputs:
              azureSubscription: ${{ parameters.azureServiceConnection }}
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                KEY=$(az storage account keys list \
                  --resource-group "${{ parameters.aksResourceGroup }}" \
                  --account-name "${{ parameters.storageAccountName }}" \
                  --query "[0].value" -o tsv)
                echo "##vso[task.setvariable variable=storageAccountKey;issecret=true]$KEY"

          - script: |
              FILTER_HOST="${{ parameters.tcpdumpFilterHost }}"
              FILTER_HOST="${FILTER_HOST// /}"
              OVERRIDES=(
                "deploymentMode=${{ parameters.deploymentMode }}"
                "captureMode=${{ parameters.captureMode }}"
                "pod.name=${{ parameters.releaseName }}"
                "azureFileShare.shareName=${{ parameters.shareName }}"
                "tcpdump.interface=${{ parameters.tcpdumpInterface }}"
                "tcpdump.rotateSeconds=${{ parameters.tcpdumpRotateSeconds }}"
                "tcpdump.filterHost=${FILTER_HOST}"
                "tcpdump.filePrefix=${{ parameters.tcpdumpFilePrefix }}"
                "tcpdump.verbose=${{ parameters.tcpdumpVerbose }}"
              )

              if [ -n "${{ parameters.nodeName }}" ]; then
                OVERRIDES+=("pod.nodeName=${{ parameters.nodeName }}")
              fi

              if [ -n "${{ parameters.imageRegistry }}" ]; then
                OVERRIDES+=("image.registry=${{ parameters.imageRegistry }}")
              fi

              if [ -n "${{ parameters.imageDigest }}" ]; then
                OVERRIDES+=("image.digest=${{ parameters.imageDigest }}")
              fi

              OVERRIDE_STR=$(IFS=,; echo "${OVERRIDES[*]}")
              echo "##vso[task.setvariable variable=helmOverrides]$OVERRIDE_STR"
              echo "Helm overrides: $OVERRIDE_STR"
            displayName: Build helm overrides

          - task: AzureCLI@2
            displayName: Upsert storage secret
            inputs:
              azureSubscription: ${{ parameters.azureServiceConnection }}
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                VMSS_RG="${{ parameters.vmssResourceGroup }}"
                [ -z "$VMSS_RG" ] && VMSS_RG="${{ parameters.aksResourceGroup }}"

                REMOTE_SCRIPT=$(cat <<'SCRIPT'
                trap 'echo "##exit:$?"' EXIT
                set -euo pipefail
                SANAME="$1"
                SAKEY="$2"
                NS="$3"
                kubectl create secret generic azure-storage-account-credentials-secret \
                  --namespace "$NS" \
                  --from-literal=azurestorageaccountname="$SANAME" \
                  --from-literal=azurestorageaccountkey="$SAKEY" \
                  --dry-run=client -o yaml | kubectl apply -f -
                SCRIPT
                )

                OUTPUT=$(az vmss run-command invoke \
                  --resource-group "$VMSS_RG" \
                  --name "${{ parameters.vmssName }}" \
                  --instance-id "${{ parameters.vmssInstanceId }}" \
                  --command-id RunShellScript \
                  --scripts "$REMOTE_SCRIPT" \
                  --parameters "${{ parameters.storageAccountName }}" "$(storageAccountKey)" "${{ parameters.namespace }}" \
                  --output json)

                echo "$OUTPUT" | python3 -c "
                import sys, json
                data = json.load(sys.stdin)
                msg = data['value'][0]['message']
                print(msg)
                exit_code = 0
                for line in msg.split('\n'):
                    if '##exit:' in line:
                        try: exit_code = int(line.split('##exit:')[1].strip())
                        except: pass
                sys.exit(exit_code)
                "

          - task: AzureCLI@2
            displayName: Helm upgrade --install
            inputs:
              azureSubscription: ${{ parameters.azureServiceConnection }}
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                VMSS_RG="${{ parameters.vmssResourceGroup }}"
                [ -z "$VMSS_RG" ] && VMSS_RG="${{ parameters.aksResourceGroup }}"

                CHART_URL="https://github.com/thev1ndu/netprobe-helm/releases/download/netprobe-0.1.0/netprobe-0.1.0.tgz"

                REMOTE_SCRIPT="trap 'echo ##exit:\$?' EXIT
                set -euo pipefail
                wget -q -O /tmp/netprobe-0.1.0.tgz \"${CHART_URL}\"
                helm upgrade --install \"${{ parameters.releaseName }}\" /tmp/netprobe-0.1.0.tgz \
                  --namespace \"${{ parameters.namespace }}\" \
                  --set \"$(helmOverrides)\" \
                  --timeout 120s --rollback-on-failure --wait
                rm /tmp/netprobe-0.1.0.tgz"

                OUTPUT=$(az vmss run-command invoke \
                  --resource-group "$VMSS_RG" \
                  --name "${{ parameters.vmssName }}" \
                  --instance-id "${{ parameters.vmssInstanceId }}" \
                  --command-id RunShellScript \
                  --scripts "$REMOTE_SCRIPT" \
                  --output json)

                echo "$OUTPUT" | python3 -c "
                import sys, json
                data = json.load(sys.stdin)
                msg = data['value'][0]['message']
                print(msg)
                exit_code = 0
                for line in msg.split('\n'):
                    if '##exit:' in line:
                        try: exit_code = int(line.split('##exit:')[1].strip())
                        except: pass
                sys.exit(exit_code)
                "

          - task: AzureCLI@2
            displayName: Show pod status
            inputs:
              azureSubscription: ${{ parameters.azureServiceConnection }}
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                VMSS_RG="${{ parameters.vmssResourceGroup }}"
                [ -z "$VMSS_RG" ] && VMSS_RG="${{ parameters.aksResourceGroup }}"

                OUTPUT=$(az vmss run-command invoke \
                  --resource-group "$VMSS_RG" \
                  --name "${{ parameters.vmssName }}" \
                  --instance-id "${{ parameters.vmssInstanceId }}" \
                  --command-id RunShellScript \
                  --scripts "kubectl get pods -l app.kubernetes.io/name=netprobe -n ${{ parameters.namespace }} -o wide" \
                  --output json)

                echo "$OUTPUT" | python3 -c "
                import sys, json
                data = json.load(sys.stdin)
                print(data['value'][0]['message'])
                "
