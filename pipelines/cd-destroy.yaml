trigger: none

parameters:
  - name: azureServiceConnection
    type: string
    displayName: "Azure Resource Manager Service Connection"
    default: thevindu-rnd-sc

  - name: vmssResourceGroup
    type: string
    displayName: "VMSS Resource Group"
    default: rg-thevindu

  - name: vmssName
    type: string
    displayName: "VMSS Name"
    default: is-vmss

  - name: vmssInstanceId
    type: string
    displayName: "VMSS Instance ID"
    default: "0"

  - name: namespace
    type: string
    displayName: "Kubernetes Namespace"
    default: kube-system

stages:
  - stage: Destroy
    displayName: Destroy NetProbe
    jobs:
      - job: DestroyNetProbe
        displayName: helm uninstall netprobe
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: none

          - task: AzureCLI@2
            displayName: Helm uninstall
            inputs:
              azureSubscription: ${{ parameters.azureServiceConnection }}
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                OUTPUT=$(az vmss run-command invoke \
                  --resource-group "${{ parameters.vmssResourceGroup }}" \
                  --name "${{ parameters.vmssName }}" \
                  --instance-id "${{ parameters.vmssInstanceId }}" \
                  --command-id RunShellScript \
                  --scripts "helm uninstall netprobe --namespace ${{ parameters.namespace }} 2>&1 || true" \
                  --output json)

                echo "$OUTPUT" | python3 -c "
                import sys, json
                data = json.load(sys.stdin)
                print(data['value'][0]['message'])
                "

          - task: AzureCLI@2
            displayName: Confirm resources removed
            inputs:
              azureSubscription: ${{ parameters.azureServiceConnection }}
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                OUTPUT=$(az vmss run-command invoke \
                  --resource-group "${{ parameters.vmssResourceGroup }}" \
                  --name "${{ parameters.vmssName }}" \
                  --instance-id "${{ parameters.vmssInstanceId }}" \
                  --command-id RunShellScript \
                  --scripts "kubectl get pods,daemonsets -l app.kubernetes.io/name=netprobe -n ${{ parameters.namespace }} --ignore-not-found" \
                  --output json)

                echo "$OUTPUT" | python3 -c "
                import sys, json
                data = json.load(sys.stdin)
                print(data['value'][0]['message'])
                "
