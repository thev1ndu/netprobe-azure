trigger: none

parameters:
  - name: kubernetesServiceConnection
    type: string
    displayName: "Kubernetes Service Connection"
    default: rnd-aks-thevindu

  - name: namespace
    type: string
    displayName: "Kubernetes Namespace"
    default: kube-system

stages:
  - stage: Destroy
    displayName: Destroy NetProbe
    jobs:
      - job: DestroyNetProbe
        displayName: helm uninstall netprobe
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: none

          - task: HelmDeploy@0
            displayName: Helm uninstall
            inputs:
              connectionType: Kubernetes Service Connection
              kubernetesServiceEndpoint: ${{ parameters.kubernetesServiceConnection }}
              namespace: ${{ parameters.namespace }}
              command: delete
              releaseName: netprobe

          # Succeeds whether the resource was a Pod or DaemonSet;
          # exits 0 if already gone (--ignore-not-found).
          - task: Kubernetes@1
            displayName: Confirm resources removed
            inputs:
              connectionType: Kubernetes Service Connection
              kubernetesServiceEndpoint: ${{ parameters.kubernetesServiceConnection }}
              namespace: ${{ parameters.namespace }}
              command: get
              arguments: pods,daemonsets -l app.kubernetes.io/name=netprobe --ignore-not-found
