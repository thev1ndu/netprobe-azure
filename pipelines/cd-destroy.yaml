trigger: none

parameters:
  - name: azureServiceConnection
    type: string
    displayName: "Azure Resource Manager Service Connection"

  - name: vmssName
    type: string
    displayName: "Jumpbox VMSS Name"

  - name: vmssResourceGroup
    type: string
    displayName: "Jumpbox VMSS Resource Group"

  - name: vmssInstanceId
    type: string
    displayName: "VMSS Instance ID  (0 for the first instance)"
    default: "0"

  - name: releaseName
    type: string
    displayName: "Helm Release Name to uninstall  (the value used at deploy time)"

  - name: namespace
    type: string
    displayName: "Kubernetes Namespace"
    default: kube-system

stages:
  - stage: Destroy
    displayName: Destroy NetProbe
    jobs:
      - job: DestroyNetProbe
        displayName: helm uninstall netprobe
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: none

          - task: AzureCLI@2
            displayName: Helm uninstall
            inputs:
              azureSubscription: ${{ parameters.azureServiceConnection }}
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                REMOTE_SCRIPT="trap 'echo ##exit:\$?' EXIT
                set -euo pipefail
                helm uninstall \"${{ parameters.releaseName }}\" \
                  --namespace \"${{ parameters.namespace }}\" \
                  --wait --timeout 60s"

                OUTPUT=$(az vmss run-command invoke \
                  --resource-group "${{ parameters.vmssResourceGroup }}" \
                  --name "${{ parameters.vmssName }}" \
                  --instance-id "${{ parameters.vmssInstanceId }}" \
                  --command-id RunShellScript \
                  --scripts "$REMOTE_SCRIPT" \
                  --output json)

                echo "$OUTPUT" | python3 -c "
                import sys, json
                data = json.load(sys.stdin)
                msg = data['value'][0]['message']
                print(msg)
                exit_code = 0
                for line in msg.split('\n'):
                    if '##exit:' in line:
                        try: exit_code = int(line.split('##exit:')[1].strip())
                        except: pass
                sys.exit(exit_code)
                "

          # Succeeds whether the resource was a Pod or DaemonSet;
          # exits 0 if already gone (--ignore-not-found).
          - task: AzureCLI@2
            displayName: Confirm resources removed
            inputs:
              azureSubscription: ${{ parameters.azureServiceConnection }}
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                OUTPUT=$(az vmss run-command invoke \
                  --resource-group "${{ parameters.vmssResourceGroup }}" \
                  --name "${{ parameters.vmssName }}" \
                  --instance-id "${{ parameters.vmssInstanceId }}" \
                  --command-id RunShellScript \
                  --scripts "kubectl get pods,daemonsets \
                    -l app.kubernetes.io/name=netprobe \
                    -n ${{ parameters.namespace }} \
                    --ignore-not-found" \
                  --output json)

                echo "$OUTPUT" | python3 -c "
                import sys, json
                data = json.load(sys.stdin)
                print(data['value'][0]['message'])
                "
