trigger: none

parameters:
  - name: aksServiceConnection
    type: string
    displayName: "AKS Service Connection"
    default: rnd-aks-thevindu

  - name: namespace
    type: string
    displayName: "Kubernetes Namespace"
    default: kube-system

stages:
  - stage: Destroy
    displayName: Destroy NetProbe
    jobs:
      - job: DestroyNetProbe
        displayName: helm uninstall netprobe
        pool:
          name: rnd-thevindu-vmss
        steps:
          - checkout: none

          - bash: |
              curl -sLO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
              sudo install kubectl /usr/local/bin/ && rm kubectl
              curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
              curl -sL https://aka.ms/InstallAzureCLIDeb | bash
            displayName: Install tools (kubectl, helm, azure-cli)

          - task: HelmDeploy@0
            displayName: Helm uninstall
            continueOnError: true
            inputs:
              connectionType: 'Kubernetes Service Connection'
              kubernetesServiceConnection: ${{ parameters.aksServiceConnection }}
              namespace: ${{ parameters.namespace }}
              command: uninstall
              arguments: netprobe

          - task: Kubernetes@1
            displayName: Confirm resources removed
            inputs:
              connectionType: 'Kubernetes Service Connection'
              kubernetesServiceEndpoint: ${{ parameters.aksServiceConnection }}
              namespace: ${{ parameters.namespace }}
              command: get
              arguments: 'pods,daemonsets -l app.kubernetes.io/name=netprobe --ignore-not-found'
              outputFormat: ''
