trigger: none

parameters:
  - name: aksServiceConnection
    type: string
    displayName: "AKS Service Connection"
    default: rnd-aks-thevindu

  - name: namespace
    type: string
    displayName: "Kubernetes Namespace"
    default: kube-system

stages:
  - stage: Destroy
    displayName: Destroy NetProbe
    jobs:
      - job: DestroyNetProbe
        displayName: helm uninstall netprobe
        pool:
          name: rnd-thevindu-vmss
        steps:
          - checkout: none

          - bash: |
              set -euo pipefail
              LOCAL_BIN="$HOME/.local/bin"
              mkdir -p "$LOCAL_BIN"
              echo "##vso[task.prependpath]$LOCAL_BIN"

              if ! command -v kubectl &>/dev/null; then
                curl -sLO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
                chmod +x kubectl && mv kubectl "$LOCAL_BIN/"
              fi
              kubectl version --client

              if ! command -v helm &>/dev/null; then
                curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 \
                  | USE_SUDO=false HELM_INSTALL_DIR="$LOCAL_BIN" bash
              fi
              helm version --short

              if ! command -v az &>/dev/null; then
                pip3 install --user azure-cli --quiet
              fi
              az version --output table
            displayName: Install tools (kubectl, helm, azure-cli)

          - task: HelmDeploy@0
            displayName: Helm uninstall
            continueOnError: true
            inputs:
              connectionType: 'Kubernetes Service Connection'
              kubernetesServiceConnection: ${{ parameters.aksServiceConnection }}
              namespace: ${{ parameters.namespace }}
              command: uninstall
              arguments: netprobe

          - task: Kubernetes@1
            displayName: Confirm resources removed
            inputs:
              connectionType: 'Kubernetes Service Connection'
              kubernetesServiceEndpoint: ${{ parameters.aksServiceConnection }}
              namespace: ${{ parameters.namespace }}
              command: get
              arguments: 'pods,daemonsets -l app.kubernetes.io/name=netprobe --ignore-not-found'
              outputFormat: ''
