trigger: none

schedules:
  - cron: "0 2 * * 1"
    displayName: Weekly pre-flight (Mon 02:00 UTC)
    branches: { include: [ main ] }
    always: true

parameters:
  - name: lookbackDays              # log/metric query window
    type: number
    default: 7
  - name: certExpiryWarningDays     # flag certs expiring within N days
    type: number
    default: 30
  - name: sqlStorageWarnPercent     # flag SQL DBs over N% full
    type: number
    default: 75
  - name: errorCountDailyThreshold  # flag if any day's IS errors exceed N
    type: number
    default: 5000
  - name: apiLatencyThresholdSeconds # flag endpoints slower than N seconds
    type: number
    default: 1.0
  - name: costIncreasePercentThreshold # flag WoW cost increase over N%
    type: number
    default: 20

# ── Target environment (single env = clear & flat). To add more, copy this
#    block into a matrix or loop later; the per-step logic stays the same. ──
variables:
  reportFile:           $(Build.ArtifactStagingDirectory)/preflight-report.md
  subscriptionId:       '38785beb-5019-4896-8679-3d41ddacc4b1'
  resourceGroup:        'rg-thevindu'
  workspaceId:          'e5d406b5-f761-48a7-9466-9d0d4a768f01'
  sqlServer:            ''                      # empty = skip SQL check
  aksServiceConnection: 'rnd-aks-thevindu'

stages:
  - stage: PreFlight
    displayName: Asgardeo Pre-Flight Check
    jobs:
      - job: RunChecks
        timeoutInMinutes: 60
        pool: { name: $(AGENT_POOL) }
        steps:
          - checkout: none

          # ── STEP 0 — THE FIX: make sure az + jq exist on the agent ────────
          - bash: |
              set -euo pipefail
              command -v az >/dev/null 2>&1 || curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
              command -v jq >/dev/null 2>&1 || { sudo apt-get update -qq && sudo apt-get install -y jq; }
              az version
            displayName: 0. Install Azure CLI + jq

          # ── STEP 1 — start the report file ────────────────────────────────
          - bash: |
              set -euo pipefail
              {
                echo "# Asgardeo Pre-Flight Check — $(date -u '+%Y-%m-%d %H:%M UTC')"
                echo
                echo "_Look-back ${{ parameters.lookbackDays }}d. Anomalies = WARNING, rest informational._"
              } > "$(reportFile)"
            displayName: 1. Init report

          # ── STEP 2 — Log ingestion volume (KQL: Usage_CL) ─────────────────
          - task: AzureCLI@2
            displayName: 2. Log ingestion volume
            continueOnError: true
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -uo pipefail
                az account set -s $(subscriptionId)
                DATA=$(az monitor log-analytics query -w $(workspaceId) --timespan P${{ parameters.lookbackDays }}D -o json \
                  --analytics-query 'Usage_CL | summarize GB=sum(Quantity_d/1000.) by bin(TimeGenerated,1d)' || echo '[]')
                PEAK=$(echo "$DATA" | jq -r '[.[].GB|tonumber]|max // 0')
                AVG=$(echo "$DATA"  | jq -r 'if length==0 then 0 else ([.[].GB|tonumber]|add)/length end')
                printf -- "- Log ingestion: peak %.2f GB/day, avg %.2f GB/day\n" "$PEAK" "$AVG" >> "$(reportFile)"
                awk -v p="$PEAK" -v a="$AVG" 'BEGIN{exit (a>0 && p>2*a)?0:1}' \
                  && echo "  - WARNING: peak day >2x the average — investigate." >> "$(reportFile)" || true

          # ── STEP 3 — Frontdoor traffic by day ─────────────────────────────
          - task: AzureCLI@2
            displayName: 3. Frontdoor traffic
            continueOnError: true
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -uo pipefail
                az account set -s $(subscriptionId)
                DATA=$(az monitor log-analytics query -w $(workspaceId) --timespan P${{ parameters.lookbackDays }}D -o json \
                  --analytics-query 'FrontdoorAccessLog_CL | summarize Requests=count() by bin(TimeGenerated,1d)' || echo '[]')
                PEAK=$(echo "$DATA" | jq -r '[.[].Requests|tonumber]|max // 0')
                echo "- Frontdoor traffic: peak ${PEAK} requests/day" >> "$(reportFile)"

          # ── STEP 4 — IS error count by day ────────────────────────────────
          - task: AzureCLI@2
            displayName: 4. IS error count
            continueOnError: true
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -uo pipefail
                az account set -s $(subscriptionId)
                DATA=$(az monitor log-analytics query -w $(workspaceId) --timespan P${{ parameters.lookbackDays }}D -o json \
                  --analytics-query 'ContainerLog_CL
                    | join kind=inner (KubePodInventory_CL | project ContainerID_s, PodName=Name_s | distinct *) on ContainerID_s
                    | where LogEntry_s has_cs ": ERROR"
                    | summarize Count=count() by bin(TimeGenerated,1d)' || echo '[]')
                PEAK=$(echo "$DATA" | jq -r '[.[].Count|tonumber]|max // 0')
                echo "- Error count: peak ${PEAK} errors/day" >> "$(reportFile)"
                awk -v p="$PEAK" -v t="${{ parameters.errorCountDailyThreshold }}" 'BEGIN{exit (p>t)?0:1}' \
                  && echo "  - WARNING: daily error count exceeded ${{ parameters.errorCountDailyThreshold }}." >> "$(reportFile)" || true

          # ── STEP 5 — Top error tenants (noisy IAM errors filtered out) ────
          - task: AzureCLI@2
            displayName: 5. Top error tenants
            continueOnError: true
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -uo pipefail
                az account set -s $(subscriptionId)
                DATA=$(az monitor log-analytics query -w $(workspaceId) --timespan P${{ parameters.lookbackDays }}D -o json \
                  --analytics-query 'ContainerLog_CL
                    | join kind=inner (KubePodInventory_CL | project ContainerID_s, PodName=Name_s
                        | where PodName contains "wso2is-deployment" | distinct *) on ContainerID_s
                    | where LogEntry_s has_cs "ERROR" and LogEntry_s matches regex ".*iam-cloud-.* : ERROR {.*} .*"
                    | where LogEntry_s !contains "Error when setting claim"
                    | where LogEntry_s !contains "Error occurred while getting database type from DB connection"
                    | where LogEntry_s !contains "This password has been used in recent history"
                    | where LogEntry_s !contains "JSON Web Token is issued before the allowed time"
                    | parse LogEntry_s with * "Tenant: [" TenantName "]" *
                    | where isnotempty(TenantName)
                    | summarize LogCount=count() by TenantName
                    | top 5 by LogCount desc' || echo '[]')
                SUMMARY=$(echo "$DATA" | jq -r '[.[]|"\(.TenantName)=\(.LogCount)"]|join(", ")')
                [ -n "$SUMMARY" ] && echo "- Top error tenants: ${SUMMARY}" >> "$(reportFile)" || true

          # ── STEP 6 — API latency (avg per endpoint) ───────────────────────
          #    NOTE: assumes the Front Door latency column is `timeTaken_d`.
          #    If your log uses a different field, change it on the line below.
          - task: AzureCLI@2
            displayName: 6. API latency
            continueOnError: true
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -uo pipefail
                az account set -s $(subscriptionId)
                DATA=$(az monitor log-analytics query -w $(workspaceId) --timespan P${{ parameters.lookbackDays }}D -o json \
                  --analytics-query 'FrontdoorAccessLog_CL
                    | extend Path = extract(@"https?://[^/]+(/[^?]*)", 1, tostring(requestUri_s))
                    | where isnotempty(Path)
                    | summarize AvgLatency=avg(timeTaken_d) by Path
                    | top 10 by AvgLatency desc' || echo '[]')
                SLOW=$(echo "$DATA" | jq -r --argjson t "${{ parameters.apiLatencyThresholdSeconds }}" \
                  '[.[]|select((.AvgLatency|tonumber) > $t)|"\(.Path)=\(.AvgLatency|tonumber|.*100|round/100)s"]|join(", ")')
                if [ -n "$SLOW" ]; then
                  echo "- WARNING: endpoints over ${{ parameters.apiLatencyThresholdSeconds }}s avg latency: ${SLOW}" >> "$(reportFile)"
                else
                  echo "- API latency: all endpoints under ${{ parameters.apiLatencyThresholdSeconds }}s avg." >> "$(reportFile)"
                fi

          # ── STEP 7 — SQL DB storage growth ────────────────────────────────
          - task: AzureCLI@2
            displayName: 7. SQL DB storage
            continueOnError: true
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -uo pipefail
                az account set -s $(subscriptionId)
                if [ -z "$(sqlServer)" ]; then
                  echo "- SQL: not configured — skipped." >> "$(reportFile)"; exit 0
                fi
                for DB in $(az sql db list -g $(resourceGroup) -s $(sqlServer) --query "[?name!='master'].name" -o tsv); do
                  USAGE=$(az sql db list-usages -g $(resourceGroup) -s $(sqlServer) -n "$DB" -o json)
                  USED=$(echo "$USAGE" | jq -r '.[]|select(.name=="database_size")|.currentValue')
                  MAX=$(echo  "$USAGE" | jq -r '.[]|select(.name=="database_size")|.limit')
                  [ -z "$MAX" ] || [ "$MAX" = "0" ] && { echo "- DB ${DB}: usage unavailable" >> "$(reportFile)"; continue; }
                  read -r GB PCT <<<"$(awk -v u="$USED" -v m="$MAX" 'BEGIN{printf "%.2f %.1f", m/(1024^3), u/m*100}')"
                  if awk -v p="$PCT" -v w="${{ parameters.sqlStorageWarnPercent }}" 'BEGIN{exit (p<w)?0:1}'; then
                    echo "- DB ${DB}: ${GB} GB max, ${PCT}% used — SAFE" >> "$(reportFile)"
                  else
                    echo "- WARNING: DB ${DB}: ${GB} GB max, ${PCT}% used (>= ${{ parameters.sqlStorageWarnPercent }}%)" >> "$(reportFile)"
                  fi
                done

          # ── STEP 8 — Archival storage size (daily UsedCapacity metric) ────
          - task: AzureCLI@2
            displayName: 8. Archival storage size
            continueOnError: true
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -uo pipefail
                az account set -s $(subscriptionId)
                # UsedCapacity emits ~once/day with lag, so query 2 days and take the last non-null sample.
                START=$(date -u -d "2 days ago" +%Y-%m-%dT%H:%MZ)
                for ID in $(az storage account list -g $(resourceGroup) --query "[].id" -o tsv); do
                  BYTES=$(az monitor metrics list --resource "$ID" --metric UsedCapacity --aggregation Average \
                    --start-time "$START" --interval PT1H \
                    --query "value[0].timeseries[0].data[?average!=null].average | [-1]" -o tsv 2>/dev/null || echo "")
                  [ -n "$BYTES" ] && [ "$BYTES" != "None" ] \
                    && echo "- Archival ${ID##*/}: $(awk -v b="$BYTES" 'BEGIN{printf "%.2f",b/1073741824}') GiB used" >> "$(reportFile)" || true
                done

          # ── STEP 9 — Key Vault certificate expiry ─────────────────────────
          - task: AzureCLI@2
            displayName: 9. Certificate expiry
            continueOnError: true
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -uo pipefail
                az account set -s $(subscriptionId)
                NOW=$(date -u +%s)
                for VAULT in $(az keyvault list --query "[].name" -o tsv); do
                  az keyvault certificate list --vault-name "$VAULT" \
                    --query "[].{name:name,exp:attributes.expires}" -o json | jq -c '.[]' | while read -r C; do
                    NAME=$(echo "$C" | jq -r '.name'); EXP=$(echo "$C" | jq -r '.exp')
                    [ "$EXP" = "null" ] && continue
                    EXP_EPOCH=$(date -u -d "$EXP" +%s 2>/dev/null || echo 0); [ "$EXP_EPOCH" = "0" ] && continue
                    DAYS=$(( (EXP_EPOCH - NOW) / 86400 ))
                    if [ "$DAYS" -lt 0 ]; then
                      echo "- WARNING: EXPIRED cert ${VAULT}/${NAME} ($(( -DAYS ))d ago)" >> "$(reportFile)"
                    elif [ "$DAYS" -lt "${{ parameters.certExpiryWarningDays }}" ]; then
                      echo "- WARNING: cert ${VAULT}/${NAME} expires in ${DAYS}d" >> "$(reportFile)"
                    fi
                  done
                done

          # ── STEP 10 — Weekly cost (this week vs prior week) ───────────────
          - task: AzureCLI@2
            displayName: 10. Weekly cost
            continueOnError: true
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -uo pipefail
                az account set -s $(subscriptionId)
                THIS_END=$(date -u -d "yesterday"   +%F);  THIS_START=$(date -u -d "8 days ago"  +%F)
                PRIOR_END=$(date -u -d "9 days ago"  +%F);  PRIOR_START=$(date -u -d "15 days ago" +%F)
                # az rest avoids the deprecated 'costmanagement' CLI extension.
                cost() { az rest --method POST \
                  --url "https://management.azure.com/subscriptions/$(subscriptionId)/providers/Microsoft.CostManagement/query?api-version=2023-11-01" \
                  --body "{\"type\":\"ActualCost\",\"timeframe\":\"Custom\",\"timePeriod\":{\"from\":\"$1\",\"to\":\"$2\"},\"dataset\":{\"granularity\":\"None\",\"aggregation\":{\"totalCost\":{\"name\":\"Cost\",\"function\":\"Sum\"}}}}" \
                  --query "properties.rows[0][0]" -o tsv; }
                THIS=$(cost "$THIS_START" "$THIS_END"); PRIOR=$(cost "$PRIOR_START" "$PRIOR_END")
                if [ -z "$THIS" ] || [ -z "$PRIOR" ]; then
                  echo "- WARNING: cost query returned no data." >> "$(reportFile)"
                else
                  printf -- "- Cost: this week \$%.2f | prior \$%.2f\n" "$THIS" "$PRIOR" >> "$(reportFile)"
                  awk -v c="$THIS" -v p="$PRIOR" -v t="${{ parameters.costIncreasePercentThreshold }}" \
                    'BEGIN{exit (p>0 && (c-p)/p*100>t)?0:1}' \
                    && printf -- "  - WARNING: cost up %.1f%% week-over-week.\n" "$(awk -v c="$THIS" -v p="$PRIOR" 'BEGIN{print (c-p)/p*100}')" >> "$(reportFile)" || true
                fi

          # ── STEP 11 — Defender secure score ───────────────────────────────
          - task: AzureCLI@2
            displayName: 11. Secure score
            continueOnError: true
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -uo pipefail
                az account set -s $(subscriptionId)
                PCT=$(az security secure-scores show --name ascScore -o json 2>/dev/null | jq -r '.score.percentage // empty')
                if [ -n "$PCT" ]; then
                  echo "- Secure score: $(awk -v p="$PCT" 'BEGIN{printf "%.0f",p*100}')%" >> "$(reportFile)"
                else
                  echo "- Secure score: unavailable (Defender plan / permissions)." >> "$(reportFile)"
                fi

          # ── STEP 12 — AKS pods + node metrics ─────────────────────────────
          - task: Kubernetes@1
            displayName: 12a. AKS login
            continueOnError: true
            inputs:
              connectionType: Kubernetes Service Connection
              kubernetesServiceEndpoint: $(aksServiceConnection)
              command: login
          - bash: |
              set -uo pipefail
              echo -e "\n## AKS" >> "$(reportFile)"
              BAD=$(kubectl get pods -A --no-headers 2>/dev/null | grep -Ev 'Running|Completed' || true)
              if [ -n "$BAD" ]; then
                echo "- WARNING: pods not Running/Completed:" >> "$(reportFile)"
                printf '```\n%s\n```\n' "$BAD" >> "$(reportFile)"
              else
                echo "- All pods Running/Completed." >> "$(reportFile)"
              fi
              NODES=$(kubectl top nodes --no-headers 2>/dev/null || true)   # cols: NAME CPU CPU% MEM MEM%
              if [ -n "$NODES" ]; then
                echo "$NODES" | awk 'NF{printf "- Node %s CPU:%s mem:%s\n",$1,$3,$5}' >> "$(reportFile)"
              else
                echo "- WARNING: kubectl top nodes returned no data (metrics-server down?)." >> "$(reportFile)"
              fi
            displayName: 12b. AKS pod/node check
            continueOnError: true

          # ── STEP 13 — print, publish, upload, notify (always run) ─────────
          - bash: cat "$(reportFile)"
            displayName: 13. Print report
            condition: always()

          - publish: $(reportFile)
            artifact: preflight-report
            displayName: 14. Publish artifact
            condition: always()

          - task: AzureCLI@2
            displayName: 15. Upload to Azure Files (sa18436)
            condition: always()
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                [ -f "$(reportFile)" ] || { echo "No report — nothing to upload."; exit 0; }
                KEY=$(az storage account keys list --account-name sa18436 -g $(resourceGroup) --query "[0].value" -o tsv)
                az storage file upload --account-name sa18436 --account-key "$KEY" \
                  --share-name fileshare --source "$(reportFile)" \
                  --path "dumps/preflight-report-$(date -u '+%Y-%m-%d-%H%M').md"

          - bash: |
              set -uo pipefail
              [ -z "${GCHAT_WEBHOOK_URL:-}" ] && { echo "No webhook — skipping."; exit 0; }
              WARN=$(grep "WARNING:" "$(reportFile)" | sed -E 's/^\s*-?\s*WARNING:\s*//' || true)
              COUNT=$(printf '%s\n' "$WARN" | grep -c . || true)
              if [ "$COUNT" -eq 0 ]; then
                SECTION=$(jq -n '{header:"Status",widgets:[{decoratedText:{startIcon:{materialIcon:{name:"check_circle"}},text:"<b>No anomalies this week.</b>"}}]}')
                SUB="No anomalies"
              else
                SECTION=$(printf '%s' "$WARN" | jq -R -s --arg c "$COUNT" \
                  '{header:("Anomalies ("+$c+")"),widgets:(split("\n")|map(select(length>0))[:30]|map({decoratedText:{startIcon:{materialIcon:{name:"warning"}},text:.}}))}')
                SUB="$COUNT anomaly(ies)"
              fi
              PAYLOAD=$(jq -n --arg sub "$SUB" --arg ts "$(date -u '+%Y-%m-%d %H:%M UTC')" \
                --arg url "$(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)" \
                --argjson sec "$SECTION" \
                '{cardsV2:[{cardId:"asgardeo-preflight",card:{header:{title:"Asgardeo Preflight Check",subtitle:($ts+"  |  "+$sub)},
                  sections:[$sec,{widgets:[{buttonList:{buttons:[{text:"Open pipeline run",onClick:{openLink:{url:$url}}}]}}]}]}}]}')
              curl -sS -H "Content-Type: application/json" -d "$PAYLOAD" "$GCHAT_WEBHOOK_URL" >/dev/null \
                && echo "Posted card ($COUNT anomalies)."
            displayName: 16. Notify Google Chat
            condition: always()
            env:
              GCHAT_WEBHOOK_URL: $(GCHAT_WEBHOOK_URL)