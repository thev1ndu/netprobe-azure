trigger: none

schedules:
  - cron: "0 2 * * 1"
    displayName: Weekly pre-flight (Mon 02:00 UTC)
    branches: { include: [ main ] }
    always: true

parameters:
  - name: lookbackDays
    type: number
    default: 7
  - name: certExpiryWarningDays
    type: number
    default: 30
  - name: sqlStorageWarnPercent
    type: number
    default: 75
  - name: errorCountDailyThreshold
    type: number
    default: 1000
  - name: apiLatencyThresholdSeconds
    type: number
    default: 1.0
  - name: costIncreasePercentThreshold
    type: number
    default: 25
  - name: agentPool
    type: string
    default: rnd-thevindu-vmss

variables:
  AZURE_SERVICE_CONNECTION: thevindu-rnd-sc
  workDir:              $(Build.ArtifactStagingDirectory)/checks     # one CSV per check
  warnings:             $(Build.ArtifactStagingDirectory)/warnings.txt
  lib:                  $(Build.ArtifactStagingDirectory)/lib.sh     # shared bash helpers
  subscriptionId:       '38785beb-5019-4896-8679-3d41ddacc4b1'
  resourceGroup:        'rg-thevindu'
  workspaceId:          'e5d406b5-f761-48a7-9466-9d0d4a768f01'
  sqlServer:            ''                      # empty = skip SQL check
  aksServiceConnection: 'rnd-aks-thevindu'
  storageAccount:       'sa18436'
  blobContainer:        'preflight'

jobs:
  - job: RunChecks
    displayName: Asgardeo pre-flight
    timeoutInMinutes: 60
    pool:
      name: ${{ parameters.agentPool }}
    steps:
      - checkout: none

      # ── STEP 0 — tools on the agent (the original `az not found` fix) ──────
      - bash: |
          set -euo pipefail
          command -v az      >/dev/null 2>&1 || curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
          command -v jq      >/dev/null 2>&1 || { sudo apt-get update -qq && sudo apt-get install -y jq; }
          command -v python3 >/dev/null 2>&1 || { sudo apt-get update -qq && sudo apt-get install -y python3; }
        displayName: 0. Install az + jq + python3

      # ── STEP 1 — output dir, Summary header, and shared helpers ───────────
      #   kql()     runs a query; sets QUERY_OK (1/0) + QUERY_ERR; prints JSON or [].
      #   summary() appends one row to 00_Summary.csv.
      #   note()    appends a line for the Google Chat card.
      - bash: |
          set -euo pipefail
          mkdir -p "$(workDir)"; : > "$(warnings)"
          jq -rn '["Check","Result","Status"]|@csv' > "$(workDir)/00_Summary.csv"
          cat > "$(lib)" <<EOF
          export WORKDIR="$(workDir)"
          export WARNINGS="$(warnings)"
          export SUMMARY="$(workDir)/00_Summary.csv"
          export WORKSPACE_ID="$(workspaceId)"
          export LOOKBACK=${{ parameters.lookbackDays }}
          EOF
          cat >> "$(lib)" <<'EOF'
          # NOTE: kql returns its output in the global QUERY_OUT (NOT via stdout).
          #   Callers must invoke it directly — `kql '...'; DATA="$QUERY_OUT"` —
          #   never as `DATA=$(kql ...)`, because a command-substitution subshell
          #   would discard QUERY_OK/QUERY_ERR and trip `set -u` in the parent.
          kql() {
            local err; err=$(mktemp); QUERY_OK=1; QUERY_ERR=""; QUERY_OUT='[]'
            if QUERY_OUT=$(az monitor log-analytics query -w "$WORKSPACE_ID" --timespan "P${LOOKBACK}D" --analytics-query "$1" -o json 2>"$err"); then
              :
            else
              QUERY_OK=0; QUERY_ERR=$(tr '\n' ' ' <"$err" | tr '"' "'" | head -c 200); QUERY_OUT='[]'
            fi
            rm -f "$err"
          }
          summary() { jq -rn --arg c "$1" --arg r "$2" --arg s "$3" '[$c,$r,$s]|@csv' >> "$SUMMARY"; }
          note()    { echo "$1" >> "$WARNINGS"; }
          EOF
        displayName: 1. Init outputs + helpers

      # ── STEP 2 — AUTH PROBE: permission problem vs genuine no-data ────────
      - task: AzureCLI@2
        displayName: 2. Verify access (auth probe)
        continueOnError: true
        inputs:
          azureSubscription: $(AZURE_SERVICE_CONNECTION)
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            set -uo pipefail
            source "$(lib)"
            echo "Service principal context:"; az account show --query "{name:name,id:id}" -o jsonc || true
            if az account set -s $(subscriptionId) 2>/tmp/se; then
              summary "Auth: subscription" "active = $(subscriptionId)" OK
            else
              summary "Auth: subscription" "$(tr '\n' ' ' </tmp/se | head -c 150)" FAILED
              note "Cannot set subscription $(subscriptionId) — SP has no access."
            fi
            kql 'print probe=1'
            if [ "$QUERY_OK" = 1 ]; then
              summary "Auth: Log Analytics" "query API reachable" OK
            else
              summary "Auth: Log Analytics" "$QUERY_ERR" FAILED
              note "Log Analytics query API FAILED (likely missing 'Log Analytics Reader' on workspace): $QUERY_ERR"
            fi

      # ── STEP 3 — Log ingestion volume ─────────────────────────────────────
      - task: AzureCLI@2
        displayName: 3. Log ingestion volume
        continueOnError: true
        inputs:
          azureSubscription: $(AZURE_SERVICE_CONNECTION)
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            set -uo pipefail
            source "$(lib)"; az account set -s $(subscriptionId) 2>/dev/null || true
            kql 'Usage_CL
              | summarize TotalVolumeGB = sum(Quantity_d / 1000.) by bin(TimeGenerated, 1d)
              | project Day = TimeGenerated, TotalVolumeGB | order by Day asc'
            DATA="$QUERY_OUT"
            echo "$DATA" | jq -r '["Day","VolumeGB"],(.[]|[((.Day // .TimeGenerated)|tostring)[:10],(.TotalVolumeGB|tonumber)])|@csv' > "$WORKDIR/01_Log_Ingestion.csv"
            if [ "$QUERY_OK" = 0 ]; then summary "Log Ingestion" "$QUERY_ERR" FAILED; note "Log Ingestion FAILED: $QUERY_ERR"
            elif [ "$(echo "$DATA" | jq 'length')" = 0 ]; then summary "Log Ingestion" "query ran, 0 rows" EMPTY; note "Log Ingestion: 0 rows (no data in window or table empty)."
            else
              PEAK=$(echo "$DATA" | jq -r '[.[].TotalVolumeGB|tonumber]|max // 0')
              AVG=$(echo "$DATA"  | jq -r '([.[].TotalVolumeGB|tonumber]|add)/length')
              STATUS=OK; awk -v p="$PEAK" -v a="$AVG" 'BEGIN{exit (a>0 && p>2*a)?0:1}' && { STATUS=WARNING; note "Log ingestion: peak day >2x average"; }
              summary "Log Ingestion" "$(printf 'peak %.2f / avg %.2f GB/day' "$PEAK" "$AVG")" "$STATUS"
            fi

      # ── STEP 4 — Frontdoor traffic ────────────────────────────────────────
      - task: AzureCLI@2
        displayName: 4. Frontdoor traffic
        continueOnError: true
        inputs:
          azureSubscription: $(AZURE_SERVICE_CONNECTION)
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            set -uo pipefail
            source "$(lib)"; az account set -s $(subscriptionId) 2>/dev/null || true
            kql 'FrontdoorAccessLog_CL
              | summarize Requests = count() by bin(TimeGenerated, 1d)
              | project Day = TimeGenerated, Requests | order by Day asc'
            DATA="$QUERY_OUT"
            echo "$DATA" | jq -r '["Day","Requests"],(.[]|[((.Day // .TimeGenerated)|tostring)[:10],(.Requests)])|@csv' > "$WORKDIR/02_Frontdoor_Traffic.csv"
            if [ "$QUERY_OK" = 0 ]; then summary "Frontdoor Traffic" "$QUERY_ERR" FAILED; note "Frontdoor Traffic FAILED: $QUERY_ERR"
            elif [ "$(echo "$DATA" | jq 'length')" = 0 ]; then summary "Frontdoor Traffic" "query ran, 0 rows" EMPTY
            else
              PEAK=$(echo "$DATA" | jq -r '[.[].Requests|tonumber]|max // 0')
              summary "Frontdoor Traffic" "peak ${PEAK} requests/day" OK
            fi

      # ── STEP 5 — Top traffic tenants ──────────────────────────────────────
      - task: AzureCLI@2
        displayName: 5. Top traffic tenants
        continueOnError: true
        inputs:
          azureSubscription: $(AZURE_SERVICE_CONNECTION)
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            set -uo pipefail
            source "$(lib)"; az account set -s $(subscriptionId) 2>/dev/null || true
            kql 'FrontdoorAccessLog_CL
              | extend reqUri = tostring(requestUri_s)
              | extend tenant_from_path = extract(@"/t/([^/]+)", 1, reqUri)
              | extend custom_domain = extract(@"https?://([^/:]+)", 1, reqUri)
              | extend tenant = case(isnotempty(tenant_from_path), tenant_from_path,
                  isnotempty(custom_domain) and custom_domain !contains "asgardeo.io", custom_domain, "")
              | where isnotempty(tenant)
              | summarize request_count = count() by tenant | top 5 by request_count desc'
            DATA="$QUERY_OUT"
            echo "$DATA" | jq -r '["Tenant","RequestCount"],(.[]|[.tenant,.request_count])|@csv' > "$WORKDIR/03_Top_Traffic_Tenants.csv"
            if [ "$QUERY_OK" = 0 ]; then summary "Top Traffic Tenants" "$QUERY_ERR" FAILED; note "Top Traffic Tenants FAILED: $QUERY_ERR"
            else
              TOP=$(echo "$DATA" | jq -r '[.[]|"\(.tenant)=\(.request_count)"]|.[0:3]|join(", ")')
              summary "Top Traffic Tenants" "${TOP:-none}" "$([ -z "$TOP" ] && echo EMPTY || echo OK)"
            fi

      # ── STEP 6 — IS error count ───────────────────────────────────────────
      - task: AzureCLI@2
        displayName: 6. IS error count
        continueOnError: true
        inputs:
          azureSubscription: $(AZURE_SERVICE_CONNECTION)
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            set -uo pipefail
            source "$(lib)"; az account set -s $(subscriptionId) 2>/dev/null || true
            kql 'ContainerLog_CL
              | join kind=inner (KubePodInventory_CL | project ContainerID_s, PodName = Name_s | distinct *) on ContainerID_s
              | project TimeGenerated, LogEntry_s
              | where LogEntry_s has_cs ": ERROR"
              | summarize Count = count() by bin(TimeGenerated, 1d)
              | project Day = TimeGenerated, Count | order by Day asc'
            DATA="$QUERY_OUT"
            echo "$DATA" | jq -r '["Day","ErrorCount"],(.[]|[((.Day // .TimeGenerated)|tostring)[:10],(.Count)])|@csv' > "$WORKDIR/04_IS_Errors.csv"
            if [ "$QUERY_OK" = 0 ]; then summary "IS Errors" "$QUERY_ERR" FAILED; note "IS Errors FAILED: $QUERY_ERR"
            elif [ "$(echo "$DATA" | jq 'length')" = 0 ]; then summary "IS Errors" "query ran, 0 rows" EMPTY
            else
              PEAK=$(echo "$DATA" | jq -r '[.[].Count|tonumber]|max // 0')
              STATUS=OK; awk -v p="$PEAK" -v t="${{ parameters.errorCountDailyThreshold }}" 'BEGIN{exit (p>t)?0:1}' \
                && { STATUS=WARNING; note "IS errors: peak ${PEAK}/day exceeded ${{ parameters.errorCountDailyThreshold }}"; }
              summary "IS Errors" "peak ${PEAK} errors/day" "$STATUS"
            fi

      # ── STEP 7 — Top error tenants ────────────────────────────────────────
      - task: AzureCLI@2
        displayName: 7. Top error tenants
        continueOnError: true
        inputs:
          azureSubscription: $(AZURE_SERVICE_CONNECTION)
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            set -uo pipefail
            source "$(lib)"; az account set -s $(subscriptionId) 2>/dev/null || true
            kql 'let paramPodNamePrefix = "wso2is-deployment";
              let errorRegex = ".*iam-cloud-.* : ERROR {.*} .*";
              ContainerLog_CL
              | join kind=inner (KubePodInventory_CL | project ContainerID_s, PodName = Name_s
                  | where PodName contains paramPodNamePrefix | distinct *) on ContainerID_s
              | where LogEntry_s has_cs "ERROR"
              | where LogEntry_s matches regex errorRegex
              | where LogEntry_s !contains "Error when setting claim"
              | where LogEntry_s !contains "This password has been used in recent history. Please choose a different password"
              | where LogEntry_s !contains "JSON Web Token is issued before the allowed time."
              | project TimeGenerated, LogEntry_s
              | parse LogEntry_s with * "Tenant: [" TenantName "]" *
              | where isnotempty(TenantName)
              | summarize LogCount = count() by TenantName | top 5 by LogCount desc'
            DATA="$QUERY_OUT"
            echo "$DATA" | jq -r '["TenantName","LogCount"],(.[]|[.TenantName,.LogCount])|@csv' > "$WORKDIR/05_Top_Error_Tenants.csv"
            if [ "$QUERY_OK" = 0 ]; then summary "Top Error Tenants" "$QUERY_ERR" FAILED; note "Top Error Tenants FAILED: $QUERY_ERR"
            else
              TOP=$(echo "$DATA" | jq -r '[.[]|"\(.TenantName)=\(.LogCount)"]|.[0:3]|join(", ")')
              summary "Top Error Tenants" "${TOP:-none}" "$([ -z "$TOP" ] && echo EMPTY || echo OK)"
            fi

      # ── STEP 8 — API latency (AzureDiagnostics) ───────────────────────────
      - task: AzureCLI@2
        displayName: 8. API latency
        continueOnError: true
        inputs:
          azureSubscription: $(AZURE_SERVICE_CONNECTION)
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            set -uo pipefail
            source "$(lib)"; az account set -s $(subscriptionId) 2>/dev/null || true
            kql 'AzureDiagnostics
              | where isnotempty(timeTaken_s) or isnotempty(httpStatusCode_s)
              | extend tt = todouble(timeTaken_s)
              | where isnotempty(tt)
              | summarize AvgSec = round(avg(tt), 3) by Endpoint = tostring(requestUri_s)
              | top 5 by AvgSec desc'
            DATA="$QUERY_OUT"
            echo "$DATA" | jq -r '["Endpoint","AvgSeconds"],(.[]|[.Endpoint,(.AvgSec|tonumber)])|@csv' > "$WORKDIR/06_API_Latency.csv"
            if [ "$QUERY_OK" = 0 ]; then summary "API Latency" "$QUERY_ERR" FAILED; note "API Latency FAILED: $QUERY_ERR"
            elif [ "$(echo "$DATA" | jq 'length')" = 0 ]; then summary "API Latency" "query ran, 0 rows" EMPTY
            else
              MAX=$(echo "$DATA" | jq -r '[.[].AvgSec|tonumber]|max // 0')
              STATUS=OK; awk -v m="$MAX" -v t="${{ parameters.apiLatencyThresholdSeconds }}" 'BEGIN{exit (m>t)?0:1}' \
                && { STATUS=WARNING; note "API latency: worst endpoint ${MAX}s over ${{ parameters.apiLatencyThresholdSeconds }}s"; }
              summary "API Latency" "worst avg ${MAX}s" "$STATUS"
            fi

      # ── STEP 9 — SQL DB storage ───────────────────────────────────────────
      - task: AzureCLI@2
        displayName: 9. SQL DB storage
        continueOnError: true
        inputs:
          azureSubscription: $(AZURE_SERVICE_CONNECTION)
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            set -uo pipefail
            source "$(lib)"; az account set -s $(subscriptionId) 2>/dev/null || true
            CSV="$WORKDIR/07_SQL_Storage.csv"; jq -rn '["Database","MaxGB","UsedPercent","Status"]|@csv' > "$CSV"
            if [ -z "$(sqlServer)" ]; then
              jq -rn '["(not configured)","","","SKIP"]|@csv' >> "$CSV"; summary "SQL Storage" "not configured" SKIP; exit 0
            fi
            WARN=0; N=0
            for DB in $(az sql db list -g $(resourceGroup) -s $(sqlServer) --query "[?name!='master'].name" -o tsv); do
              N=$((N+1)); U=$(az sql db list-usages -g $(resourceGroup) -s $(sqlServer) -n "$DB" -o json)
              USED=$(echo "$U" | jq -r '.[]|select(.name=="database_size")|.currentValue')
              MAX=$(echo  "$U" | jq -r '.[]|select(.name=="database_size")|.limit')
              read -r GB PCT <<<"$(awk -v u="$USED" -v m="$MAX" 'BEGIN{printf "%.2f %.1f", m/(1024^3), u/m*100}')"
              DBSTATUS=OK; awk -v p="$PCT" -v w="${{ parameters.sqlStorageWarnPercent }}" 'BEGIN{exit (p<w)?0:1}' || { DBSTATUS=ALERT; WARN=1; }
              jq -rn --arg d "$DB" --arg g "$GB" --arg p "$PCT" --arg s "$DBSTATUS" '[$d,($g|tonumber),($p|tonumber),$s]|@csv' >> "$CSV"
            done
            [ "$WARN" = 1 ] && note "SQL database(s) over ${{ parameters.sqlStorageWarnPercent }}% storage" || true
            summary "SQL Storage" "${N} db(s) checked" "$([ "$WARN" = 1 ] && echo ALERT || echo OK)"

      # ── STEP 10 — Archival storage size ───────────────────────────────────
      - task: AzureCLI@2
        displayName: 10. Archival storage size
        continueOnError: true
        inputs:
          azureSubscription: $(AZURE_SERVICE_CONNECTION)
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            set -uo pipefail
            source "$(lib)"; az account set -s $(subscriptionId) 2>/dev/null || true
            CSV="$WORKDIR/08_Archival_Storage.csv"; jq -rn '["StorageAccount","GiBUsed"]|@csv' > "$CSV"
            START=$(date -u -d "2 days ago" +%Y-%m-%dT%H:%MZ); N=0
            for ID in $(az storage account list -g $(resourceGroup) --query "[].id" -o tsv); do
              BYTES=$(az monitor metrics list --resource "$ID" --metric UsedCapacity --aggregation Average \
                --start-time "$START" --interval PT1H --query "value[0].timeseries[0].data[?average!=null].average | [-1]" -o tsv 2>/dev/null || echo "")
              [ -n "$BYTES" ] && [ "$BYTES" != "None" ] || continue
              N=$((N+1)); jq -rn --arg a "${ID##*/}" --arg g "$(awk -v b="$BYTES" 'BEGIN{printf "%.2f",b/1073741824}')" '[$a,($g|tonumber)]|@csv' >> "$CSV"
            done
            summary "Archival Storage" "${N} account(s)" "$([ "$N" = 0 ] && echo EMPTY || echo OK)"

      # ── STEP 11 — Certificate expiry ──────────────────────────────────────
      - task: AzureCLI@2
        displayName: 11. Certificate expiry
        continueOnError: true
        inputs:
          azureSubscription: $(AZURE_SERVICE_CONNECTION)
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            set -uo pipefail
            source "$(lib)"; az account set -s $(subscriptionId) 2>/dev/null || true
            CSV="$WORKDIR/09_Certificates.csv"; jq -rn '["Vault","Certificate","DaysRemaining","Status"]|@csv' > "$CSV"
            NOW=$(date -u +%s)
            for VAULT in $(az keyvault list --query "[].name" -o tsv); do
              az keyvault certificate list --vault-name "$VAULT" --query "[].{name:name,exp:attributes.expires}" -o json | jq -c '.[]' | while read -r C; do
                NAME=$(echo "$C" | jq -r '.name'); EXP=$(echo "$C" | jq -r '.exp'); [ "$EXP" = "null" ] && continue
                EXP_EPOCH=$(date -u -d "$EXP" +%s 2>/dev/null || echo 0); [ "$EXP_EPOCH" = "0" ] && continue
                DAYS=$(( (EXP_EPOCH - NOW) / 86400 )); STATUS=OK
                [ "$DAYS" -lt 0 ] && STATUS=EXPIRED
                [ "$DAYS" -ge 0 ] && [ "$DAYS" -lt "${{ parameters.certExpiryWarningDays }}" ] && STATUS=EXPIRING
                jq -rn --arg v "$VAULT" --arg n "$NAME" --arg d "$DAYS" --arg s "$STATUS" '[$v,$n,($d|tonumber),$s]|@csv' >> "$CSV"
                [ "$STATUS" != "OK" ] && echo "Cert ${VAULT}/${NAME}: ${STATUS} (${DAYS}d)" >> "$WARNINGS" || true
              done
            done
            summary "Certificates" "expiry scan" "$(grep -q 'EXPIR' "$WARNINGS" && echo WARNING || echo OK)"

      # ── STEP 12 — Weekly cost ─────────────────────────────────────────────
      - task: AzureCLI@2
        displayName: 12. Weekly cost
        continueOnError: true
        inputs:
          azureSubscription: $(AZURE_SERVICE_CONNECTION)
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            set -uo pipefail
            source "$(lib)"; az account set -s $(subscriptionId) 2>/dev/null || true
            CW_END=$(date -u -d "yesterday" +%F); CW_START=$(date -u -d "8 days ago" +%F)
            PW_END=$(date -u -d "9 days ago" +%F); PW_START=$(date -u -d "15 days ago" +%F)
            cost() { az rest --method POST \
              --url "https://management.azure.com/subscriptions/$(subscriptionId)/providers/Microsoft.CostManagement/query?api-version=2023-11-01" \
              --body "{\"type\":\"ActualCost\",\"timeframe\":\"Custom\",\"timePeriod\":{\"from\":\"$1\",\"to\":\"$2\"},\"dataset\":{\"granularity\":\"None\",\"aggregation\":{\"totalCost\":{\"name\":\"Cost\",\"function\":\"Sum\"}}}}" \
              --query "properties.rows[0][0]" -o tsv 2>/dev/null; }
            CW=$(cost "$CW_START" "$CW_END"); PW=$(cost "$PW_START" "$PW_END")
            CSV="$WORKDIR/10_Weekly_Cost.csv"; jq -rn '["Period","Cost"]|@csv' > "$CSV"
            jq -rn --arg p "This week ($CW_START..$CW_END)"  --arg c "${CW:-0}" '[$p,($c|tonumber)]|@csv' >> "$CSV"
            jq -rn --arg p "Prior week ($PW_START..$PW_END)" --arg c "${PW:-0}" '[$p,($c|tonumber)]|@csv' >> "$CSV"
            if [ -z "$CW" ] && [ -z "$PW" ]; then summary "Weekly Cost" "cost query returned nothing" FAILED; note "Weekly Cost FAILED — check Cost Management permissions."
            else
              STATUS=OK; R="this \$$(printf '%.2f' "${CW:-0}") vs prior \$$(printf '%.2f' "${PW:-0}")"
              if awk -v c="${CW:-0}" -v p="${PW:-0}" -v t="${{ parameters.costIncreasePercentThreshold }}" 'BEGIN{exit (p>0 && (c-p)/p*100>t)?0:1}'; then
                STATUS=WARNING; PCT=$(awk -v c="$CW" -v p="$PW" 'BEGIN{printf "%.1f",(c-p)/p*100}')
                R="$R (+${PCT}%)"; note "Cost up ${PCT}% week-over-week"
              fi
              summary "Weekly Cost" "$R" "$STATUS"
            fi

      # ── STEP 13 — Secure score (with list fallback) ───────────────────────
      - task: AzureCLI@2
        displayName: 13. Secure score
        continueOnError: true
        inputs:
          azureSubscription: $(AZURE_SERVICE_CONNECTION)
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            set -uo pipefail
            source "$(lib)"; az account set -s $(subscriptionId) 2>/dev/null || true
            SS=$(az security secure-scores show --name ascScore -o json 2>/dev/null \
              || az security secure-scores list -o json 2>/dev/null | jq '.[0]' || echo '{}')
            PCT=$(echo "$SS" | jq -r '.score.percentage // .properties.score.percentage // empty')
            CSV="$WORKDIR/11_Secure_Score.csv"; jq -rn '["Metric","Value"]|@csv' > "$CSV"
            if [ -n "$PCT" ]; then
              VAL="$(awk -v p="$PCT" 'BEGIN{printf "%.0f%%",p*100}')"
              jq -rn --arg v "$VAL" '["Secure Score",$v]|@csv' >> "$CSV"; summary "Secure Score" "$VAL" OK
            else
              jq -rn '["Secure Score","unavailable"]|@csv' >> "$CSV"; summary "Secure Score" "unavailable (Defender plan / permissions)" SKIP
            fi

      # ── STEP 14 — AKS pods + nodes ────────────────────────────────────────
      - task: Kubernetes@1
        displayName: 14a. AKS login
        continueOnError: true
        inputs:
          connectionType: Kubernetes Service Connection
          kubernetesServiceEndpoint: $(aksServiceConnection)
          command: login
      - bash: |
          set -uo pipefail
          source "$(lib)"
          BAD=$(kubectl get pods -A --no-headers 2>/dev/null | grep -Ev 'Running|Completed' || true)
          { echo 'Namespace,Pod,Status'; [ -n "$BAD" ] && echo "$BAD" | awk 'NF{print $1","$2","$4}'; } > "$WORKDIR/12_AKS_Pods.csv"
          NODES=$(kubectl top nodes --no-headers 2>/dev/null || true)   # NAME CPU CPU% MEM MEM%
          { echo 'Node,CPUcores,CPUpct,Memory,Mempct'; [ -n "$NODES" ] && echo "$NODES" | awk 'NF{print $1","$2","$3","$4","$5}'; } > "$WORKDIR/13_AKS_Nodes.csv"
          if [ -z "$NODES" ]; then summary "AKS Pods/Nodes" "kubectl returned nothing (login failed?)" FAILED; note "AKS check FAILED — kubectl unreachable."
          elif [ -n "$BAD" ]; then summary "AKS Pods/Nodes" "unhealthy pods found" WARNING; note "Pods not Running/Completed found"
          else summary "AKS Pods/Nodes" "all pods healthy" OK; fi
        displayName: 14b. AKS pod/node check
        continueOnError: true

      # ── STEP 15 — publish CSVs as a pipeline artifact ─────────────────────
      - publish: $(workDir)
        artifact: preflight-csv
        displayName: 15. Publish CSV artifact
        condition: always()

      # ── STEP 16 — upload every CSV to blob: sa18436/preflight ─────────────
      - task: AzureCLI@2
        displayName: 16. Upload CSVs to blob (sa18436/preflight)
        condition: always()
        inputs:
          azureSubscription: $(AZURE_SERVICE_CONNECTION)
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            set -euo pipefail
            ls "$(workDir)"/*.csv >/dev/null 2>&1 || { echo "No CSVs — nothing to upload."; exit 0; }
            KEY=$(az storage account keys list --account-name $(storageAccount) -g $(resourceGroup) --query "[0].value" -o tsv)
            az storage container create --account-name $(storageAccount) --account-key "$KEY" --name $(blobContainer) --only-show-errors -o none
            PREFIX="preflight-$(date -u '+%Y-%m-%d-%H%M')"
            for f in "$(workDir)"/*.csv; do
              az storage blob upload --account-name $(storageAccount) --account-key "$KEY" \
                --container-name $(blobContainer) --file "$f" --name "${PREFIX}/$(basename "$f")" --overwrite -o none
            done
            echo "Uploaded $(ls "$(workDir)"/*.csv | wc -l) CSV(s) to $(storageAccount)/$(blobContainer)/${PREFIX}/"

      # ── STEP 17 — Google Chat: anomalies + FAILED + SKIPPED by name ───────
      - bash: |
          set -uo pipefail
          [ -z "${GCHAT_WEBHOOK_URL:-}" ] && { echo "No webhook — skipping."; exit 0; }
          GROUPS=$(python3 - "$(workDir)/00_Summary.csv" <<'PY'
          import csv, sys, json
          g = {"anomaly": [], "failed": [], "skipped": [], "ok": 0}
          with open(sys.argv[1], newline='') as f:
              r = csv.reader(f); next(r, None)
              for row in r:
                  if len(row) < 3: continue
                  check, res, st = row[0], row[1], row[2]
                  label = f"{check} — {res}" if res else check
                  if st in ("WARNING", "ALERT"): g["anomaly"].append(label)
                  elif st == "FAILED":           g["failed"].append(label)
                  elif st in ("SKIP", "EMPTY"):  g["skipped"].append(label)
                  else: g["ok"] += 1
          for k in ("anomaly", "failed", "skipped"): g[k] = g[k][:30]
          print(json.dumps(g))
          PY
          )
          PAYLOAD=$(jq -n --argjson g "$GROUPS" \
            --arg ts "$(date -u '+%Y-%m-%d %H:%M UTC')" \
            --arg url "$(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)" '
            def sec(t; icon; items):
              if (items|length) > 0
              then {header:(t+" ("+(items|length|tostring)+")"),
                    widgets:(items|map({decoratedText:{startIcon:{materialIcon:{name:icon}},text:.}}))}
              else empty end;
            {cardsV2:[{cardId:"asgardeo-preflight",card:{
              header:{title:"Asgardeo Preflight Check",
                      subtitle:($ts+"  |  OK:"+($g.ok|tostring)+"  Warn:"+($g.anomaly|length|tostring)+"  Fail:"+($g.failed|length|tostring)+"  Skip:"+($g.skipped|length|tostring))},
              sections:([
                sec("Anomalies";"warning";$g.anomaly),
                sec("Failed";"error";$g.failed),
                sec("Skipped / No data";"do_not_disturb_on";$g.skipped),
                {widgets:[{buttonList:{buttons:[{text:"Open pipeline run",onClick:{openLink:{url:$url}}}]}}]}
              ])}}]}')
          curl -sS -H "Content-Type: application/json" -d "$PAYLOAD" "$GCHAT_WEBHOOK_URL" >/dev/null \
            && echo "Posted card to Google Chat."
        displayName: 17. Notify Google Chat
        condition: always()
        env:
          GCHAT_WEBHOOK_URL: $(GCHAT_WEBHOOK_URL)