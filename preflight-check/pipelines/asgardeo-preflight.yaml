# ============================================================================
# Weekly Preflight (DEMO) — runs against seeded custom tables in the LAW
#
# Checks (from FORPIPE.md), all via Invoke-AzOperationalInsightsQuery:
#   1.1 Log ingestion volume            Usage_CL
#   1.2 Log existency per deployment    ContainerLog_CL x KubePodInventory_CL
#   1.3 Alert logs emission             AlertLogs_CL
#   2.1 Frontdoor daily traffic         FrontdoorLog_CL
#   2.4 Frontdoor 4xx/5xx buckets       FrontdoorLog_CL
#   2.7 Traffic by tenant               FrontdoorLog_CL
#   3.1 IS daily ERROR count            ContainerLog_CL
#   3.2 Error count by tenant           ContainerLog_CL (full noise filters)
#   3.5 Long-running script detection   ContainerLog_CL
#   5.1 API latency by bucket           FrontdoorLog_CL
#   6.x AKS pod status + node util      KubePodInventory_CL / NodePerf_CL
#
# NOTE: FrontdoorLog_CL / NodePerf_CL are deliberately NOT named
# AzureDiagnostics_CL / Perf_CL. Those two Log-Type names failed to
# resolve as custom tables in testing ("Failed to resolve table or
# column expression") even though other Log-Type names (Usage,
# ContainerLog, KubePodInventory, AlertLogs) ingested and queried fine.
# Renaming sidesteps whatever collision/reservation is blocking them.
#
# EXCLUDED for now (later enhancements): §9 certificates, §10 database
# storage / archival sizes.
#
# Demo data uses Data Collector API custom tables: table names carry _CL and
# columns carry type suffixes (_s string, _d number) — e.g. Usage -> Usage_CL,
# Quantity -> Quantity_d, LogEntry -> LogEntry_s. Seed with
# seed-preflight-logs.sh before running.
#
# Az PowerShell only, results ONLY to Google Chat (secret: GCHAT_WEBHOOK_URL).
# Card layout: one cardsV2 card per environment, grouped by preflight
# requirement category, per-item status icons, healthy sections collapsed.
# ============================================================================

trigger: none

schedules:
  - cron: "0 2 * * 1"
    displayName: Weekly pre-flight (Mon 02:00 UTC)
    always: true
    branches:
      include:
        - main

parameters:
  - name: environments
    type: object
    default:
      - name: thevindu-rnd
        tier: L1
        region: US
        serviceConnection: 'thevindu-rnd-sc'
        subscriptionId: '38785beb-5019-4896-8679-3d41ddacc4b1'
        resourceGroup: 'rg-thevindu'
        workspaceId: 'e5d406b5-f761-48a7-9466-9d0d4a768f01'
        podNamePrefix: 'wso2is'

  - name: defaultServiceConnection
    type: string
    default: thevindu-rnd-sc
  - name: agentPool
    type: string
    default: rnd-thevindu-vmss
  - name: lookbackDays
    type: number
    default: 7
  - name: errorCountDailyThreshold
    type: number
    default: 1000
  - name: apiLatencyThresholdSeconds
    type: number
    default: 1.0
  - name: httpErrorRatePercentThreshold   # (4xx + 5xx) / total
    type: number
    default: 5
  - name: nodeCpuOverProvisionPercent     # avg CPU below this AND mem below next => over-provisioned
    type: number
    default: 25
  - name: nodeMemOverProvisionPercent
    type: number
    default: 50

jobs:
  - ${{ each env in parameters.environments }}:
      - job: Preflight_${{ replace(env.name, '-', '_') }}
        displayName: 'Preflight ${{ env.tier }} — ${{ env.name }}'
        timeoutInMinutes: 60
        pool:
          name: ${{ parameters.agentPool }}
        variables:
          workDir: $(Build.ArtifactStagingDirectory)/preflight-${{ env.name }}
          libps: $(Build.ArtifactStagingDirectory)/preflight-${{ env.name }}/lib.ps1
        steps:
          - checkout: none

          # ------------------------------------------------------------------
          # 0. Bootstrap agent: pwsh + Az modules (fresh VMSS agents)
          # ------------------------------------------------------------------
          - bash: |
              set -uo pipefail
              retry() { local n=0; until "$@"; do n=$((n+1)); [ "$n" -ge 4 ] && return 1; echo "retry $n/3: $*"; sleep 10; done; }

              if ! command -v pwsh >/dev/null 2>&1; then
                echo "PowerShell (pwsh) not found — installing…"
                retry sudo bash -c '
                  set -e
                  . /etc/os-release
                  curl -sSL --fail --retry 3 "https://packages.microsoft.com/config/ubuntu/${VERSION_ID}/packages-microsoft-prod.deb" -o /tmp/pmc.deb
                  dpkg -i /tmp/pmc.deb
                  apt-get update -y
                  apt-get install -y powershell
                ' || retry sudo snap install powershell --classic \
                  || { echo "##[error]Could not install PowerShell (pwsh)."; exit 1; }
              fi

              retry sudo pwsh -NoProfile -NonInteractive -Command '
                $ErrorActionPreference = "Stop"
                Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
                foreach ($m in "Az.Accounts","Az.OperationalInsights") {
                  if (-not (Get-Module -ListAvailable -Name $m)) {
                    Write-Host "Installing $m…"
                    Install-Module $m -Scope AllUsers -Force -AllowClobber -Repository PSGallery
                  }
                }
              ' || { echo "##[error]Could not install Az PowerShell modules."; exit 1; }
              pwsh --version
            displayName: 0. Install pwsh + Az modules

          # ------------------------------------------------------------------
          # 1. Init helpers + per-env state (summary is a JSON-lines file)
          # ------------------------------------------------------------------
          - bash: |
              set -euo pipefail
              mkdir -p "$(workDir)"
              : > "$(workDir)/summary.jsonl"
              cat > "$(libps)" <<'PSEOF'
              $script:SummaryPath = '$(workDir)/summary.jsonl'
              $script:WorkspaceId = '${{ env.workspaceId }}'
              $script:Lookback    = ${{ parameters.lookbackDays }}

              function Add-Summary($Check, $Result, $Status) {
                @{ check = [string]$Check; result = [string]$Result; status = [string]$Status } |
                  ConvertTo-Json -Compress | Add-Content -LiteralPath $script:SummaryPath
              }

              function Trim-Err([string]$m, [int]$max = 200) {
                $m = ($m -replace '\s+', ' ').Trim()
                if ($m.Length -gt $max) { $m = $m.Substring(0, $max) }
                return $m
              }

              function Get-KqlErrorDetail($ErrorRecord) {
                # Invoke-AzOperationalInsightsQuery's own exception .Message is
                # often just "Operation returned an invalid status code
                # 'BadRequest'" — the real KQL error (bad table/column name,
                # syntax error) is carried differently depending on SDK version:
                #  - Track1 Microsoft.Rest exceptions: .Response.Content (STRING, not HttpContent)
                #  - Some wrap it as .Body.Error.Message
                #  - Sometimes PowerShell's own $_.ErrorDetails.Message has the JSON body
                # Try all of them; if none work, surface the exception type name
                # so the next run at least tells us which shape we're dealing with.
                $ex = $ErrorRecord.Exception
                $candidates = @()
                try { if ($ex.Body -and $ex.Body.Error -and $ex.Body.Error.Message) { $candidates += [string]$ex.Body.Error.Message } } catch {}
                try {
                  if ($ex.Response -and $ex.Response.Content) {
                    $c = $ex.Response.Content
                    $bodyText = if ($c -is [string]) { $c } else { $c.ReadAsStringAsync().Result }
                    if ($bodyText) { $candidates += [string]$bodyText }
                  }
                } catch {}
                try { if ($ErrorRecord.ErrorDetails -and $ErrorRecord.ErrorDetails.Message) { $candidates += [string]$ErrorRecord.ErrorDetails.Message } } catch {}
                try {
                  $inner = $ex.InnerException
                  if ($inner -and $inner.Message) { $candidates += [string]$inner.Message }
                } catch {}
                foreach ($c in $candidates) {
                  try {
                    $j = $c | ConvertFrom-Json -ErrorAction Stop
                    if ($j.error.message)                   { return $j.error.message }
                    if ($j.error.innererror.message)        { return $j.error.innererror.message }
                    if ($j.message)                         { return $j.message }
                  } catch { if ($c.Trim()) { return $c } }
                }
                return ('[' + $ex.GetType().FullName + '] ' + $ex.Message)
              }

              function Invoke-Kql([string]$Query, [double]$Days = 0) {
                if ($Days -le 0) { $Days = $script:Lookback }
                try {
                  $r = Invoke-AzOperationalInsightsQuery -WorkspaceId $script:WorkspaceId `
                         -Query $Query -Timespan (New-TimeSpan -Hours ([int]($Days * 24))) -ErrorAction Stop
                  return @{ Ok = $true; Err = ''; Rows = @($r.Results) }
                } catch {
                  return @{ Ok = $false; Err = (Trim-Err (Get-KqlErrorDetail $_) 300); Rows = @() }
                }
              }
              PSEOF
              echo "Initialized $(workDir)"
            displayName: 1. Init helpers

          # ------------------------------------------------------------------
          # 2. Auth probe — subscription + Log Analytics reachability
          # ------------------------------------------------------------------
          - task: AzurePowerShell@5
            displayName: 2. Verify access
            continueOnError: true
            inputs:
              azureSubscription: ${{ coalesce(env.serviceConnection, parameters.defaultServiceConnection) }}
              azurePowerShellVersion: LatestVersion
              pwsh: true
              ScriptType: InlineScript
              Inline: |
                . '$(libps)'
                try {
                  Set-AzContext -Subscription '${{ env.subscriptionId }}' -ErrorAction Stop | Out-Null
                  Add-Summary 'Auth: subscription' 'active = ${{ env.subscriptionId }}' 'OK'
                } catch {
                  Add-Summary 'Auth: subscription' (Trim-Err $_.Exception.Message 150) 'FAILED'
                }
                $probe = Invoke-Kql 'print probe=1'
                if ($probe.Ok) { Add-Summary 'Auth: Log Analytics' 'query API reachable' 'OK' }
                else           { Add-Summary 'Auth: Log Analytics' $probe.Err 'FAILED' }

          # ------------------------------------------------------------------
          # 2b. Table existence probe — isolates "table not found / still
          #     indexing" from real query-logic bugs in the complex checks
          #     below. Runs a trivial `| count` against every demo table.
          # ------------------------------------------------------------------
          - task: AzurePowerShell@5
            displayName: 2b. Table existence probe
            continueOnError: true
            inputs:
              azureSubscription: ${{ coalesce(env.serviceConnection, parameters.defaultServiceConnection) }}
              azurePowerShellVersion: LatestVersion
              pwsh: true
              ScriptType: InlineScript
              Inline: |
                . '$(libps)'
                foreach ($t in 'Usage_CL','FrontdoorLog_CL','ContainerLog_CL','KubePodInventory_CL','NodePerf_CL','AlertLogs_CL') {
                  $q = Invoke-Kql ($t + ' | count')
                  if (-not $q.Ok) {
                    Add-Summary ('Table: ' + $t) $q.Err 'FAILED'
                  } else {
                    $n = if ($q.Rows.Count) { [long]$q.Rows[0].Count } else { 0 }
                    $status = if ($n -gt 0) { 'OK' } else { 'EMPTY' }
                    Add-Summary ('Table: ' + $t) ($n.ToString() + ' row(s)') $status
                  }
                }

          # ------------------------------------------------------------------
          # 3. [1.1] Log ingestion volume
          # ------------------------------------------------------------------
          - task: AzurePowerShell@5
            displayName: 3. Log ingestion volume
            continueOnError: true
            inputs:
              azureSubscription: ${{ coalesce(env.serviceConnection, parameters.defaultServiceConnection) }}
              azurePowerShellVersion: LatestVersion
              pwsh: true
              ScriptType: InlineScript
              Inline: |
                . '$(libps)'
                $q = Invoke-Kql @'
                Usage_CL
                | summarize TotalVolumeGB = sum(Quantity_d / 1000.) by bin(TimeGenerated, 1d)
                | project Day = TimeGenerated, TotalVolumeGB
                | order by Day asc
                '@
                if (-not $q.Ok)          { Add-Summary 'Log Ingestion' $q.Err 'FAILED'; return }
                if (!$q.Rows.Count)      { Add-Summary 'Log Ingestion' 'query ran, 0 rows' 'EMPTY'; return }
                $vals = $q.Rows | ForEach-Object { [double]$_.TotalVolumeGB }
                $peak = ($vals | Measure-Object -Maximum).Maximum
                $avg  = ($vals | Measure-Object -Average).Average
                $status = if ($avg -gt 0 -and $peak -gt 2 * $avg) { 'WARNING' } else { 'OK' }
                Add-Summary 'Log Ingestion' ('peak {0:F2} / avg {1:F2} GB/day' -f $peak, $avg) $status

          # ------------------------------------------------------------------
          # 4. [1.2] Log existency per deployment + [1.3] alert logs emission
          # ------------------------------------------------------------------
          - task: AzurePowerShell@5
            displayName: 4. Log existency + alert logs
            continueOnError: true
            inputs:
              azureSubscription: ${{ coalesce(env.serviceConnection, parameters.defaultServiceConnection) }}
              azurePowerShellVersion: LatestVersion
              pwsh: true
              ScriptType: InlineScript
              Inline: |
                . '$(libps)'
                $q = Invoke-Kql @'
                let paramPodNamePrefix = "${{ env.podNamePrefix }}";
                ContainerLog_CL
                | join kind = inner (KubePodInventory_CL
                    | project ContainerID_s, PodName = Name_s
                    | where PodName contains paramPodNamePrefix
                    | distinct *) on ContainerID_s
                | project TimeGenerated, deployment = strcat_array(array_slice(split(PodName, "-"), 0, -3), "-")
                | summarize LogCount = count() by deployment
                | order by deployment asc
                '@
                if (-not $q.Ok)     { Add-Summary 'Log Existency' $q.Err 'FAILED' }
                elseif (!$q.Rows.Count) {
                  Add-Summary 'Log Existency' 'no logs from any "${{ env.podNamePrefix }}" deployment' 'WARNING'
                } else {
                  $d = ($q.Rows | ForEach-Object { $_.deployment + '=' + $_.LogCount }) -join ', '
                  Add-Summary 'Log Existency' $d 'OK'
                }

                $a = Invoke-Kql @'
                AlertLogs_CL
                | summarize AggregatedValue = count() by bin(TimeGenerated, 1d)
                '@
                if (-not $a.Ok)          { Add-Summary 'Alert Logs Emission' $a.Err 'FAILED' }
                elseif (!$a.Rows.Count)  { Add-Summary 'Alert Logs Emission' 'no alert logs emitted in window' 'WARNING' }
                else {
                  $total = ($a.Rows | ForEach-Object { [long]$_.AggregatedValue } | Measure-Object -Sum).Sum
                  Add-Summary 'Alert Logs Emission' ($total.ToString() + ' alert log(s) in window') 'OK'
                }

          # ------------------------------------------------------------------
          # 5. [2.1] Frontdoor daily traffic + [2.4] 4xx/5xx buckets
          # ------------------------------------------------------------------
          - task: AzurePowerShell@5
            displayName: 5. Frontdoor traffic + HTTP errors
            continueOnError: true
            inputs:
              azureSubscription: ${{ coalesce(env.serviceConnection, parameters.defaultServiceConnection) }}
              azurePowerShellVersion: LatestVersion
              pwsh: true
              ScriptType: InlineScript
              Inline: |
                . '$(libps)'
                $q = Invoke-Kql @'
                FrontdoorLog_CL
                | where Category_s =~ "FrontdoorAccessLog"
                | summarize Requests = count() by bin(TimeGenerated, 1d)
                | order by TimeGenerated asc
                '@
                if (-not $q.Ok)          { Add-Summary 'Frontdoor Traffic' $q.Err 'FAILED' }
                elseif (!$q.Rows.Count)  { Add-Summary 'Frontdoor Traffic' 'query ran, 0 rows' 'EMPTY' }
                else {
                  $peak = ($q.Rows | ForEach-Object { [long]$_.Requests } | Measure-Object -Maximum).Maximum
                  Add-Summary 'Frontdoor Traffic' ('peak ' + $peak + ' requests/day') 'OK'
                }

                $h = Invoke-Kql @'
                FrontdoorLog_CL
                | where Category_s =~ "FrontdoorAccessLog"
                | project ResponseCode = httpStatusCode_s
                | extend bucket = case(
                    ResponseCode hasprefix "2", "2xx",
                    ResponseCode hasprefix "3", "3xx",
                    ResponseCode hasprefix "4", "4xx",
                    ResponseCode hasprefix "5", "5xx",
                    "other")
                | summarize Count = count() by bucket
                '@
                if (-not $h.Ok)          { Add-Summary 'Frontdoor HTTP Errors' $h.Err 'FAILED'; return }
                if (!$h.Rows.Count)      { Add-Summary 'Frontdoor HTTP Errors' 'query ran, 0 rows' 'EMPTY'; return }
                $total = ($h.Rows | ForEach-Object { [long]$_.Count } | Measure-Object -Sum).Sum
                $bad   = ($h.Rows | Where-Object { $_.bucket -in '4xx', '5xx' } |
                            ForEach-Object { [long]$_.Count } | Measure-Object -Sum).Sum
                $bad   = if ($null -ne $bad) { $bad } else { 0 }
                $rate  = if ($total -gt 0) { [math]::Round($bad / $total * 100, 2) } else { 0 }
                $detail = (($h.Rows | Sort-Object bucket | ForEach-Object { $_.bucket + '=' + $_.Count }) -join ', ') + ' (' + $rate + '% 4xx/5xx)'
                $status = if ($rate -gt ${{ parameters.httpErrorRatePercentThreshold }}) { 'WARNING' } else { 'OK' }
                Add-Summary 'Frontdoor HTTP Errors' $detail $status

          # ------------------------------------------------------------------
          # 6. [2.7] Traffic by tenant
          # ------------------------------------------------------------------
          - task: AzurePowerShell@5
            displayName: 6. Traffic by tenant
            continueOnError: true
            inputs:
              azureSubscription: ${{ coalesce(env.serviceConnection, parameters.defaultServiceConnection) }}
              azurePowerShellVersion: LatestVersion
              pwsh: true
              ScriptType: InlineScript
              Inline: |
                . '$(libps)'
                $q = Invoke-Kql @'
                FrontdoorLog_CL
                | where Category_s =~ "FrontdoorAccessLog"
                | extend reqUri = tostring(requestUri_s)
                | extend tenant_from_path = extract(@"/t/([^/]+)", 1, reqUri)
                | extend custom_domain = extract(@"https?://([^/:]+)", 1, reqUri)
                | extend tenant = case(
                    isnotempty(tenant_from_path), tenant_from_path,
                    isnotempty(custom_domain) and custom_domain !contains "asgardeo.io", custom_domain,
                    "")
                | where isnotempty(tenant)
                | summarize request_count = count() by tenant
                | top 5 by request_count desc
                '@
                if (-not $q.Ok) { Add-Summary 'Top Traffic Tenants' $q.Err 'FAILED'; return }
                $top = (($q.Rows | Select-Object -First 5) | ForEach-Object { $_.tenant + '=' + $_.request_count }) -join ', '
                if ($top) { Add-Summary 'Top Traffic Tenants' $top 'OK' }
                else      { Add-Summary 'Top Traffic Tenants' 'none' 'EMPTY' }

          # ------------------------------------------------------------------
          # 7. [3.1] IS daily ERROR count
          # ------------------------------------------------------------------
          - task: AzurePowerShell@5
            displayName: 7. IS error count
            continueOnError: true
            inputs:
              azureSubscription: ${{ coalesce(env.serviceConnection, parameters.defaultServiceConnection) }}
              azurePowerShellVersion: LatestVersion
              pwsh: true
              ScriptType: InlineScript
              Inline: |
                . '$(libps)'
                $q = Invoke-Kql @'
                let errorType = ": ERROR";
                ContainerLog_CL
                | join kind = inner (KubePodInventory_CL
                    | project ContainerID_s, PodName = Name_s
                    | distinct *) on ContainerID_s
                | project TimeGenerated, PodName, LogEntry_s
                | where LogEntry_s has_cs errorType
                | summarize Count = count() by bin(TimeGenerated, 1d)
                | order by TimeGenerated asc
                '@
                $threshold = ${{ parameters.errorCountDailyThreshold }}
                if (-not $q.Ok)     { Add-Summary 'IS Errors' $q.Err 'FAILED'; return }
                if (!$q.Rows.Count) { Add-Summary 'IS Errors' 'query ran, 0 rows' 'EMPTY'; return }
                $peak = ($q.Rows | ForEach-Object { [long]$_.Count } | Measure-Object -Maximum).Maximum
                $status = if ($peak -gt $threshold) { 'WARNING' } else { 'OK' }
                Add-Summary 'IS Errors' ('peak ' + $peak + ' errors/day (threshold ' + $threshold + ')') $status

          # ------------------------------------------------------------------
          # 8. [3.2] Error count by tenant (full production noise filters)
          # ------------------------------------------------------------------
          - task: AzurePowerShell@5
            displayName: 8. Top error tenants
            continueOnError: true
            inputs:
              azureSubscription: ${{ coalesce(env.serviceConnection, parameters.defaultServiceConnection) }}
              azurePowerShellVersion: LatestVersion
              pwsh: true
              ScriptType: InlineScript
              Inline: |
                . '$(libps)'
                $q = Invoke-Kql @'
                let paramPodNamePrefix = "${{ env.podNamePrefix }}";
                let errorType = "ERROR";
                let errorRegex = ".*iam-cloud-.* : ERROR {.*} .*";
                ContainerLog_CL
                | join kind = inner (KubePodInventory_CL
                    | project ContainerID_s, PodName = Name_s
                    | where PodName contains paramPodNamePrefix
                    | distinct *) on ContainerID_s
                | where LogEntry_s has_cs errorType
                | where LogEntry_s matches regex errorRegex
                | where LogEntry_s !contains "Error when setting claim"
                | where LogEntry_s !contains "No message body reader has been found for class java.lang.String, ContentType: application/octet-stream"
                | where LogEntry_s !contains "Error occurred while getting database type from DB connection org.wso2.carbon.user.core.UserStoreException: Error occurred while getting database type from DB connection"
                | where LogEntry_s !contains "Error occurred while getting database type from DB connection org.wso2.charon3.core.exceptions.CharonException: Error occurred while getting database type from DB connection"
                | where LogEntry_s !contains "This password has been used in recent history. Please choose a different password"
                | where LogEntry_s !contains "Error occurred while getting the OAuth App tenantDomain by Consumer key: CHOREO_SYSTEM_APP_MANAGER"
                | where LogEntry_s !contains "ERROR {org.wso2.carbon.identity.oauth2.grant.jwt.JWTBearerGrantHandler} - JSON Web Token is issued before the allowed time."
                | where LogEntry_s !contains "ERROR {org.wso2.carbon.identity.input.validation.mgt.listener.InputValidationListener} - Failed to validate username for user."
                | where LogEntry_s !contains "Caused by: java.sql.BatchUpdateException: Violation of UNIQUE KEY constraint 'UQ__UM_USER___BBB8EC7E9AE1457C'. Cannot insert duplicate key in object 'dbo.UM_USER_ROLE'."
                | where LogEntry_s !contains "{org.wso2.carbon.identity.application.authentication.framework.config.model.graph.openjdk.nashorn.JsOpenJdkNashornGraphBuilder} - Event handler : authenticationOptions is not a function"
                | where LogEntry_s !contains "{org.wso2.carbon.identity.application.authentication.framework.config.model.graph.js.JsClaims} - Error when getting claim : http://wso2.org/claims/identity/country of user"
                | where not (LogEntry_s matches regex @"Tenant:\s*\[lilt\].*?iam-cloud-carbon\s*:\s*ERROR\s*\{org.wso2.carbon.identity.application.authentication.framework.config.model.graph.js.JsLogger\}")
                | project TimeGenerated, LogEntry_s
                | parse LogEntry_s with * "Tenant: [" TenantName "]" *
                | where isnotempty(TenantName)
                | summarize LogCount = count() by TenantName
                | top 5 by LogCount desc
                '@
                if (-not $q.Ok) { Add-Summary 'Top Error Tenants' $q.Err 'FAILED'; return }
                $top = (($q.Rows | Select-Object -First 5) | ForEach-Object { $_.TenantName + '=' + $_.LogCount }) -join ', '
                if ($top) { Add-Summary 'Top Error Tenants' $top 'OK' }
                else      { Add-Summary 'Top Error Tenants' 'none' 'EMPTY' }

          # ------------------------------------------------------------------
          # 9. [3.5] Long-running script detection
          # ------------------------------------------------------------------
          - task: AzurePowerShell@5
            displayName: 9. Long-running scripts
            continueOnError: true
            inputs:
              azureSubscription: ${{ coalesce(env.serviceConnection, parameters.defaultServiceConnection) }}
              azurePowerShellVersion: LatestVersion
              pwsh: true
              ScriptType: InlineScript
              Inline: |
                . '$(libps)'
                $q = Invoke-Kql @'
                ContainerLog_CL
                | join kind = inner (KubePodInventory_CL
                    | project ContainerID_s, PodName = Name_s
                    | where PodName hasprefix "${{ env.podNamePrefix }}"
                    | distinct *) on ContainerID_s
                | where LogEntry_s has "The script took too much time to execute"
                | project TimeGenerated, deployment = strcat_array(array_slice(split(PodName, "-"), 0, -3), "-")
                | summarize Count = count() by deployment
                '@
                if (-not $q.Ok)     { Add-Summary 'Long-Running Scripts' $q.Err 'FAILED'; return }
                if (!$q.Rows.Count) { Add-Summary 'Long-Running Scripts' 'none detected' 'OK'; return }
                $d = ($q.Rows | ForEach-Object { $_.deployment + '=' + $_.Count }) -join ', '
                Add-Summary 'Long-Running Scripts' $d 'WARNING'

          # ------------------------------------------------------------------
          # 10. [5.1] API latency by API call bucket
          # ------------------------------------------------------------------
          - task: AzurePowerShell@5
            displayName: 10. API latency
            continueOnError: true
            inputs:
              azureSubscription: ${{ coalesce(env.serviceConnection, parameters.defaultServiceConnection) }}
              azurePowerShellVersion: LatestVersion
              pwsh: true
              ScriptType: InlineScript
              Inline: |
                . '$(libps)'
                $q = Invoke-Kql @'
                FrontdoorLog_CL
                | project TimeGenerated, requestUri_s, timeTaken_d
                | extend APICall = case(
                    requestUri_s contains "/oauth2/token", "/oauth2/token",
                    requestUri_s contains "/oauth2/introspection", "/oauth2/introspection",
                    requestUri_s contains "/commonauth", "/commonauth",
                    requestUri_s contains "/authorize", "/authorize",
                    requestUri_s contains "/scim2", "/scim2",
                    requestUri_s contains "/api", "/api",
                    "Other")
                | where APICall != "Other"
                | summarize AvgLatency = round(avg(todouble(timeTaken_d)), 3) by APICall
                | order by AvgLatency desc
                '@
                $threshold = ${{ parameters.apiLatencyThresholdSeconds }}
                if (-not $q.Ok)     { Add-Summary 'API Latency' $q.Err 'FAILED'; return }
                if (!$q.Rows.Count) { Add-Summary 'API Latency' 'query ran, 0 rows' 'EMPTY'; return }
                $detail = ($q.Rows | ForEach-Object { $_.APICall + '=' + $_.AvgLatency + 's' }) -join ', '
                $worst  = [double]$q.Rows[0].AvgLatency
                $status = if ($worst -gt $threshold) { 'WARNING' } else { 'OK' }
                Add-Summary 'API Latency' $detail $status

          # ------------------------------------------------------------------
          # 11. [6.x] AKS pod status + node utilization / over-provisioning
          # ------------------------------------------------------------------
          - task: AzurePowerShell@5
            displayName: 11. AKS pods + node metrics
            continueOnError: true
            inputs:
              azureSubscription: ${{ coalesce(env.serviceConnection, parameters.defaultServiceConnection) }}
              azurePowerShellVersion: LatestVersion
              pwsh: true
              ScriptType: InlineScript
              Inline: |
                . '$(libps)'
                $pods = Invoke-Kql -Days 0.05 -Query @'
                KubePodInventory_CL
                | where TimeGenerated > ago(1h)
                | summarize arg_max(TimeGenerated, PodStatus_s, Namespace_s) by Name_s
                | where PodStatus_s !in ("Running", "Succeeded", "Completed")
                | project Namespace = Namespace_s, Name = Name_s, PodStatus = PodStatus_s
                '@
                if (-not $pods.Ok)        { Add-Summary 'AKS Pods' $pods.Err 'FAILED' }
                elseif ($pods.Rows.Count) {
                  $bad = ($pods.Rows | Select-Object -First 10 | ForEach-Object { $_.Namespace + '/' + $_.Name + '=' + $_.PodStatus }) -join ', '
                  Add-Summary 'AKS Pods' ('unhealthy: ' + $bad) 'WARNING'
                } else                    { Add-Summary 'AKS Pods' 'all pods healthy (last 1h)' 'OK' }

                $nodes = Invoke-Kql -Days 1 -Query @'
                let cpuCap = NodePerf_CL | where ObjectName_s == "K8SNode" and CounterName_s == "cpuCapacityNanoCores"
                  | summarize Cap = avg(CounterValue_d) by Computer_s;
                let cpuUse = NodePerf_CL | where ObjectName_s == "K8SNode" and CounterName_s == "cpuUsageNanoCores"
                  | summarize Use = avg(CounterValue_d) by Computer_s;
                let memCap = NodePerf_CL | where ObjectName_s == "K8SNode" and CounterName_s == "memoryCapacityBytes"
                  | summarize MCap = avg(CounterValue_d) by Computer_s;
                let memUse = NodePerf_CL | where ObjectName_s == "K8SNode" and CounterName_s == "memoryRssBytes"
                  | summarize MUse = avg(CounterValue_d) by Computer_s;
                cpuUse
                | join kind=inner cpuCap on Computer_s
                | join kind=inner memUse on Computer_s
                | join kind=inner memCap on Computer_s
                | project Computer = Computer_s,
                          CpuPct = round(Use  / Cap  * 100, 1),
                          MemPct = round(MUse / MCap * 100, 1)
                | order by Computer asc
                '@
                if (-not $nodes.Ok)     { Add-Summary 'AKS Node Utilization' $nodes.Err 'FAILED'; return }
                if (!$nodes.Rows.Count) { Add-Summary 'AKS Node Utilization' 'no node perf data' 'EMPTY'; return }
                $avgCpu = [math]::Round(($nodes.Rows | ForEach-Object { [double]$_.CpuPct } | Measure-Object -Average).Average, 1)
                $avgMem = [math]::Round(($nodes.Rows | ForEach-Object { [double]$_.MemPct } | Measure-Object -Average).Average, 1)
                $n      = $nodes.Rows.Count
                $result = $n.ToString() + ' node(s): avg CPU ' + $avgCpu + '%, mem ' + $avgMem + '%'
                if ($avgCpu -lt ${{ parameters.nodeCpuOverProvisionPercent }} -and $avgMem -lt ${{ parameters.nodeMemOverProvisionPercent }}) {
                  Add-Summary 'AKS Node Utilization' ($result + ' — possibly over-provisioned, consider scaling down') 'WARNING'
                } else {
                  Add-Summary 'AKS Node Utilization' $result 'OK'
                }

          # ------------------------------------------------------------------
          # 12. Notify Google Chat — one cardsV2 card per environment,
          #     grouped by preflight requirement category, per-item status
          # ------------------------------------------------------------------
          - pwsh: |
              $webhook = $env:GCHAT_WEBHOOK_URL
              if (-not $webhook) { Write-Host 'No GCHAT_WEBHOOK_URL — skipping.'; exit 0 }

              $summaryPath = '$(workDir)/summary.jsonl'
              if (-not (Test-Path -LiteralPath $summaryPath)) { Write-Host '##[error]No summary file.'; exit 1 }

              # Map each check to its requirement category (FORPIPE section)
              $categoryMap = [ordered]@{
                'Access & Prerequisites'     = @('Auth: subscription', 'Auth: Log Analytics')
                'Data Availability'          = @('Table: Usage_CL','Table: FrontdoorLog_CL','Table: ContainerLog_CL','Table: KubePodInventory_CL','Table: NodePerf_CL','Table: AlertLogs_CL')
                '1. Log Review & Monitoring' = @('Log Ingestion','Log Existency','Alert Logs Emission')
                '2. Frontdoor Traffic'       = @('Frontdoor Traffic','Frontdoor HTTP Errors','Top Traffic Tenants')
                '3. Application Errors'      = @('IS Errors','Top Error Tenants','Long-Running Scripts')
                '5. API Performance'         = @('API Latency')
                '6. AKS Health & Capacity'   = @('AKS Pods','AKS Node Utilization')
              }
              $statusIcon = @{ OK='check_circle'; WARNING='warning'; FAILED='error'; ALERT='error'; EXPIRED='error'; EMPTY='do_not_disturb_on'; SKIP='do_not_disturb_on' }
              $attentionStatuses = 'WARNING','ALERT','FAILED','EXPIRED'

              # Parse summary → keyed by check name (last write wins per check)
              $entries = [ordered]@{}
              foreach ($line in Get-Content -LiteralPath $summaryPath) {
                if (-not $line.Trim()) { continue }
                $e = $line | ConvertFrom-Json
                $result = [string]$e.result
                if ($result.Length -gt 600) { $result = $result.Substring(0, 600) + '…' }
                $entries[[string]$e.check] = [pscustomobject]@{ Check = [string]$e.check; Result = $result; Status = ([string]$e.status).ToUpper() }
              }

              $nAttention = @($entries.Values | Where-Object { $_.Status -in $attentionStatuses }).Count
              $nOk        = @($entries.Values | Where-Object { $_.Status -eq 'OK' }).Count
              $nEmpty     = @($entries.Values | Where-Object { $_.Status -in 'EMPTY','SKIP' }).Count

              function New-ItemWidget($Item) {
                $icon = $statusIcon[$Item.Status]; if (-not $icon) { $icon = 'help' }
                @{ decoratedText = @{
                     startIcon = @{ materialIcon = @{ name = $icon } }
                     topLabel  = ($Item.Check + '  •  ' + $Item.Status)
                     text      = if ($Item.Result) { $Item.Result } else { ' ' }
                     wrapText  = $true
                   } }
              }

              $sections = [System.Collections.Generic.List[object]]::new()

              # Environment context — engineers see exactly what this card covers
              $sections.Add(@{
                header = 'Environment'
                collapsible = $true
                uncollapsibleWidgetsCount = 1
                widgets = @(
                  @{ decoratedText = @{ startIcon = @{ materialIcon = @{ name = 'cloud' } }
                       topLabel = '${{ env.tier }} • ${{ env.region }}'
                       text = '${{ env.name }}'; wrapText = $true } },
                  @{ decoratedText = @{ topLabel = 'Subscription'; text = '${{ env.subscriptionId }}'; wrapText = $true } },
                  @{ decoratedText = @{ topLabel = 'Resource group / Workspace'; text = '${{ env.resourceGroup }} / ${{ env.workspaceId }}'; wrapText = $true } },
                  @{ decoratedText = @{ topLabel = 'Pod prefix / Lookback'; text = '${{ env.podNamePrefix }} / ${{ parameters.lookbackDays }} day(s)'; wrapText = $true } }
                )
              })

              # One section per requirement category, in requirement order.
              # Sections containing any attention item stay expanded; healthy
              # sections collapse fully to keep the card short.
              $seen = [System.Collections.Generic.HashSet[string]]::new()
              foreach ($cat in $categoryMap.Keys) {
                $items = @()
                foreach ($check in $categoryMap[$cat]) {
                  if ($entries.Contains($check)) { $items += $entries[$check]; [void]$seen.Add($check) }
                }
                if (-not $items.Count) { continue }
                $catAttention = @($items | Where-Object { $_.Status -in $attentionStatuses }).Count
                $suffix = if ($catAttention) { '  ⚠ ' + $catAttention } else { '  ✓' }
                $section = @{
                  header  = ('{0}{1}' -f $cat, $suffix)
                  widgets = @($items | ForEach-Object { New-ItemWidget $_ })
                }
                if (-not $catAttention) {
                  $section.collapsible = $true
                  $section.uncollapsibleWidgetsCount = 0
                }
                $sections.Add($section)
              }

              # Anything not mapped (future checks) — never silently dropped
              $other = @($entries.Values | Where-Object { -not $seen.Contains($_.Check) })
              if ($other.Count) {
                $sections.Add(@{ header = 'Other checks'; widgets = @($other | ForEach-Object { New-ItemWidget $_ }) })
              }

              $runUrl = '$(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)'
              $sections.Add(@{ widgets = @(@{ buttonList = @{ buttons = @(
                @{ text = 'Open pipeline run'; onClick = @{ openLink = @{ url = $runUrl } } }
              ) } }) })

              $overall = if ($nAttention) { '⚠ NEEDS ATTENTION' } else { '✅ ALL CLEAR' }
              $card = @{
                cardsV2 = @(@{
                  cardId = 'preflight-${{ env.name }}'
                  card = @{
                    header = @{
                      title    = 'Weekly Preflight ${{ env.tier }} — ${{ env.name }}'
                      subtitle = ($overall + '  |  ' +
                                  (Get-Date).ToUniversalTime().ToString('yyyy-MM-dd HH:mm UTC') +
                                  '  |  ⚠ ' + $nAttention + '  ✓ ' + $nOk + '  ∅ ' + $nEmpty)
                    }
                    sections = $sections
                  }
                })
              }

              $json  = $card | ConvertTo-Json -Depth 20 -Compress
              $bytes = [System.Text.Encoding]::UTF8.GetByteCount($json)
              if ($bytes -gt 45000) { Write-Host "##[warning]Card payload ${bytes} bytes — near Google Chat's ~50KB limit." }
              try {
                Invoke-RestMethod -Method Post -Uri $webhook -ContentType 'application/json; charset=UTF-8' -Body $json | Out-Null
                Write-Host "Posted preflight card for '${{ env.name }}' ($bytes bytes)."
              } catch {
                Write-Host ('##[error]Google Chat POST failed: ' + $_.Exception.Message)
                exit 1
              }
            displayName: 12. Notify Google Chat
            condition: always()
            env:
              GCHAT_WEBHOOK_URL: $(GCHAT_WEBHOOK_URL)