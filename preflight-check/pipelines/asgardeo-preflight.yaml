trigger: none

schedules:
  - cron: "0 2 * * 1"
    displayName: Weekly pre-flight (Mon 02:00 UTC)
    branches:
      include:
        - main
    always: true

parameters:
  - name: lookbackDays
    type: number
    displayName: "Look-back window in days for all log/metric queries (default 7 = last week)"
    default: 7

  - name: certExpiryWarningDays
    type: number
    displayName: "Flag Key Vault certificates expiring within N days (default 30)"
    default: 30

  - name: sqlStorageWarnPercent
    type: number
    displayName: "Flag SQL databases over N% storage used (default 75)"
    default: 75

  - name: errorCountDailyThreshold
    type: number
    displayName: "Flag if any single day's IS error count exceeds N (default 5000)"
    default: 5000

  - name: apiLatencyThresholdSeconds
    type: number
    displayName: "Flag API endpoints whose avg latency exceeds N seconds (default 1.0)"
    default: 1.0

  - name: costIncreasePercentThreshold
    type: number
    displayName: "Flag week-over-week cost increase over N% (default 20)"
    default: 20

  # ---- Anomaly-detection parameters (drive test-setup/anomaly-queries.kql) ----
  - name: anomalySensitivity
    type: number
    displayName: "series_decompose_anomalies score threshold; lower = more sensitive (default 1.5)"
    default: 1.5

  - name: newErrorRecentHours
    type: number
    displayName: "Recent window (hours) vs baseline for new-error / spike / drop checks (default 24)"
    default: 24

  - name: tenantErrorSpikeFactor
    type: number
    displayName: "Flag a tenant whose recent errors exceed N x its trailing daily average (default 3)"
    default: 3

  - name: http5xxRatioPercentThreshold
    type: number
    displayName: "Flag any hour whose 5xx share of Frontdoor responses exceeds N% (default 5)"
    default: 5

  - name: trafficDropPercentThreshold
    type: number
    displayName: "Flag a tenant whose recent traffic dropped >= N% vs baseline (default 50)"
    default: 50

  - name: environments
    type: object
    displayName: "Environments to scan (subscription/RG/SQL/workspace + AKS service connection)"
    default:
      # Test env: matches the resources created by test-setup/ in the rnd subscription
      # that the AZURE_SERVICE_CONNECTION service principal (asgardeo-rnd-001) can access.
      - { name: "rnd-test", subscriptionId: "38785beb-5019-4896-8679-3d41ddacc4b1", resourceGroup: "rg-thevindu", sqlServer: "", logAnalyticsWorkspaceId: "e5d406b5-f761-48a7-9466-9d0d4a768f01", aksServiceConnection: "rnd-aks-thevindu" }
      # Prod (requires a service connection whose SP has access to subscription ea3af8ec-...):
      # - { name: "prod-us", subscriptionId: "ea3af8ec-73de-4e7c-870f-7a5975f7db2d", resourceGroup: "rg-asgardeo-main-prod-eastus2-001", sqlServer: "sql-asgardeo-main-prod-eastus2-001", logAnalyticsWorkspaceId: "", aksServiceConnection: "" }
      # - { name: "prod-eu", subscriptionId: "ea3af8ec-73de-4e7c-870f-7a5975f7db2d", resourceGroup: "rg-asgardeo-main-eupr-northeurope-001", sqlServer: "sql-asgardeo-main-eupr-northeurope-001", logAnalyticsWorkspaceId: "", aksServiceConnection: "" }

variables:
  reportFile: $(Build.ArtifactStagingDirectory)/preflight-report.md

stages:
  - stage: PreFlight
    displayName: Asgardeo Pre-Flight Check
    jobs:
      - job: RunChecks
        displayName: Run automated pre-flight data pulls
        timeoutInMinutes: 60
        pool:
          name: rnd-thevindu-vmss
        steps:
          - checkout: none

          - bash: |
              sudo apt-get update -qq && sudo apt-get install -y jq
            displayName: Install jq

          - task: AzureCLI@2
            displayName: Validate access (diagnostics)
            continueOnError: true
            inputs:
              azureSubscription: thevindu-rnd-sc
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -uo pipefail
                SUB="38785beb-5019-4896-8679-3d41ddacc4b1"
                RG="rg-thevindu"
                WS="e5d406b5-f761-48a7-9466-9d0d4a768f01"
                pass() { echo "PASS: $1"; }
                fail() { echo "FAIL: $1"; }

                echo "=== Identity ==="
                az account show --query "{sub:id, name:name, tenant:tenantId}" -o json

                echo "=== Subscription set ==="
                az account set --subscription "$SUB" && pass "az account set $SUB" || fail "az account set $SUB"

                echo "=== Resource group ==="
                az group show -n "$RG" -o tsv --query name >/dev/null 2>&1 && pass "read rg $RG" || fail "read rg $RG"

                echo "=== Log Analytics query (workspace $WS) ==="
                if az monitor log-analytics query -w "$WS" --analytics-query "print x=1" -o json 2>/tmp/la.err; then
                  pass "log-analytics query"
                  echo "--- _CL table row counts (last 7d; 0 = data not landed yet, can take 5-15 min) ---"
                  for T in Usage_CL FrontdoorAccessLog_CL ContainerLog_CL KubePodInventory_CL; do
                    C=$(az monitor log-analytics query -w "$WS" --analytics-query "$T | where TimeGenerated > ago(7d) | count" -o tsv --query "[0].Count" 2>/dev/null || echo "?")
                    echo "  $T: ${C:-0} rows"
                  done
                else
                  fail "log-analytics query"; cat /tmp/la.err
                fi

                echo "=== Key Vault list ==="
                az keyvault list --query "[].name" -o tsv 2>/tmp/kv.err && pass "keyvault list" || { fail "keyvault list"; cat /tmp/kv.err; }

                echo "=== Storage accounts ==="
                az storage account list -g "$RG" --query "[].name" -o tsv 2>/dev/null && pass "storage list" || fail "storage list"

                echo "=== Cost management ==="
                if az costmanagement query --type ActualCost --timeframe MonthToDate \
                     --dataset-aggregation '{"total":{"name":"Cost","function":"Sum"}}' \
                     --scope "/subscriptions/$SUB" -o json 2>/tmp/cost.err >/dev/null; then
                  pass "cost query"
                else
                  fail "cost query"; cat /tmp/cost.err
                fi

                echo "=== Secure score ==="
                az security secure-scores list -o json 2>/dev/null >/dev/null && pass "secure score" || fail "secure score (Defender/perms)"

                echo "=== Diagnostics complete (non-blocking) ==="

          - task: AzureCLI@2
            displayName: Run pre-flight checks
            inputs:
              azureSubscription: thevindu-rnd-sc
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                # NOTE: deliberately NOT using `set -e`. Every check below is best-effort
                # (guarded with `|| true` / `2>/dev/null` / `// 0`); a single failing data
                # pull must degrade that one line, not abort the whole report. `-u`/pipefail
                # are kept. Breadcrumbs go to stderr so the console is never blank on failure.
                set -uo pipefail
                trap 'echo ">> last command exited $? at line $LINENO" >&2' ERR
                REPORT="$(reportFile)"
                LOOKBACK="${{ parameters.lookbackDays }}"
                ERR_TH="${{ parameters.errorCountDailyThreshold }}"
                LAT_TH="${{ parameters.apiLatencyThresholdSeconds }}"
                SQL_TH="${{ parameters.sqlStorageWarnPercent }}"
                CERT_TH="${{ parameters.certExpiryWarningDays }}"
                COST_TH="${{ parameters.costIncreasePercentThreshold }}"
                SENS="${{ parameters.anomalySensitivity }}"
                RECENT_H="${{ parameters.newErrorRecentHours }}"
                TSPIKE="${{ parameters.tenantErrorSpikeFactor }}"
                P5XX="${{ parameters.http5xxRatioPercentThreshold }}"
                DROP="${{ parameters.trafficDropPercentThreshold }}"
                ENVS='${{ convertToJson(parameters.environments) }}'
                SUBS=$(echo "$ENVS" | jq -r '[.[].subscriptionId]|unique|.[]')

                {
                  echo "# Asgardeo Pre-Flight Check - $(date -u '+%Y-%m-%d %H:%M UTC')"
                  echo
                  echo "_Automated run. Look-back ${LOOKBACK}d. Anomalies flagged as WARNING; rest is informational._"
                  echo "_Thresholds: SQL >${SQL_TH}%, error/day >${ERR_TH}, latency >${LAT_TH}s, cost WoW >${COST_TH}%, cert <${CERT_TH}d._"
                  echo
                  echo "> Not automated (manual on-call): Site24x7 triage, dashboard anomaly-spotting,"
                  echo "> Defender review, GitHub/ServiceNow issue review, L1/L2 Nissan PIC checks."
                } > "$REPORT"

                echo "$ENVS" | jq -c '.[]' | while IFS= read -r env; do
                  IFS=$'\t' read -r NAME SUB RG SERVER WS \
                    <<<"$(echo "$env" | jq -r '[.name,.subscriptionId,.resourceGroup,.sqlServer,.logAnalyticsWorkspaceId]|@tsv')"
                  if ! az account set --subscription "$SUB" 2>/dev/null; then
                    echo -e "\n## [$NAME] $RG" >> "$REPORT"
                    echo "- WARNING: subscription \`$SUB\` not accessible to this service connection - environment skipped." >> "$REPORT"
                    continue
                  fi
                  echo ">> scanning env [$NAME] rg=$RG sub=$SUB ws=${WS:-<none>}" >&2
                  echo -e "\n## [$NAME] $RG" >> "$REPORT"

                  if [ -z "$WS" ] || [ "$WS" = "null" ]; then
                    WS=$(az monitor log-analytics workspace list -g "$RG" --query "[0].customerId" -o tsv 2>/dev/null || true)
                  fi
                  if [ -n "$WS" ] && [ "$WS" != "null" ]; then
                    la() { az monitor log-analytics query -w "$WS" --analytics-query "$1" --timespan "P${LOOKBACK}D" -o json 2>/dev/null || echo '[]'; }

                    # NOTE: TEST queries — these read the custom `_CL` tables created by
                    # test-setup/03-upload-sample-logs.sh (Usage_CL, FrontdoorAccessLog_CL,
                    # ContainerLog_CL, KubePodInventory_CL). For PROD, swap back to the
                    # built-in tables (Usage / AzureDiagnostics / ContainerLog / KubePodInventory).
                    ING=$(la 'Usage_CL | summarize TotalVolumeGB = sum(Quantity_d / 1000.) by bin(TimeGenerated, 1d) | project TotalVolumeGB | order by TotalVolumeGB asc')
                    ING_MAX=$(echo "$ING" | jq -r '[.[].TotalVolumeGB|tonumber]|max // 0')
                    ING_AVG=$(echo "$ING" | jq -r 'if length == 0 then 0 else ([.[].TotalVolumeGB|tonumber]|add) / length end')
                    echo "- Log ingestion: peak ${ING_MAX} GB/day, avg ${ING_AVG} GB/day" >> "$REPORT"
                    awk -v mx="$ING_MAX" -v av="$ING_AVG" 'BEGIN{exit (av>0 && mx>2*av)?0:1}' \
                      && echo "  - WARNING: Peak day more than 2x the average - investigate." >> "$REPORT" || true

                    FD_MAX=$(la 'FrontdoorAccessLog_CL | summarize Requests = count() by bin(TimeGenerated, 1d) | project Requests' | jq -r '[.[].Requests|tonumber]|max // 0')
                    echo "- Frontdoor traffic: peak ${FD_MAX} requests/day" >> "$REPORT"

                    ERR_MAX=$(la 'ContainerLog_CL | join kind=inner (KubePodInventory_CL | project ContainerID_s, Namespace_s | distinct *) on ContainerID_s | where LogEntry_s has_cs ": ERROR" | summarize Count = count() by bin(TimeGenerated, 1d) | project Count' | jq -r '[.[].Count|tonumber]|max // 0')
                    echo "- Error count: peak ${ERR_MAX} errors/day" >> "$REPORT"
                    awk -v mx="$ERR_MAX" -v th="$ERR_TH" 'BEGIN{exit (mx>th)?0:1}' \
                      && echo "  - WARNING: Daily error count exceeded ${ERR_TH}." >> "$REPORT" || true
                    TOPT=$(la 'ContainerLog_CL | join kind=inner (KubePodInventory_CL | where Name_s contains "wso2is-deployment" | project ContainerID_s | distinct *) on ContainerID_s | where LogEntry_s has_cs "ERROR" | parse LogEntry_s with * "Tenant: [" TenantName "]" * | where isnotempty(TenantName) | summarize LogCount = count() by TenantName | top 5 by LogCount desc' | jq -r '[.[]|"\(.TenantName)=\(.LogCount)"]|join(", ")')
                    [ -n "$TOPT" ] && echo "  - Top error tenants: ${TOPT}" >> "$REPORT" || true

                    TRAF=$(la 'FrontdoorAccessLog_CL | extend reqUri = tostring(requestUri_s) | extend tenant_from_path = extract(@"/t/([^/]+)", 1, reqUri) | extend custom_domain = extract(@"https?://([^/:]+)", 1, reqUri) | extend tenant = case(isnotempty(tenant_from_path), tenant_from_path, isnotempty(custom_domain) and custom_domain !contains "asgardeo.io", custom_domain, "") | where isnotempty(tenant) | summarize request_count = count() by tenant | top 5 by request_count desc' | jq -r '[.[]|"\(.tenant)=\(.request_count)"]|join(", ")')
                    [ -n "$TRAF" ] && echo "  - Top traffic tenants: ${TRAF}" >> "$REPORT" || true

                    # ---------- Anomaly detection (test-setup/anomaly-queries.kql) ----------
                    # Each query returns rows ONLY when anomalous, so a non-empty result is a
                    # finding. Parameters: anomalySensitivity, newErrorRecentHours,
                    # tenantErrorSpikeFactor, http5xxRatioPercentThreshold, trafficDropPercentThreshold.
                    echo "- Anomaly detection (look-back ${LOOKBACK}d, recent ${RECENT_H}h, sensitivity ${SENS}):" >> "$REPORT"
                    ANOM=0

                    A=$(la "Usage_CL | make-series VolGB = sum(Quantity_d/1000.) default=0 on TimeGenerated from ago(${LOOKBACK}d) to now() step 1h | extend (flag,score,baseline)=series_decompose_anomalies(VolGB, ${SENS}) | mv-expand TimeGenerated to typeof(datetime), VolGB to typeof(double), flag to typeof(long), baseline to typeof(double) | where flag != 0 | project t=format_datetime(TimeGenerated,'MM-dd HH:mm'), v=round(VolGB,1), b=round(baseline,1), dir=iff(flag>0,'spike','drop')")
                    if [ "$(echo "$A" | jq 'length')" -gt 0 ]; then
                      echo "  - WARNING: Ingestion-volume anomaly: $(echo "$A" | jq -r '[.[]|"\(.t) \(.dir) \(.v)GB(base \(.b))"]|join("; ")' | cut -c1-280)" >> "$REPORT"; ANOM=1
                    fi

                    A=$(la "FrontdoorAccessLog_CL | where Category_s =~ 'FrontdoorAccessLog' | make-series Requests = count() default=0 on TimeGenerated from ago(${LOOKBACK}d) to now() step 1h | extend (flag,score,baseline)=series_decompose_anomalies(Requests, ${SENS}) | mv-expand TimeGenerated to typeof(datetime), Requests to typeof(long), flag to typeof(long), baseline to typeof(double) | where flag != 0 | project t=format_datetime(TimeGenerated,'MM-dd HH:mm'), r=Requests, b=round(baseline,0), dir=iff(flag>0,'spike','drop')")
                    if [ "$(echo "$A" | jq 'length')" -gt 0 ]; then
                      echo "  - WARNING: Frontdoor traffic anomaly: $(echo "$A" | jq -r '[.[]|"\(.t) \(.dir) \(.r)req(base \(.b))"]|join("; ")' | cut -c1-280)" >> "$REPORT"; ANOM=1
                    fi

                    A=$(la "ContainerLog_CL | where LogEntry_s has_cs ': ERROR' | make-series Errors = count() default=0 on TimeGenerated from ago(${LOOKBACK}d) to now() step 1h | extend (flag,score,baseline)=series_decompose_anomalies(Errors, ${SENS}) | mv-expand TimeGenerated to typeof(datetime), Errors to typeof(long), flag to typeof(long), baseline to typeof(double) | where flag > 0 | project t=format_datetime(TimeGenerated,'MM-dd HH:mm'), e=Errors, b=round(baseline,0)")
                    if [ "$(echo "$A" | jq 'length')" -gt 0 ]; then
                      echo "  - WARNING: Error-rate burst: $(echo "$A" | jq -r '[.[]|"\(.t) \(.e)err(base \(.b))"]|join("; ")' | cut -c1-280)" >> "$REPORT"; ANOM=1
                    fi

                    A=$(la "ContainerLog_CL | where TimeGenerated > ago(${LOOKBACK}d) | where LogEntry_s has_cs ': ERROR' | parse LogEntry_s with * ' : ERROR {' Class '}' Rest | where isnotempty(Class) | extend Signature = strcat(Class, ' |', substring(tostring(Rest), 0, 60)) | extend Window = iff(TimeGenerated > ago(${RECENT_H}h), 'recent', 'baseline') | summarize recent=countif(Window=='recent'), baseline=countif(Window=='baseline') by Signature | where baseline == 0 and recent > 0 | project Signature, recent | top 10 by recent desc")
                    if [ "$(echo "$A" | jq 'length')" -gt 0 ]; then
                      echo "  - WARNING: New error signature(s) in last ${RECENT_H}h: $(echo "$A" | jq -r '[.[]|"\(.Signature) (x\(.recent))"]|join("; ")' | cut -c1-280)" >> "$REPORT"; ANOM=1
                    fi

                    A=$(la "ContainerLog_CL | where TimeGenerated > ago(${LOOKBACK}d) | where LogEntry_s has_cs ': ERROR' | parse LogEntry_s with * 'Tenant: [' TenantName ']' * | where isnotempty(TenantName) | extend Window = iff(TimeGenerated > ago(${RECENT_H}h), 'recent', 'baseline') | summarize recent=countif(Window=='recent'), baselinePerDay=toreal(countif(Window=='baseline')) / ((${LOOKBACK}d - ${RECENT_H}h)/1d) by TenantName | where baselinePerDay > 0 and recent > ${TSPIKE} * baselinePerDay | project TenantName, recent, factor=round(recent/baselinePerDay,1) | top 10 by factor desc")
                    if [ "$(echo "$A" | jq 'length')" -gt 0 ]; then
                      echo "  - WARNING: Per-tenant error spike (>= ${TSPIKE}x baseline): $(echo "$A" | jq -r '[.[]|"\(.TenantName) x\(.factor) (\(.recent) recent)"]|join("; ")' | cut -c1-280)" >> "$REPORT"; ANOM=1
                    fi

                    A=$(la "FrontdoorAccessLog_CL | where Category_s =~ 'FrontdoorAccessLog' | where TimeGenerated > ago(${LOOKBACK}d) | extend code = toint(httpStatusCode_s) | summarize total=count(), errors=countif(code >= 500) by bin(TimeGenerated, 1h) | extend pct5xx = round(100.0*errors/total, 2) | where total > 0 and pct5xx > ${P5XX} | project t=format_datetime(TimeGenerated,'MM-dd HH:mm'), pct5xx, errors | order by t asc")
                    if [ "$(echo "$A" | jq 'length')" -gt 0 ]; then
                      echo "  - WARNING: HTTP 5xx ratio > ${P5XX}%: $(echo "$A" | jq -r '[.[]|"\(.t) \(.pct5xx)% (\(.errors) errs)"]|join("; ")' | cut -c1-280)" >> "$REPORT"; ANOM=1
                    fi

                    A=$(la "FrontdoorAccessLog_CL | where Category_s =~ 'FrontdoorAccessLog' | where TimeGenerated > ago(${LOOKBACK}d) | extend endpoint = extract(@'(/[^?]*)', 1, tostring(requestUri_s)) | where isnotempty(endpoint) | summarize p95=percentile(timeTaken_d, 95), n=count() by endpoint | where p95 > ${LAT_TH} | project endpoint, p95=round(p95,3), n | top 10 by p95 desc")
                    if [ "$(echo "$A" | jq 'length')" -gt 0 ]; then
                      echo "  - WARNING: Endpoint latency p95 > ${LAT_TH}s: $(echo "$A" | jq -r '[.[]|"\(.endpoint) \(.p95)s"]|join("; ")' | cut -c1-280)" >> "$REPORT"; ANOM=1
                    fi

                    A=$(la "FrontdoorAccessLog_CL | where Category_s =~ 'FrontdoorAccessLog' | where TimeGenerated > ago(${LOOKBACK}d) | extend reqUri = tostring(requestUri_s) | extend tenant_from_path = extract(@'/t/([^/]+)', 1, reqUri) | extend custom_domain = extract(@'https?://([^/:]+)', 1, reqUri) | extend tenant = case(isnotempty(tenant_from_path), tenant_from_path, isnotempty(custom_domain) and custom_domain !contains 'asgardeo.io', custom_domain, '') | where isnotempty(tenant) | extend Window = iff(TimeGenerated > ago(${RECENT_H}h), 'recent', 'baseline') | summarize recent=countif(Window=='recent'), baselinePerDay=toreal(countif(Window=='baseline')) / ((${LOOKBACK}d - ${RECENT_H}h)/1d) by tenant | where baselinePerDay > 0 and recent < baselinePerDay * (1 - ${DROP}/100.0) | project tenant, dropPct=round(100.0*(baselinePerDay-recent)/baselinePerDay,1) | top 10 by dropPct desc")
                    if [ "$(echo "$A" | jq 'length')" -gt 0 ]; then
                      echo "  - WARNING: Per-tenant traffic drop >= ${DROP}%: $(echo "$A" | jq -r '[.[]|"\(.tenant) -\(.dropPct)%"]|join("; ")' | cut -c1-280)" >> "$REPORT"; ANOM=1
                    fi

                    [ "$ANOM" -eq 0 ] && echo "  - No time-series / baseline anomalies detected." >> "$REPORT" || true
                  else
                    echo "- WARNING: No Log Analytics workspace in \`$RG\` - log checks skipped." >> "$REPORT"
                  fi

                  DBS=$(az sql db list -g "$RG" -s "$SERVER" --query "[?name!='master'].name" -o tsv 2>/dev/null || true)
                  if [ -z "$DBS" ]; then
                    echo "- WARNING: No databases found on \`$SERVER\`." >> "$REPORT"
                  else
                    for DB in $DBS; do
                      USAGE=$(az sql db list-usages -g "$RG" -s "$SERVER" -n "$DB" -o json 2>/dev/null || echo '[]')
                      USED_BYTES=$(echo "$USAGE" | jq -r '.[]|select(.name=="database_size")|.currentValue' | head -1)
                      MAX_BYTES=$(echo "$USAGE" | jq -r '.[]|select(.name=="database_size")|.limit' | head -1)
                      if [ -n "${USED_BYTES:-}" ] && [ "$USED_BYTES" != "null" ] && [ -n "${MAX_BYTES:-}" ] && [ "$MAX_BYTES" != "0" ] && [ "$MAX_BYTES" != "null" ]; then
                        read -r MAX_GB USED_PCT FREE_PCT <<<"$(awk -v u="$USED_BYTES" -v m="$MAX_BYTES" 'BEGIN{printf "%.2f %.2f %.2f", m/(1024^3), (u/m)*100, 100-(u/m)*100}')"
                        if awk -v p="$USED_PCT" -v t="$SQL_TH" 'BEGIN{exit (p<t)?0:1}'; then
                          echo "- DB ${DB}: ${MAX_GB} GB max, ${USED_PCT}% used, ${FREE_PCT}% free - SAFE" >> "$REPORT"
                        else
                          echo "- WARNING: DB ${DB}: ${MAX_GB} GB max, ${USED_PCT}% used, ${FREE_PCT}% free - ALERT (>= ${SQL_TH}%)" >> "$REPORT"
                        fi
                      else
                        echo "- DB ${DB}: usage unavailable" >> "$REPORT"
                      fi
                    done
                  fi

                  for SAID in $(az storage account list -g "$RG" --query "[].id" -o tsv 2>/dev/null || true); do
                    BYTES=$(az monitor metrics list --resource "$SAID" --metric UsedCapacity --interval PT1H --query "value[0].timeseries[0].data[-1].average" -o tsv 2>/dev/null || echo "")
                    if [ -n "${BYTES:-}" ] && [ "$BYTES" != "None" ]; then
                      echo "- Archival ${SAID##*/}: $(awk -v b="$BYTES" 'BEGIN{printf "%.2f",b/1073741824}') GiB used" >> "$REPORT"
                    fi
                  done
                done

                NOW=$(date -u +%s)
                if date -u -d "yesterday" +%F >/dev/null 2>&1; then
                  TO=$(date -u -d "yesterday" +%F); FROM=$(date -u -d "8 days ago" +%F)
                  PTO=$(date -u -d "8 days ago" +%F); PFROM=$(date -u -d "15 days ago" +%F)
                else
                  TO=$(date -u -v-1d +%F); FROM=$(date -u -v-8d +%F)
                  PTO=$(date -u -v-8d +%F); PFROM=$(date -u -v-15d +%F)
                fi

                for SUB in $SUBS; do
                  if ! az account set --subscription "$SUB" 2>/dev/null; then
                    echo -e "\n## Subscription $SUB" >> "$REPORT"
                    echo "- WARNING: subscription \`$SUB\` not accessible to this service connection - skipped." >> "$REPORT"
                    continue
                  fi
                  echo ">> subscription-level checks for $SUB (keyvault certs, cost, secure score)" >&2
                  echo -e "\n## Subscription $SUB" >> "$REPORT"

                  for V in $(az keyvault list --query "[].name" -o tsv 2>/dev/null || true); do
                    az keyvault certificate list --vault-name "$V" --query "[].{name:name,exp:attributes.expires}" -o json 2>/dev/null | jq -c '.[]' | while read -r cert; do
                      CN=$(echo "$cert" | jq -r '.name'); EXP=$(echo "$cert" | jq -r '.exp')
                      [ "$EXP" = "null" ] && continue
                      EXP_S=$(date -u -d "$EXP" +%s 2>/dev/null || date -u -j -f "%Y-%m-%dT%H:%M:%S+00:00" "${EXP%%.*}+00:00" +%s 2>/dev/null || echo 0)
                      [ "$EXP_S" = "0" ] && continue
                      DAYS=$(( (EXP_S - NOW) / 86400 ))
                      if [ "$DAYS" -lt 0 ]; then
                        echo "- WARNING: EXPIRED cert ${V}/${CN} ($(( -DAYS ))d ago, ${EXP%%T*})" >> "$REPORT"
                      elif [ "$DAYS" -lt "$CERT_TH" ]; then
                        echo "- WARNING: cert ${V}/${CN} expires in ${DAYS}d (${EXP%%T*})" >> "$REPORT"
                      fi
                    done
                  done

                  cost() { az costmanagement query --type ActualCost --timeframe Custom --time-period from="$1" to="$2" --dataset-granularity None --dataset-aggregation '{"total":{"name":"Cost","function":"Sum"}}' --scope "/subscriptions/$SUB" --query "properties.rows[0][0]" -o tsv 2>/dev/null || echo 0; }
                  THIS=$(cost "$FROM" "$TO"); PREV=$(cost "$PFROM" "$PTO"); THIS=${THIS:-0}; PREV=${PREV:-0}
                  echo "- Cost: this week (${FROM}..${TO}) \$$(printf '%.2f' "$THIS") | prior \$$(printf '%.2f' "$PREV")" >> "$REPORT"
                  awk -v t="$THIS" -v p="$PREV" -v th="$COST_TH" 'BEGIN{exit (p>0 && ((t-p)/p*100)>th)?0:1}' \
                    && echo "  - WARNING: Cost up $(awk -v t="$THIS" -v p="$PREV" 'BEGIN{printf "%.1f",(t-p)/p*100}')% week-over-week." >> "$REPORT" || true

                  SCORE=$(az security secure-scores show --name ascScore -o json 2>/dev/null || az security secure-scores list -o json 2>/dev/null | jq '.[0]' || echo '{}')
                  PCT=$(echo "$SCORE" | jq -r '.score.percentage // .properties.score.percentage // empty')
                  if [ -n "${PCT:-}" ]; then
                    echo "- Secure score: $(awk -v p="$PCT" 'BEGIN{printf "%.0f",p*100}')%" >> "$REPORT"
                  else
                    echo "- Secure score: unavailable (Defender plan / permissions)." >> "$REPORT"
                  fi
                done

          - ${{ each env in parameters.environments }}:
            - ${{ if ne(env.aksServiceConnection, '') }}:
              - task: Kubernetes@1
                displayName: AKS login [${{ env.name }}]
                inputs:
                  connectionType: Kubernetes Service Connection
                  kubernetesServiceEndpoint: ${{ env.aksServiceConnection }}
                  command: login
              - bash: |
                  set -euo pipefail
                  REPORT="$(reportFile)"
                  echo -e "\n## AKS [${{ env.name }}]" >> "$REPORT"
                  BAD=$(kubectl get pods -A --no-headers 2>/dev/null | grep -Ev 'Running|Completed' || true)
                  if [ -n "$BAD" ]; then
                    echo "- WARNING: Pods not Running/Completed:" >> "$REPORT"
                    printf '```\n%s\n```\n' "$BAD" >> "$REPORT"
                  else
                    echo "- All pods Running/Completed." >> "$REPORT"
                  fi
                  TOP=$(kubectl top nodes --no-headers 2>/dev/null || true)
                  [ -n "$TOP" ] && printf -- '- Node utilisation (name / CPU%% / mem%%):\n```\n%s\n```\n' "$TOP" >> "$REPORT" || true
                displayName: AKS pod/node check [${{ env.name }}]

          - bash: |
              echo "===== CONSOLIDATED PRE-FLIGHT REPORT ====="
              cat "$(reportFile)"
            displayName: Print consolidated report

          - publish: $(reportFile)
            artifact: preflight-report
            displayName: Publish report artifact

          - bash: |
              set -euo pipefail
              [ -z "${GCHAT_WEBHOOK_URL:-}" ] && { echo "GCHAT_WEBHOOK_URL not set - skipping."; exit 0; }
              ANOMALIES=$(grep "WARNING:" "$(reportFile)" | sed -E 's/^[[:space:]]*-?[[:space:]]*WARNING:[[:space:]]*//' || true)
              COUNT=$(printf '%s\n' "$ANOMALIES" | grep -c . || true)

              if [ "$COUNT" -eq 0 ]; then
                SECTION=$(jq -n '{header:"Status",widgets:[{decoratedText:{startIcon:{materialIcon:{name:"check_circle"}},text:"<b>No anomalies detected this week.</b>"}}]}')
                SUB="No anomalies"
              else
                SECTION=$(printf '%s' "$ANOMALIES" | jq -R -s --arg c "$COUNT" '
                  {header:("Anomalies ("+$c+")"),
                   widgets:(split("\n")|map(select(length>0))[:30]
                            |map({decoratedText:{startIcon:{materialIcon:{name:"warning"}},text:.}}))}')
                SUB="$COUNT anomaly(ies) detected"
              fi

              CARD=$(jq -n --arg sub "$SUB" --arg ts "$(date -u '+%Y-%m-%d %H:%M UTC')" \
                --arg url "${BUILD_URL:-}" --argjson section "$SECTION" '
                {cardsV2:[{cardId:"asgardeo-preflight",card:{
                  header:{title:"Asgardeo Preflight Check",subtitle:($ts+"  |  "+$sub),
                          imageType:"CIRCLE",imageUrl:"https://wso2.cachefly.net/wso2/sites/all/image_resources/asgardeo-logo-deverloper-page.webp"},
                  sections:[ $section,
                    {widgets:[{buttonList:{buttons:[{text:"Open pipeline run",
                       onClick:{openLink:{url:$url}}}]}}]} ]}}]}')

              curl -sS -H "Content-Type: application/json" -d "$CARD" "$GCHAT_WEBHOOK_URL" >/dev/null \
                && echo "Posted card to Google Chat ($COUNT anomalies)."
            displayName: Post summary card to Google Chat (optional)
            env:
              GCHAT_WEBHOOK_URL: "https://chat.googleapis.com/v1/spaces/AAQA2Wv5Ii4/messages?key=AIzaSyDdI0hCZtE6vySjMm-WEfRq3CPzqKqqsHI&token=0QZf67KuelefwEkjhby5zxoT35dypYDl4R-KWE7zkxw"
              BUILD_URL: $(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)
