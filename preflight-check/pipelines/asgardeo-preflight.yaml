trigger: none

schedules:
  - cron: "0 2 * * 1"
    displayName: Weekly pre-flight (Mon 02:00 UTC)
    branches:
      include:
        - main
    always: true

parameters:
  - name: lookbackDays
    type: number
    displayName: "Look-back window in days for all log/metric queries (default 7 = last week)"
    default: 7

  - name: certExpiryWarningDays
    type: number
    displayName: "Flag Key Vault certificates expiring within N days (default 30)"
    default: 30

  - name: sqlStorageWarnPercent
    type: number
    displayName: "Flag SQL databases over N% storage used (default 75)"
    default: 75

  - name: errorCountDailyThreshold
    type: number
    displayName: "Flag if any single day's IS error count exceeds N (default 5000)"
    default: 5000

  - name: apiLatencyThresholdSeconds
    type: number
    displayName: "Flag API endpoints whose avg latency exceeds N seconds (default 1.0)"
    default: 1.0

  - name: costIncreasePercentThreshold
    type: number
    displayName: "Flag week-over-week cost increase over N% (default 20)"
    default: 20

  - name: environments
    type: object
    displayName: "Environments to scan (subscription/RG/SQL/workspace + AKS service connection)"
    default:
      - { name: "rnd-test", subscriptionId: "38785beb-5019-4896-8679-3d41ddacc4b1", resourceGroup: "rg-thevindu", sqlServer: "", logAnalyticsWorkspaceId: "e5d406b5-f761-48a7-9466-9d0d4a768f01", aksServiceConnection: "rnd-aks-thevindu" }

variables:
  reportFile: $(Build.ArtifactStagingDirectory)/preflight-report.md

stages:
  - stage: PreFlight
    displayName: Asgardeo Pre-Flight Check
    jobs:
      - job: RunChecks
        displayName: Run automated pre-flight data pulls
        timeoutInMinutes: 60
        pool:
          name: $(AGENT_POOL)
        steps:
          - checkout: none

          - bash: |
              set -euo pipefail
              sudo apt-get update -qq && sudo apt-get install -y jq
              # Cost Management queries need the 'costmanagement' CLI extension,
              # which is not preinstalled on the agent. Without it az errors out.
              az extension add --name costmanagement --yes --only-show-errors
            displayName: Install jq and costmanagement extension

          - task: AzureCLI@2
            displayName: Run pre-flight checks
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -uo pipefail
                REPORT="$(reportFile)"
                LOOKBACK_DAYS="${{ parameters.lookbackDays }}"
                ERROR_COUNT_THRESHOLD="${{ parameters.errorCountDailyThreshold }}"
                LATENCY_THRESHOLD_SECONDS="${{ parameters.apiLatencyThresholdSeconds }}"
                SQL_STORAGE_WARN_PERCENT="${{ parameters.sqlStorageWarnPercent }}"
                CERT_EXPIRY_WARN_DAYS="${{ parameters.certExpiryWarningDays }}"
                COST_INCREASE_WARN_PERCENT="${{ parameters.costIncreasePercentThreshold }}"
                ENVIRONMENTS='${{ convertToJson(parameters.environments) }}'
                UNIQUE_SUBSCRIPTION_IDS=$(echo "$ENVIRONMENTS" | jq -r '[.[].subscriptionId]|unique|.[]')

                {
                  echo "# Asgardeo Pre-Flight Check - $(date -u '+%Y-%m-%d %H:%M UTC')"
                  echo
                  echo "_Automated run. Look-back ${LOOKBACK_DAYS}d. Anomalies flagged as WARNING; rest is informational._"
                  echo "_Thresholds: SQL >${SQL_STORAGE_WARN_PERCENT}%, error/day >${ERROR_COUNT_THRESHOLD}, latency >${LATENCY_THRESHOLD_SECONDS}s, cost WoW >${COST_INCREASE_WARN_PERCENT}%, cert <${CERT_EXPIRY_WARN_DAYS}d._"
                  echo
                  echo "> Not automated (manual on-call): Site24x7 triage, dashboard anomaly-spotting,"
                  echo "> Defender review, GitHub/ServiceNow issue review, L1/L2 Nissan PIC checks."
                } > "$REPORT"

                echo "$ENVIRONMENTS" | jq -c '.[]' | while IFS= read -r environment; do
                  IFS=$'\t' read -r ENV_NAME SUBSCRIPTION_ID RESOURCE_GROUP SQL_SERVER LOG_ANALYTICS_WORKSPACE_ID \
                    <<<"$(echo "$environment" | jq -r '[.name,.subscriptionId,.resourceGroup,.sqlServer,.logAnalyticsWorkspaceId]|@tsv')"

                  if ! az account set --subscription "$SUBSCRIPTION_ID" 2>/dev/null; then
                    echo -e "\n## [$ENV_NAME] $RESOURCE_GROUP" >> "$REPORT"
                    echo "- WARNING: subscription \`$SUBSCRIPTION_ID\` not accessible to this service connection - environment skipped." >> "$REPORT"
                    continue
                  fi
                  echo -e "\n## [$ENV_NAME] $RESOURCE_GROUP" >> "$REPORT"

                  if [ -z "$LOG_ANALYTICS_WORKSPACE_ID" ] || [ "$LOG_ANALYTICS_WORKSPACE_ID" = "null" ]; then
                    LOG_ANALYTICS_WORKSPACE_ID=$(az monitor log-analytics workspace list -g "$RESOURCE_GROUP" --query "[0].customerId" -o tsv 2>/dev/null || true)
                  fi

                  if [ -n "$LOG_ANALYTICS_WORKSPACE_ID" ] && [ "$LOG_ANALYTICS_WORKSPACE_ID" != "null" ]; then
                    run_kql_query() { az monitor log-analytics query -w "$LOG_ANALYTICS_WORKSPACE_ID" --analytics-query "$1" --timespan "P${LOOKBACK_DAYS}D" -o json 2>/dev/null || echo '[]'; }

                    # ── Log Ingestion ─────────────────────────────────────────────────────
                    log_ingestion_by_day=$(run_kql_query 'Usage_CL
                      | summarize TotalVolumeGB = sum(Quantity_d / 1000.) by bin(TimeGenerated, 1d)
                      | project Day = TimeGenerated, TotalVolumeGB
                      | order by Day asc')
                    log_ingestion_peak_gb=$(echo "$log_ingestion_by_day" | jq -r '[.[].TotalVolumeGB|tonumber]|max // 0')
                    log_ingestion_avg_gb=$(echo "$log_ingestion_by_day" | jq -r 'if length == 0 then 0 else ([.[].TotalVolumeGB|tonumber]|add) / length end')
                    echo "- Log ingestion: peak ${log_ingestion_peak_gb} GB/day, avg ${log_ingestion_avg_gb} GB/day" >> "$REPORT"
                    awk -v peak="$log_ingestion_peak_gb" -v avg="$log_ingestion_avg_gb" \
                      'BEGIN{exit (avg>0 && peak>2*avg)?0:1}' \
                      && echo "  - WARNING: Peak day more than 2x the average - investigate." >> "$REPORT" || true

                    {
                      echo ""
                      echo "### KQL: Log Ingestion by Day"
                      echo '```'
                      echo "| Day | TotalVolumeGB |"
                      echo "|-----|---------------|"
                      echo "$log_ingestion_by_day" | jq -r '.[] | "| \(.Day // .TimeGenerated) | \(.TotalVolumeGB) |"'
                      echo '```'
                    } >> "$REPORT"

                    # ── Frontdoor Traffic ─────────────────────────────────────────────────
                    frontdoor_requests_by_day=$(run_kql_query 'FrontdoorAccessLog_CL
                      | summarize Requests = count() by bin(TimeGenerated, 1d)
                      | project Day = TimeGenerated, Requests
                      | order by Day asc')
                    frontdoor_peak_requests=$(echo "$frontdoor_requests_by_day" | jq -r '[.[].Requests|tonumber]|max // 0')
                    echo "- Frontdoor traffic: peak ${frontdoor_peak_requests} requests/day" >> "$REPORT"

                    {
                      echo ""
                      echo "### KQL: Frontdoor Requests by Day"
                      echo '```'
                      echo "| Day | Requests |"
                      echo "|-----|----------|"
                      echo "$frontdoor_requests_by_day" | jq -r '.[] | "| \(.Day // .TimeGenerated) | \(.Requests) |"'
                      echo '```'
                    } >> "$REPORT"

                    # ── IS Error Count ────────────────────────────────────────────────────
                    is_errors_by_day=$(run_kql_query 'ContainerLog_CL
                      | join kind=inner (
                          KubePodInventory_CL
                          | project ContainerID_s, PodName = Name_s, ControllerKind_s, ControllerName_s, Namespace_s
                          | distinct *
                        ) on ContainerID_s
                      | project TimeGenerated, Namespace_s, PodName, LogEntry_s, ControllerKind_s, ControllerName_s
                      | where LogEntry_s has_cs ": ERROR"
                      | summarize Count = count() by bin(TimeGenerated, 1d)
                      | project Day = TimeGenerated, Count
                      | order by Day asc')
                    is_error_peak_per_day=$(echo "$is_errors_by_day" | jq -r '[.[].Count|tonumber]|max // 0')
                    echo "- Error count: peak ${is_error_peak_per_day} errors/day" >> "$REPORT"
                    awk -v peak="$is_error_peak_per_day" -v threshold="$ERROR_COUNT_THRESHOLD" \
                      'BEGIN{exit (peak>threshold)?0:1}' \
                      && echo "  - WARNING: Daily error count exceeded ${ERROR_COUNT_THRESHOLD}." >> "$REPORT" || true

                    {
                      echo ""
                      echo "### KQL: IS Errors by Day"
                      echo '```'
                      echo "| Day | Count |"
                      echo "|-----|-------|"
                      echo "$is_errors_by_day" | jq -r '.[] | "| \(.Day // .TimeGenerated) | \(.Count) |"'
                      echo '```'
                    } >> "$REPORT"

                    # ── Top Error Tenants ─────────────────────────────────────────────────
                    top_error_tenants=$(run_kql_query 'let paramPodNamePrefix = "wso2is-deployment";
                      let errorTypeT = "ERROR";
                      let errorRegex = ".*iam-cloud-.* : ERROR {.*} .*";
                      ContainerLog_CL
                      | join kind=inner (
                          KubePodInventory_CL
                          | project ContainerID_s, PodName = Name_s, ControllerKind_s, ControllerName_s, Namespace_s
                          | where PodName contains paramPodNamePrefix
                          | distinct *
                        ) on ContainerID_s
                      | where LogEntry_s has_cs errorTypeT
                      | where LogEntry_s matches regex errorRegex
                      | where LogEntry_s !contains "Error when setting claim"
                      | where LogEntry_s !contains "No message body reader has been found for class java.lang.String, ContentType: application/octet-stream"
                      | where LogEntry_s !contains "Error occurred while getting database type from DB connection org.wso2.carbon.user.core.UserStoreException: Error occurred while getting database type from DB connection"
                      | where LogEntry_s !contains "Error occurred while getting database type from DB connection org.wso2.charon3.core.exceptions.CharonException: Error occurred while getting database type from DB connection"
                      | where LogEntry_s !contains "This password has been used in recent history. Please choose a different password"
                      | where LogEntry_s !contains "Error occurred while getting the OAuth App tenantDomain by Consumer key: CHOREO_SYSTEM_APP_MANAGER"
                      | where LogEntry_s !contains "ERROR {org.wso2.carbon.identity.oauth2.grant.jwt.JWTBearerGrantHandler} - JSON Web Token is issued before the allowed time."
                      | where LogEntry_s !contains "ERROR {org.wso2.carbon.identity.input.validation.mgt.listener.InputValidationListener} - Failed to validate username for user."
                      | where LogEntry_s !contains "Caused by: java.sql.BatchUpdateException: Violation of UNIQUE KEY constraint '\''UQ__UM_USER___BBB8EC7E9AE1457C'\''. Cannot insert duplicate key in object '\''dbo.UM_USER_ROLE'\''."
                      | where LogEntry_s !contains "{org.wso2.carbon.identity.application.authentication.framework.config.model.graph.openjdk.nashorn.JsOpenJdkNashornGraphBuilder} - Event handler : authenticationOptions is not a function"
                      | where LogEntry_s !contains "{org.wso2.carbon.identity.application.authentication.framework.config.model.graph.js.JsClaims} - Error when getting claim : http://wso2.org/claims/identity/country of user"
                      | where not (LogEntry_s matches regex @"Tenant:\s*\[lilt\].*?iam-cloud-carbon\s*:\s*ERROR\s*\{org.wso2.carbon.identity.application.authentication.framework.config.model.graph.js.JsLogger\}")
                      | sort by TimeGenerated asc
                      | project TimeGenerated, LogEntry_s
                      | parse LogEntry_s with * "Tenant: [" TenantName "]" *
                      | where isnotempty(TenantName)
                      | summarize LogCount = count() by TenantName
                      | top 5 by LogCount desc')
                    top_error_tenants_summary=$(echo "$top_error_tenants" | jq -r '[.[]|"\(.TenantName)=\(.LogCount)"]|join(", ")')
                    [ -n "$top_error_tenants_summary" ] && echo "  - Top error tenants: ${top_error_tenants_summary}" >> "$REPORT" || true

                    {
                      echo ""
                      echo "### KQL: Top 5 Error Tenants"
                      echo '```'
                      echo "| TenantName | LogCount |"
                      echo "|------------|----------|"
                      echo "$top_error_tenants" | jq -r '.[] | "| \(.TenantName) | \(.LogCount) |"'
                      echo '```'
                    } >> "$REPORT"

                    # ── Top Traffic Tenants ───────────────────────────────────────────────
                    top_traffic_tenants=$(run_kql_query 'FrontdoorAccessLog_CL
                      | extend reqUri = tostring(requestUri_s)
                      | extend tenant_from_path = extract(@"/t/([^/]+)", 1, reqUri)
                      | extend custom_domain = extract(@"https?://([^/:]+)", 1, reqUri)
                      | extend tenant = case(
                          isnotempty(tenant_from_path), tenant_from_path,
                          isnotempty(custom_domain) and custom_domain !contains "asgardeo.io", custom_domain,
                          "")
                      | where isnotempty(tenant)
                      | summarize request_count = count() by tenant
                      | top 5 by request_count desc')
                    top_traffic_tenants_summary=$(echo "$top_traffic_tenants" | jq -r '[.[]|"\(.tenant)=\(.request_count)"]|join(", ")')
                    [ -n "$top_traffic_tenants_summary" ] && echo "  - Top traffic tenants: ${top_traffic_tenants_summary}" >> "$REPORT" || true

                    {
                      echo ""
                      echo "### KQL: Top 5 Traffic Tenants"
                      echo '```'
                      echo "| Tenant | RequestCount |"
                      echo "|--------|--------------|"
                      echo "$top_traffic_tenants" | jq -r '.[] | "| \(.tenant) | \(.request_count) |"'
                      echo '```'
                    } >> "$REPORT"

                  else
                    echo "- WARNING: No Log Analytics workspace in \`$RESOURCE_GROUP\` - log checks skipped." >> "$REPORT"
                  fi

                  DATABASE_NAMES=$(az sql db list -g "$RESOURCE_GROUP" -s "$SQL_SERVER" --query "[?name!='master'].name" -o tsv 2>/dev/null || true)
                  if [ -z "$DATABASE_NAMES" ]; then
                    echo "- WARNING: No databases found on \`$SQL_SERVER\`." >> "$REPORT"
                  else
                    for DATABASE_NAME in $DATABASE_NAMES; do
                      DATABASE_USAGE_JSON=$(az sql db list-usages -g "$RESOURCE_GROUP" -s "$SQL_SERVER" -n "$DATABASE_NAME" -o json 2>/dev/null || echo '[]')
                      USED_BYTES=$(echo "$DATABASE_USAGE_JSON" | jq -r '.[]|select(.name=="database_size")|.currentValue' | head -1)
                      MAX_BYTES=$(echo "$DATABASE_USAGE_JSON" | jq -r '.[]|select(.name=="database_size")|.limit' | head -1)
                      if [ -n "${USED_BYTES:-}" ] && [ "$USED_BYTES" != "null" ] && [ -n "${MAX_BYTES:-}" ] && [ "$MAX_BYTES" != "0" ] && [ "$MAX_BYTES" != "null" ]; then
                        read -r max_size_gb used_percent free_percent <<<"$(awk -v used="$USED_BYTES" -v max="$MAX_BYTES" \
                          'BEGIN{printf "%.2f %.2f %.2f", max/(1024^3), (used/max)*100, 100-(used/max)*100}')"
                        if awk -v used_pct="$used_percent" -v warn_pct="$SQL_STORAGE_WARN_PERCENT" \
                          'BEGIN{exit (used_pct<warn_pct)?0:1}'; then
                          echo "- DB ${DATABASE_NAME}: ${max_size_gb} GB max, ${used_percent}% used, ${free_percent}% free - SAFE" >> "$REPORT"
                        else
                          echo "- WARNING: DB ${DATABASE_NAME}: ${max_size_gb} GB max, ${used_percent}% used, ${free_percent}% free - ALERT (>= ${SQL_STORAGE_WARN_PERCENT}%)" >> "$REPORT"
                        fi
                      else
                        echo "- DB ${DATABASE_NAME}: usage unavailable" >> "$REPORT"
                      fi
                    done
                  fi

                  for STORAGE_ACCOUNT_ID in $(az storage account list -g "$RESOURCE_GROUP" --query "[].id" -o tsv 2>/dev/null || true); do
                    STORAGE_USED_BYTES=$(az monitor metrics list --resource "$STORAGE_ACCOUNT_ID" --metric UsedCapacity --interval PT1H --query "value[0].timeseries[0].data[-1].average" -o tsv 2>/dev/null || echo "")
                    if [ -n "${STORAGE_USED_BYTES:-}" ] && [ "$STORAGE_USED_BYTES" != "None" ]; then
                      echo "- Archival ${STORAGE_ACCOUNT_ID##*/}: $(awk -v bytes="$STORAGE_USED_BYTES" 'BEGIN{printf "%.2f",bytes/1073741824}') GiB used" >> "$REPORT"
                    fi
                  done
                done

                CURRENT_EPOCH=$(date -u +%s)
                if date -u -d "yesterday" +%F >/dev/null 2>&1; then
                  CURRENT_WEEK_END=$(date -u -d "yesterday" +%F)
                  CURRENT_WEEK_START=$(date -u -d "8 days ago" +%F)
                  PRIOR_WEEK_END=$(date -u -d "8 days ago" +%F)
                  PRIOR_WEEK_START=$(date -u -d "15 days ago" +%F)
                else
                  CURRENT_WEEK_END=$(date -u -v-1d +%F)
                  CURRENT_WEEK_START=$(date -u -v-8d +%F)
                  PRIOR_WEEK_END=$(date -u -v-8d +%F)
                  PRIOR_WEEK_START=$(date -u -v-15d +%F)
                fi

                for SUBSCRIPTION_ID in $UNIQUE_SUBSCRIPTION_IDS; do
                  if ! az account set --subscription "$SUBSCRIPTION_ID" 2>/dev/null; then
                    echo -e "\n## Subscription $SUBSCRIPTION_ID" >> "$REPORT"
                    echo "- WARNING: subscription \`$SUBSCRIPTION_ID\` not accessible to this service connection - skipped." >> "$REPORT"
                    continue
                  fi
                  echo -e "\n## Subscription $SUBSCRIPTION_ID" >> "$REPORT"

                  for KEYVAULT_NAME in $(az keyvault list --query "[].name" -o tsv 2>/dev/null || true); do
                    az keyvault certificate list --vault-name "$KEYVAULT_NAME" --query "[].{name:name,exp:attributes.expires}" -o json 2>/dev/null | jq -c '.[]' | while read -r cert_json; do
                      CERT_NAME=$(echo "$cert_json" | jq -r '.name')
                      CERT_EXPIRY=$(echo "$cert_json" | jq -r '.exp')
                      [ "$CERT_EXPIRY" = "null" ] && continue
                      CERT_EXPIRY_EPOCH=$(date -u -d "$CERT_EXPIRY" +%s 2>/dev/null || date -u -j -f "%Y-%m-%dT%H:%M:%S+00:00" "${CERT_EXPIRY%%.*}+00:00" +%s 2>/dev/null || echo 0)
                      [ "$CERT_EXPIRY_EPOCH" = "0" ] && continue
                      CERT_DAYS_REMAINING=$(( (CERT_EXPIRY_EPOCH - CURRENT_EPOCH) / 86400 ))
                      if [ "$CERT_DAYS_REMAINING" -lt 0 ]; then
                        echo "- WARNING: EXPIRED cert ${KEYVAULT_NAME}/${CERT_NAME} ($(( -CERT_DAYS_REMAINING ))d ago, ${CERT_EXPIRY%%T*})" >> "$REPORT"
                      elif [ "$CERT_DAYS_REMAINING" -lt "$CERT_EXPIRY_WARN_DAYS" ]; then
                        echo "- WARNING: cert ${KEYVAULT_NAME}/${CERT_NAME} expires in ${CERT_DAYS_REMAINING}d (${CERT_EXPIRY%%T*})" >> "$REPORT"
                      fi
                    done
                  done

                  # Run the cost query, capturing stderr so a failure (missing
                  # 'costmanagement' extension, 403, throttling) surfaces as a real
                  # error instead of being silently reported as $0.00.
                  COST_QUERY_ERROR=""
                  query_subscription_cost() {
                    az costmanagement query \
                      --type ActualCost \
                      --timeframe Custom \
                      --time-period from="$1" to="$2" \
                      --dataset-granularity None \
                      --dataset-aggregation '{"total":{"name":"Cost","function":"Sum"}}' \
                      --scope "/subscriptions/$SUBSCRIPTION_ID" \
                      --query "properties.rows[0][0]" -o tsv
                  }
                  CURRENT_WEEK_COST=$(query_subscription_cost "$CURRENT_WEEK_START" "$CURRENT_WEEK_END" 2>/tmp/cost_err) \
                    || COST_QUERY_ERROR=$(tr '\n' ' ' </tmp/cost_err | head -c 300)
                  PRIOR_WEEK_COST=$(query_subscription_cost "$PRIOR_WEEK_START" "$PRIOR_WEEK_END" 2>/dev/null || true)

                  if [ -n "$COST_QUERY_ERROR" ]; then
                    echo "- WARNING: Cost query failed - ${COST_QUERY_ERROR}" >> "$REPORT"
                  elif [ -z "${CURRENT_WEEK_COST:-}" ] || [ -z "${PRIOR_WEEK_COST:-}" ]; then
                    echo "- WARNING: Cost query returned no data for ${CURRENT_WEEK_START}..${CURRENT_WEEK_END}." >> "$REPORT"
                  else
                    echo "- Cost: this week (${CURRENT_WEEK_START}..${CURRENT_WEEK_END}) \$$(printf '%.2f' "$CURRENT_WEEK_COST") | prior \$$(printf '%.2f' "$PRIOR_WEEK_COST")" >> "$REPORT"
                    awk -v current="$CURRENT_WEEK_COST" -v prior="$PRIOR_WEEK_COST" -v threshold="$COST_INCREASE_WARN_PERCENT" \
                      'BEGIN{exit (prior>0 && ((current-prior)/prior*100)>threshold)?0:1}' \
                      && echo "  - WARNING: Cost up $(awk -v c="$CURRENT_WEEK_COST" -v p="$PRIOR_WEEK_COST" 'BEGIN{printf "%.1f",(c-p)/p*100}')% week-over-week." >> "$REPORT" || true
                  fi

                  SECURE_SCORE_JSON=$(az security secure-scores show --name ascScore -o json 2>/dev/null \
                    || az security secure-scores list -o json 2>/dev/null | jq '.[0]' || echo '{}')
                  SECURE_SCORE_PERCENT=$(echo "$SECURE_SCORE_JSON" | jq -r '.score.percentage // .properties.score.percentage // empty')
                  if [ -n "${SECURE_SCORE_PERCENT:-}" ]; then
                    echo "- Secure score: $(awk -v pct="$SECURE_SCORE_PERCENT" 'BEGIN{printf "%.0f",pct*100}')%" >> "$REPORT"
                  else
                    echo "- Secure score: unavailable (Defender plan / permissions)." >> "$REPORT"
                  fi
                done

          - ${{ each env in parameters.environments }}:
            - ${{ if ne(env.aksServiceConnection, '') }}:
              - task: Kubernetes@1
                displayName: AKS login [${{ env.name }}]
                inputs:
                  connectionType: Kubernetes Service Connection
                  kubernetesServiceEndpoint: ${{ env.aksServiceConnection }}
                  command: login
              - bash: |
                  set -euo pipefail
                  REPORT="$(reportFile)"
                  echo -e "\n## AKS [${{ env.name }}]" >> "$REPORT"
                  unhealthy_pods=$(kubectl get pods -A --no-headers 2>/dev/null | grep -Ev 'Running|Completed' || true)
                  if [ -n "$unhealthy_pods" ]; then
                    echo "- WARNING: Pods not Running/Completed:" >> "$REPORT"
                    printf '```\n%s\n```\n' "$unhealthy_pods" >> "$REPORT"
                  else
                    echo "- All pods Running/Completed." >> "$REPORT"
                  fi
                  node_utilisation=$(kubectl top nodes --no-headers 2>/dev/null || true)
                  if [ -n "$node_utilisation" ]; then
                    # kubectl top nodes columns: NAME CPU(cores) CPU% MEMORY(bytes) MEMORY%.
                    # Put a compact per-node summary on the bullet so the Chat card (which
                    # only reads top-level "- " lines) shows the values, not just a label.
                    node_summary=$(echo "$node_utilisation" | awk 'NF{printf "%s%s %s/%s", sep, $1, $3, $5; sep=", "}')
                    echo "- Node utilisation (name CPU%/mem%): ${node_summary}" >> "$REPORT"
                    printf '```\n%s\n```\n' "$node_utilisation" >> "$REPORT"
                  else
                    echo "- WARNING: kubectl top nodes returned no data (metrics-server unavailable?)." >> "$REPORT"
                  fi
                displayName: AKS pod/node check [${{ env.name }}]

          - bash: cat "$(reportFile)"
            displayName: Print consolidated report

          - publish: $(reportFile)
            artifact: preflight-report
            displayName: Publish report artifact

          - task: AzureCLI@2
            displayName: Upload report to Azure Files (sa18436)
            condition: always()
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                STORAGE_ACCOUNT="sa18436"
                RESOURCE_GROUP="rg-thevindu"
                SHARE_NAME="fileshare"
                DEST_DIR="dumps"

                if [ ! -f "$(reportFile)" ]; then
                  echo "No report file at $(reportFile) - nothing to upload."
                  exit 0
                fi

                DEST_NAME="preflight-report-$(date -u '+%Y-%m-%d-%H%M').md"

                # Azure Files (SMB) data-plane needs the account key (or a SAS);
                # the SP running this connection must be allowed to list keys.
                ACCOUNT_KEY=$(az storage account keys list \
                  --account-name "$STORAGE_ACCOUNT" -g "$RESOURCE_GROUP" \
                  --query "[0].value" -o tsv)

                az storage file upload \
                  --account-name "$STORAGE_ACCOUNT" \
                  --account-key "$ACCOUNT_KEY" \
                  --share-name "$SHARE_NAME" \
                  --source "$(reportFile)" \
                  --path "${DEST_DIR}/${DEST_NAME}"

                echo "Uploaded report to ${STORAGE_ACCOUNT}/${SHARE_NAME}/${DEST_DIR}/${DEST_NAME}"

          - bash: |
              set -euo pipefail

              if [ -z "${GCHAT_WEBHOOK_URL:-}" ]; then
                echo "GCHAT_WEBHOOK_URL not set - skipping."
                exit 0
              fi

              WARNING_LINES=$(grep "WARNING:" "$(reportFile)" | sed -E 's/^[[:space:]]*-?[[:space:]]*WARNING:[[:space:]]*//' || true)
              WARNING_COUNT=$(printf '%s\n' "$WARNING_LINES" | grep -c . || true)

              # Normal / informational status lines: top-level bullets that are not warnings.
              NORMAL_LINES=$(grep -E '^- ' "$(reportFile)" | grep -v "WARNING:" | sed -E 's/^- //' || true)
              NORMAL_COUNT=$(printf '%s\n' "$NORMAL_LINES" | grep -c . || true)

              if [ "$WARNING_COUNT" -eq 0 ]; then
                CHAT_CARD_SECTION=$(jq -n '{header:"Status",widgets:[{decoratedText:{startIcon:{materialIcon:{name:"check_circle"}},text:"<b>No anomalies detected this week.</b>"}}]}')
                CHAT_CARD_SUBTITLE="No anomalies"
              else
                CHAT_CARD_SECTION=$(printf '%s' "$WARNING_LINES" | jq -R -s --arg count "$WARNING_COUNT" '
                  {header:("Anomalies ("+$count+")"),
                  widgets:(split("\n")|map(select(length>0))[:30]
                            |map({decoratedText:{startIcon:{materialIcon:{name:"warning"}},text:.}}))}')
                CHAT_CARD_SUBTITLE="$WARNING_COUNT anomaly(ies) detected"
              fi

              # Collapsible "Normal" section: hidden until expanded, so healthy results
              # are available for context without crowding out the anomalies.
              if [ "$NORMAL_COUNT" -gt 0 ]; then
                CHAT_CARD_NORMAL_SECTION=$(printf '%s' "$NORMAL_LINES" | jq -R -s --arg count "$NORMAL_COUNT" '
                  {header:("Normal ("+$count+")"),
                  collapsible:true,
                  uncollapsibleWidgetsCount:0,
                  widgets:(split("\n")|map(select(length>0))[:50]
                            |map({decoratedText:{startIcon:{materialIcon:{name:"check_circle"}},text:.}}))}')
              else
                CHAT_CARD_NORMAL_SECTION=null
              fi

              CHAT_CARD_PAYLOAD=$(jq -n \
                --arg subtitle "$CHAT_CARD_SUBTITLE" \
                --arg timestamp "$(date -u '+%Y-%m-%d %H:%M UTC')" \
                --arg pipeline_url "${BUILD_URL:-}" \
                --argjson section "$CHAT_CARD_SECTION" \
                --argjson normal "$CHAT_CARD_NORMAL_SECTION" '
                {cardsV2:[{cardId:"asgardeo-preflight",card:{
                  header:{title:"Asgardeo Preflight Check",subtitle:($timestamp+"  |  "+$subtitle),
                          imageType:"CIRCLE",imageUrl:"https://wso2.cachefly.net/wso2/sites/all/image_resources/asgardeo-logo-deverloper-page.webp"},
                  sections:([ $section, $normal,
                    {widgets:[{buttonList:{buttons:[{text:"Open pipeline run",
                      onClick:{openLink:{url:$pipeline_url}}}]}}]} ] | map(select(. != null)))}}]}')

              curl -sS -H "Content-Type: application/json" -d "$CHAT_CARD_PAYLOAD" "$GCHAT_WEBHOOK_URL" >/dev/null \
                && echo "Posted card to Google Chat ($WARNING_COUNT anomalies)."
            displayName: Notify on Google Chat
            env:
              GCHAT_WEBHOOK_URL: $(GCHAT_WEBHOOK_URL)
              BUILD_URL: $(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)