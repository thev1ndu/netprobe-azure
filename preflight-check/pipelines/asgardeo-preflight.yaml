trigger: none

schedules:
  - cron: "0 2 * * 1"
    displayName: Weekly pre-flight (Mon 02:00 UTC)
    always: true
    branches:
      include:
        - main

parameters:
  - name: lookbackDays
    type: number
    default: 7
  - name: certExpiryWarningDays
    type: number
    default: 30
  - name: sqlStorageWarnPercent
    type: number
    default: 75
  - name: errorCountDailyThreshold
    type: number
    default: 1000
  - name: apiLatencyThresholdSeconds
    type: number
    default: 1.0
  - name: costIncreasePercentThreshold
    type: number
    default: 25
  - name: agentPool
    type: string
    default: rnd-thevindu-vmss

variables:
  NODE_NO_WARNINGS: 1
  AZURE_SERVICE_CONNECTION: thevindu-rnd-sc
  workDir:              $(Build.ArtifactStagingDirectory)/checks     # one CSV per check (intermediate, not published)
  reportDir:            $(Build.ArtifactStagingDirectory)/report     # holds only the published .xlsx
  warnings:             $(Build.ArtifactStagingDirectory)/warnings.txt
  lib:                  $(Build.ArtifactStagingDirectory)/lib.sh     # shared bash helpers
  libps:                $(Build.ArtifactStagingDirectory)/lib.ps1    # shared Az PowerShell helpers
  subscriptionId:       '38785beb-5019-4896-8679-3d41ddacc4b1'
  resourceGroup:        'rg-thevindu'
  workspaceId:          'e5d406b5-f761-48a7-9466-9d0d4a768f01'
  sqlServer:            ''                      # empty = skip SQL check
  aksServiceConnection: 'rnd-aks-thevindu'
  storageAccount:       'sa18436'
  blobContainer:        'preflight'

jobs:
  - job: RunChecks
    displayName: Asgardeo pre-flight
    timeoutInMinutes: 60
    pool:
      name: ${{ parameters.agentPool }}
    steps:
      - checkout: self   # need build-xlsx.py on the agent to render the report

      # ── STEP 0 — tools on the agent (the original `az not found` fix) ──────
      - bash: |
          set -uo pipefail
          # Retry wrapper — apt on this vmss agent intermittently fails with exit
          # 100 (dpkg/apt lock held, stale package lists, transient network). A
          # single blip must NOT abort the whole install, so retry then fall back.
          retry() { local n=0; until "$@"; do n=$((n+1)); [ "$n" -ge 4 ] && return 1; echo "retry $n/3: $*"; sleep 10; done; }

          if ! command -v az >/dev/null 2>&1; then
            echo "Azure CLI not found — installing…"
            retry sudo apt-get update -y || true
            retry sudo apt-get install -y ca-certificates curl apt-transport-https lsb-release gnupg || true
            # Primary: Microsoft's install script. Fallback: distro azure-cli package.
            retry sudo bash -c 'curl -sL https://aka.ms/InstallAzureCLIDeb | bash' \
              || retry sudo apt-get install -y azure-cli \
              || { echo "##[error]Could not install Azure CLI on this agent."; exit 1; }
          fi
          command -v jq      >/dev/null 2>&1 || retry sudo bash -c 'apt-get update -y && apt-get install -y jq'      || { echo "##[error]Could not install jq.";      exit 1; }
          command -v python3 >/dev/null 2>&1 || retry sudo bash -c 'apt-get update -y && apt-get install -y python3' || { echo "##[error]Could not install python3."; exit 1; }
          # openpyxl renders the multi-sheet .xlsx report in step 15.
          python3 -c 'import openpyxl' 2>/dev/null || retry sudo bash -c 'apt-get update -y && apt-get install -y python3-pip' || true
          python3 -c 'import openpyxl' 2>/dev/null || retry pip3 install --quiet openpyxl || { echo "##[error]Could not install openpyxl."; exit 1; }

          # ── PowerShell (pwsh) + Az modules ────────────────────────────────
          # Every AzurePowerShell@5 task below runs on pwsh. A bare VMSS agent
          # has neither pwsh nor the Az modules, so those tasks (and their
          # cleanup) failed with "Unable to locate executable file: 'pwsh'".
          # Install both here so the checks can actually run.
          if ! command -v pwsh >/dev/null 2>&1; then
            echo "PowerShell (pwsh) not found — installing…"
            # Primary: Microsoft's apt repo for this Ubuntu release. Fallback: snap.
            retry sudo bash -c '
              set -e
              . /etc/os-release
              curl -sSL "https://packages.microsoft.com/config/ubuntu/${VERSION_ID}/packages-microsoft-prod.deb" -o /tmp/pmc.deb
              dpkg -i /tmp/pmc.deb
              apt-get update -y
              apt-get install -y powershell
            ' || retry sudo snap install powershell --classic \
              || { echo "##[error]Could not install PowerShell (pwsh)."; exit 1; }
          fi
          # Install only the Az submodules the checks call (not the full Az
          # meta-module) to keep this fast. AllUsers scope lands them in the
          # default PSModulePath so the AzurePowerShell@5 tasks discover them.
          retry sudo pwsh -NoProfile -NonInteractive -Command '
            $ErrorActionPreference = "Stop"
            Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
            $mods = "Az.Accounts","Az.OperationalInsights","Az.Monitor","Az.Sql",
                    "Az.Storage","Az.KeyVault","Az.Security","Az.CostManagement"
            foreach ($m in $mods) {
              if (-not (Get-Module -ListAvailable -Name $m)) {
                Write-Host "Installing $m…"
                Install-Module $m -Scope AllUsers -Force -AllowClobber -Repository PSGallery
              }
            }
          ' || { echo "##[error]Could not install Az PowerShell modules."; exit 1; }

          echo "Versions:"; az version 2>/dev/null | head -n 20 || true; jq --version; python3 --version; python3 -c 'import openpyxl; print("openpyxl", openpyxl.__version__)'; pwsh --version
        displayName: 0. Install az + jq + python3 + pwsh

      # ── STEP 1 — output dir, Summary header, and shared helpers ───────────
      #   kql()     runs a query; sets QUERY_OK (1/0) + QUERY_ERR; prints JSON or [].
      #   summary() appends one row to 00_Summary.csv.
      #   note()    appends a line for the Google Chat card.
      - bash: |
          set -euo pipefail
          mkdir -p "$(workDir)"; : > "$(warnings)"
          jq -rn '["Check","Result","Status"]|@csv' > "$(workDir)/00_Summary.csv"
          cat > "$(lib)" <<EOF
          export WORKDIR="$(workDir)"
          export WARNINGS="$(warnings)"
          export SUMMARY="$(workDir)/00_Summary.csv"
          export WORKSPACE_ID="$(workspaceId)"
          export LOOKBACK=${{ parameters.lookbackDays }}
          # Silence az core warnings (e.g. the cdn/afd deprecation banner) so they
          # can't leak onto stderr and mask the real error in QUERY_ERR. Errors are
          # still shown.
          export AZURE_CORE_ONLY_SHOW_ERRORS=true
          EOF
          cat >> "$(lib)" <<'EOF'
          # NOTE: kql returns its output in the global QUERY_OUT (NOT via stdout).
          #   Callers must invoke it directly — `kql '...'; DATA="$QUERY_OUT"` —
          #   never as `DATA=$(kql ...)`, because a command-substitution subshell
          #   would discard QUERY_OK/QUERY_ERR and trip `set -u` in the parent.
          kql() {
            local err; err=$(mktemp); QUERY_OK=1; QUERY_ERR=""; QUERY_OUT='[]'
            if QUERY_OUT=$(az monitor log-analytics query -w "$WORKSPACE_ID" --timespan "P${LOOKBACK}D" --analytics-query "$1" -o json 2>"$err"); then
              :
            else
              # Drop WARNING/deprecation lines first so the genuine error (not an
              # az banner) is what survives the 200-char truncation.
              QUERY_OK=0; QUERY_ERR=$(grep -vi '^WARNING' "$err" | tr '\n' ' ' | tr '"' "'" | head -c 200); QUERY_OUT='[]'
            fi
            rm -f "$err"
          }
          summary() { jq -rn --arg c "$1" --arg r "$2" --arg s "$3" '[$c,$r,$s]|@csv' >> "$SUMMARY"; }
          note()    { echo "$1" >> "$WARNINGS"; }
          EOF
          # lib.ps1 — the AzurePowerShell@5 mirror of lib.sh. DevOps macros ($(workDir)
          # etc.) are expanded before bash runs, so the quoted heredoc is safe.
          cat > "$(libps)" <<'PSEOF'
          # Shared Az PowerShell helpers. Dot-source at the top of a step:  . '$(libps)'
          $script:WorkDir     = '$(workDir)'
          $script:Warnings    = '$(warnings)'
          $script:SummaryCsv  = Join-Path '$(workDir)' '00_Summary.csv'
          $script:WorkspaceId = '$(workspaceId)'
          $script:Lookback    = ${{ parameters.lookbackDays }}

          # Invoke-Kql <query> -> @{ Ok=<bool>; Err='<why>'; Rows=@(<row objects>) }.
          # Mirrors lib.sh kql(): never throws. Ok=$false carries the real error
          # (permission/syntax) trimmed to 200 chars; Ok=$true + empty Rows = 0 rows.
          function Invoke-Kql([string]$Query) {
            try {
              $r = Invoke-AzOperationalInsightsQuery -WorkspaceId $script:WorkspaceId `
                     -Query $Query -Timespan (New-TimeSpan -Days $script:Lookback) -ErrorAction Stop
              return @{ Ok = $true; Err = ''; Rows = @($r.Results) }
            } catch {
              $m = ($_.Exception.Message -replace '\s+', ' ').Trim()
              if ($m.Length -gt 200) { $m = $m.Substring(0, 200) }
              return @{ Ok = $false; Err = $m; Rows = @() }
            }
          }

          # CSV escaping matching jq @csv: quote strings, double embedded quotes.
          function Format-CsvField($v) { '"' + ([string]$v -replace '"', '""') + '"' }
          function Or-Zero($v) { if ($null -ne $v) { $v } else { 0 } }

          # summary()/note() equivalents — append to the same files the bash lib writes.
          function Add-Summary($Check, $Result, $Status) {
            ('{0},{1},{2}' -f (Format-CsvField $Check), (Format-CsvField $Result), (Format-CsvField $Status)) |
              Add-Content -LiteralPath $script:SummaryCsv
          }
          function Add-Note($Message) { $Message | Add-Content -LiteralPath $script:Warnings }
          PSEOF
        displayName: 1. Init outputs + helpers

      # ── STEP 2 — AUTH PROBE: permission problem vs genuine no-data ────────
      - task: AzurePowerShell@5
        displayName: 2. Verify access (auth probe)
        continueOnError: true
        inputs:
          azureSubscription: $(AZURE_SERVICE_CONNECTION)
          azurePowerShellVersion: LatestVersion
          pwsh: true
          ScriptType: InlineScript
          Inline: |
            . '$(libps)'
            $ctx = Get-AzContext
            Write-Host ('Service principal context: ' + $ctx.Account.Id + ' / ' + $ctx.Subscription.Name)
            try {
              Set-AzContext -Subscription '$(subscriptionId)' -ErrorAction Stop | Out-Null
              Add-Summary 'Auth: subscription' 'active = $(subscriptionId)' 'OK'
            } catch {
              $e = ($_.Exception.Message -replace '\s+', ' ').Trim()
              if ($e.Length -gt 150) { $e = $e.Substring(0, 150) }
              Add-Summary 'Auth: subscription' $e 'FAILED'
              Add-Note 'Cannot set subscription $(subscriptionId) — SP has no access.'
            }
            $probe = Invoke-Kql 'print probe=1'
            if ($probe.Ok) {
              Add-Summary 'Auth: Log Analytics' 'query API reachable' 'OK'
            } else {
              Add-Summary 'Auth: Log Analytics' $probe.Err 'FAILED'
              Add-Note ("Log Analytics query API FAILED (likely missing 'Log Analytics Reader' on workspace): " + $probe.Err)
            }

      # ── STEP 3 — Log ingestion volume ─────────────────────────────────────
      - task: AzurePowerShell@5
        displayName: 3. Log ingestion volume
        continueOnError: true
        inputs:
          azureSubscription: $(AZURE_SERVICE_CONNECTION)
          azurePowerShellVersion: LatestVersion
          pwsh: true
          ScriptType: InlineScript
          Inline: |
            . '$(libps)'
            # Seeded via seed-sample-logs.sh — mirrors built-in Usage (Quantity -> Quantity_d).
            $q = Invoke-Kql 'PreflightUsage_CL
              | summarize TotalVolumeGB = sum(Quantity_d / 1000.) by bin(TimeGenerated, 1d)
              | project Day = TimeGenerated, TotalVolumeGB | order by Day asc'
            $rows = $q.Rows
            $lines = @('"Day","VolumeGB"')
            foreach ($r in $rows) {
              $dayVal = if ($r.Day) { $r.Day } else { $r.TimeGenerated }
              $day = [string]$dayVal; if ($day.Length -ge 10) { $day = $day.Substring(0, 10) }
              $lines += (Format-CsvField $day) + ',' + [double]$r.TotalVolumeGB
            }
            $lines | Set-Content -LiteralPath (Join-Path $WorkDir '01_Log_Ingestion.csv')
            if (-not $q.Ok) {
              Add-Summary 'Log Ingestion' $q.Err 'FAILED'; Add-Note ('Log Ingestion FAILED: ' + $q.Err)
            } elseif ($rows.Count -eq 0) {
              Add-Summary 'Log Ingestion' 'query ran, 0 rows' 'EMPTY'
              Add-Note 'Log Ingestion: 0 rows (no data in window or table empty).'
            } else {
              $vals = $rows | ForEach-Object { [double]$_.TotalVolumeGB }
              $peak = ($vals | Measure-Object -Maximum).Maximum
              $avg  = ($vals | Measure-Object -Average).Average
              $status = 'OK'
              if ($avg -gt 0 -and $peak -gt 2 * $avg) { $status = 'WARNING'; Add-Note 'Log ingestion: peak day >2x average' }
              Add-Summary 'Log Ingestion' ('peak {0:F2} / avg {1:F2} GB/day' -f $peak, $avg) $status
            }

      # ── STEP 4 — Frontdoor traffic ────────────────────────────────────────
      - task: AzurePowerShell@5
        displayName: 4. Frontdoor traffic
        continueOnError: true
        inputs:
          azureSubscription: $(AZURE_SERVICE_CONNECTION)
          azurePowerShellVersion: LatestVersion
          pwsh: true
          ScriptType: InlineScript
          Inline: |
            . '$(libps)'
            # Seeded via seed-sample-logs.sh — mirrors AzureDiagnostics (Category -> Category_s).
            $q = Invoke-Kql 'PreflightAzureDiagnostics_CL
              | where Category =~ "FrontdoorAccessLog"
              | summarize Requests = count() by bin(TimeGenerated, 1d)
              | project Day = TimeGenerated, Requests | order by Day asc'
            $rows = $q.Rows
            $lines = @('"Day","Requests"')
            foreach ($r in $rows) {
              $dayVal = if ($r.Day) { $r.Day } else { $r.TimeGenerated }
              $day = [string]$dayVal; if ($day.Length -ge 10) { $day = $day.Substring(0, 10) }
              $lines += (Format-CsvField $day) + ',' + [long]$r.Requests
            }
            $lines | Set-Content -LiteralPath (Join-Path $WorkDir '02_Frontdoor_Traffic.csv')
            if (-not $q.Ok) {
              Add-Summary 'Frontdoor Traffic' $q.Err 'FAILED'; Add-Note ('Frontdoor Traffic FAILED: ' + $q.Err)
            } elseif ($rows.Count -eq 0) {
              Add-Summary 'Frontdoor Traffic' 'query ran, 0 rows' 'EMPTY'
            } else {
              $peak = ($rows | ForEach-Object { [long]$_.Requests } | Measure-Object -Maximum).Maximum
              Add-Summary 'Frontdoor Traffic' ('peak ' + $peak + ' requests/day') 'OK'
            }

      # ── STEP 5 — Top traffic tenants ──────────────────────────────────────
      - task: AzurePowerShell@5
        displayName: 5. Top traffic tenants
        continueOnError: true
        inputs:
          azureSubscription: $(AZURE_SERVICE_CONNECTION)
          azurePowerShellVersion: LatestVersion
          pwsh: true
          ScriptType: InlineScript
          Inline: |
            . '$(libps)'
            # Seeded via seed-sample-logs.sh — mirrors AzureDiagnostics (Category -> Category_s).
            $q = Invoke-Kql 'PreflightAzureDiagnostics_CL
              | where Category =~ "FrontdoorAccessLog"
              | extend reqUri = tostring(requestUri_s)
              | extend tenant_from_path = extract(@"/t/([^/]+)", 1, reqUri)
              | extend custom_domain = extract(@"https?://([^/:]+)", 1, reqUri)
              | extend tenant = case(isnotempty(tenant_from_path), tenant_from_path,
                  isnotempty(custom_domain) and custom_domain !contains "asgardeo.io", custom_domain, "")
              | where isnotempty(tenant)
              | summarize request_count = count() by tenant | top 5 by request_count desc'
            $rows = $q.Rows
            $lines = @('"Tenant","RequestCount"')
            foreach ($r in $rows) { $lines += (Format-CsvField $r.tenant) + ',' + [long]$r.request_count }
            $lines | Set-Content -LiteralPath (Join-Path $WorkDir '03_Top_Traffic_Tenants.csv')
            if (-not $q.Ok) {
              Add-Summary 'Top Traffic Tenants' $q.Err 'FAILED'; Add-Note ('Top Traffic Tenants FAILED: ' + $q.Err)
            } else {
              $top = (($rows | Select-Object -First 3) | ForEach-Object { $_.tenant + '=' + $_.request_count }) -join ', '
              if ($top) { Add-Summary 'Top Traffic Tenants' $top 'OK' }
              else       { Add-Summary 'Top Traffic Tenants' 'none' 'EMPTY' }
            }

      # ── STEP 6 — IS error count ───────────────────────────────────────────
      - task: AzurePowerShell@5
        displayName: 6. IS error count
        continueOnError: true
        inputs:
          azureSubscription: $(AZURE_SERVICE_CONNECTION)
          azurePowerShellVersion: LatestVersion
          pwsh: true
          ScriptType: InlineScript
          Inline: |
            . '$(libps)'
            # Seeded via seed-sample-logs.sh — mirrors ContainerLog + KubePodInventory
            # (ContainerID -> ContainerID_s, Name -> Name_s, LogEntry -> LogEntry_s).
            $q = Invoke-Kql 'PreflightContainerLog_CL
              | join kind=inner (PreflightKubePodInventory_CL | project ContainerID_s, PodName = Name_s | distinct *) on ContainerID_s
              | project TimeGenerated, LogEntry_s
              | where LogEntry_s has_cs ": ERROR"
              | summarize Count = count() by bin(TimeGenerated, 1d)
              | project Day = TimeGenerated, Count | order by Day asc'
            $rows = $q.Rows
            $lines = @('"Day","ErrorCount"')
            foreach ($r in $rows) {
              $dayVal = if ($r.Day) { $r.Day } else { $r.TimeGenerated }
              $day = [string]$dayVal; if ($day.Length -ge 10) { $day = $day.Substring(0, 10) }
              $lines += (Format-CsvField $day) + ',' + [long]$r.Count
            }
            $lines | Set-Content -LiteralPath (Join-Path $WorkDir '04_IS_Errors.csv')
            $threshold = ${{ parameters.errorCountDailyThreshold }}
            if (-not $q.Ok) {
              Add-Summary 'IS Errors' $q.Err 'FAILED'; Add-Note ('IS Errors FAILED: ' + $q.Err)
            } elseif ($rows.Count -eq 0) {
              Add-Summary 'IS Errors' 'query ran, 0 rows' 'EMPTY'
            } else {
              $peak = ($rows | ForEach-Object { [long]$_.Count } | Measure-Object -Maximum).Maximum
              $status = 'OK'
              if ($peak -gt $threshold) { $status = 'WARNING'; Add-Note ('IS errors: peak ' + $peak + '/day exceeded ' + $threshold) }
              Add-Summary 'IS Errors' ('peak ' + $peak + ' errors/day') $status
            }

      # ── STEP 7 — Top error tenants ────────────────────────────────────────
      - task: AzurePowerShell@5
        displayName: 7. Top error tenants
        continueOnError: true
        inputs:
          azureSubscription: $(AZURE_SERVICE_CONNECTION)
          azurePowerShellVersion: LatestVersion
          pwsh: true
          ScriptType: InlineScript
          Inline: |
            . '$(libps)'
            # Seeded via seed-sample-logs.sh — mirrors ContainerLog + KubePodInventory
            # (ContainerID -> ContainerID_s, Name -> Name_s, LogEntry -> LogEntry_s).
            $q = Invoke-Kql 'let paramPodNamePrefix = "wso2is-deployment";
              let errorRegex = ".*iam-cloud-.* : ERROR {.*} .*";
              PreflightContainerLog_CL
              | join kind=inner (PreflightKubePodInventory_CL | project ContainerID_s, PodName = Name_s
                  | where PodName contains paramPodNamePrefix | distinct *) on ContainerID_s
              | where LogEntry_s has_cs "ERROR"
              | where LogEntry_s matches regex errorRegex
              | where LogEntry_s !contains "Error when setting claim"
              | where LogEntry_s !contains "This password has been used in recent history. Please choose a different password"
              | where LogEntry_s !contains "JSON Web Token is issued before the allowed time."
              | project TimeGenerated, LogEntry_s
              | parse LogEntry_s with * "Tenant: [" TenantName "]" *
              | where isnotempty(TenantName)
              | summarize LogCount = count() by TenantName | top 5 by LogCount desc'
            $rows = $q.Rows
            $lines = @('"TenantName","LogCount"')
            foreach ($r in $rows) { $lines += (Format-CsvField $r.TenantName) + ',' + [long]$r.LogCount }
            $lines | Set-Content -LiteralPath (Join-Path $WorkDir '05_Top_Error_Tenants.csv')
            if (-not $q.Ok) {
              Add-Summary 'Top Error Tenants' $q.Err 'FAILED'; Add-Note ('Top Error Tenants FAILED: ' + $q.Err)
            } else {
              $top = (($rows | Select-Object -First 3) | ForEach-Object { $_.TenantName + '=' + $_.LogCount }) -join ', '
              if ($top) { Add-Summary 'Top Error Tenants' $top 'OK' }
              else       { Add-Summary 'Top Error Tenants' 'none' 'EMPTY' }
            }

      # ── STEP 8 — API latency (AzureDiagnostics) ───────────────────────────
      - task: AzurePowerShell@5
        displayName: 8. API latency
        continueOnError: true
        inputs:
          azureSubscription: $(AZURE_SERVICE_CONNECTION)
          azurePowerShellVersion: LatestVersion
          pwsh: true
          ScriptType: InlineScript
          Inline: |
            . '$(libps)'
            # Seeded via seed-sample-logs.sh — mirrors AzureDiagnostics (timeTaken_d / requestUri_s unchanged).
            $q = Invoke-Kql 'PreflightAzureDiagnostics_CL
              | where isnotnull(timeTaken_d)
              | summarize AvgSec = round(avg(timeTaken_d), 3) by Endpoint = tostring(requestUri_s)
              | where isnotempty(Endpoint)
              | top 5 by AvgSec desc'
            $rows = $q.Rows
            $lines = @('"Endpoint","AvgSeconds"')
            foreach ($r in $rows) { $lines += (Format-CsvField $r.Endpoint) + ',' + [double]$r.AvgSec }
            $lines | Set-Content -LiteralPath (Join-Path $WorkDir '06_API_Latency.csv')
            $threshold = ${{ parameters.apiLatencyThresholdSeconds }}
            if (-not $q.Ok) {
              Add-Summary 'API Latency' $q.Err 'FAILED'; Add-Note ('API Latency FAILED: ' + $q.Err)
            } elseif ($rows.Count -eq 0) {
              Add-Summary 'API Latency' 'query ran, 0 rows' 'EMPTY'
            } else {
              $max = ($rows | ForEach-Object { [double]$_.AvgSec } | Measure-Object -Maximum).Maximum
              $status = 'OK'
              if ($max -gt $threshold) { $status = 'WARNING'; Add-Note ('API latency: worst endpoint ' + $max + 's over ' + $threshold + 's') }
              Add-Summary 'API Latency' ('worst avg ' + $max + 's') $status
            }

      # ── STEP 9 — SQL DB storage ───────────────────────────────────────────
      - task: AzurePowerShell@5
        displayName: 9. SQL DB storage
        continueOnError: true
        inputs:
          azureSubscription: $(AZURE_SERVICE_CONNECTION)
          azurePowerShellVersion: LatestVersion
          pwsh: true
          ScriptType: InlineScript
          Inline: |
            . '$(libps)'
            $sqlServer = '$(sqlServer)'
            $rg        = '$(resourceGroup)'
            $warnPct   = ${{ parameters.sqlStorageWarnPercent }}
            $csvPath   = Join-Path $WorkDir '07_SQL_Storage.csv'
            $lines     = @('"Database","MaxGB","UsedPercent","Status"')
            if (-not $sqlServer) {
              $lines += '"(not configured)","","","SKIP"'
              $lines | Set-Content -LiteralPath $csvPath
              Add-Summary 'SQL Storage' 'not configured' 'SKIP'
            } else {
              $warn = $false; $n = 0
              $dbs = Get-AzSqlDatabase -ResourceGroupName $rg -ServerName $sqlServer |
                       Where-Object { $_.DatabaseName -ne 'master' }
              foreach ($db in $dbs) {
                $n++
                # database_size: currentValue (used) vs limit (max). MaxSizeBytes is the
                # limit; used bytes come from the 'storage' metric (last non-null point).
                $maxBytes  = [double]$db.MaxSizeBytes
                $usedBytes = 0.0
                try {
                  $m = Get-AzMetric -ResourceId $db.ResourceId -MetricName 'storage' -AggregationType Maximum `
                         -WarningAction SilentlyContinue -ErrorAction Stop
                  $pts = $m.Data | Where-Object { $null -ne $_.Maximum }
                  if ($pts) { $usedBytes = [double]$pts[-1].Maximum }
                } catch {}
                $gb  = $maxBytes / 1GB
                $pct = if ($maxBytes -gt 0) { $usedBytes / $maxBytes * 100 } else { 0 }
                $dbStatus = 'OK'
                if ($pct -ge $warnPct) { $dbStatus = 'ALERT'; $warn = $true }
                $lines += (Format-CsvField $db.DatabaseName) + ',' + ('{0:F2}' -f $gb) + ',' + ('{0:F1}' -f $pct) + ',' + (Format-CsvField $dbStatus)
              }
              $lines | Set-Content -LiteralPath $csvPath
              if ($warn) { Add-Note ('SQL database(s) over ' + $warnPct + '% storage') }
              $overall = if ($warn) { 'ALERT' } else { 'OK' }
              Add-Summary 'SQL Storage' ($n.ToString() + ' db(s) checked') $overall
            }

      # ── STEP 10 — Archival storage size ───────────────────────────────────
      - task: AzurePowerShell@5
        displayName: 10. Archival storage size
        continueOnError: true
        inputs:
          azureSubscription: $(AZURE_SERVICE_CONNECTION)
          azurePowerShellVersion: LatestVersion
          pwsh: true
          ScriptType: InlineScript
          Inline: |
            . '$(libps)'
            $rg      = '$(resourceGroup)'
            $csvPath = Join-Path $WorkDir '08_Archival_Storage.csv'
            $lines   = @('"StorageAccount","GiBUsed"')
            $start   = [datetime]::UtcNow.AddDays(-2)
            $n = 0
            foreach ($sa in Get-AzStorageAccount -ResourceGroupName $rg) {
              try {
                $m = Get-AzMetric -ResourceId $sa.Id -MetricName 'UsedCapacity' -AggregationType Average `
                       -StartTime $start -EndTime ([datetime]::UtcNow) -TimeGrain ([timespan]::FromHours(1)) `
                       -WarningAction SilentlyContinue -ErrorAction Stop
                $pts = $m.Data | Where-Object { $null -ne $_.Average }
                if (-not $pts) { continue }
                $bytes = [double]$pts[-1].Average
              } catch { continue }
              $n++
              $lines += (Format-CsvField $sa.StorageAccountName) + ',' + ('{0:F2}' -f ($bytes / 1GB))
            }
            $lines | Set-Content -LiteralPath $csvPath
            $status = if ($n -eq 0) { 'EMPTY' } else { 'OK' }
            Add-Summary 'Archival Storage' ($n.ToString() + ' account(s)') $status

      # ── STEP 11 — Certificate expiry ──────────────────────────────────────
      - task: AzurePowerShell@5
        displayName: 11. Certificate expiry
        continueOnError: true
        inputs:
          azureSubscription: $(AZURE_SERVICE_CONNECTION)
          azurePowerShellVersion: LatestVersion
          pwsh: true
          ScriptType: InlineScript
          Inline: |
            . '$(libps)'
            $warnDays = ${{ parameters.certExpiryWarningDays }}
            $csvPath  = Join-Path $WorkDir '09_Certificates.csv'
            $lines    = @('"Vault","Certificate","DaysRemaining","Status"')
            $now      = [datetime]::UtcNow
            $expiring = $false
            foreach ($v in Get-AzKeyVault) {
              try { $certs = Get-AzKeyVaultCertificate -VaultName $v.VaultName -ErrorAction Stop } catch { continue }
              foreach ($c in $certs) {
                if (-not $c.Expires) { continue }   # mirrors the bash `exp == null` skip
                $days = [int][math]::Truncate(($c.Expires.ToUniversalTime() - $now).TotalDays)
                $status = 'OK'
                if ($days -lt 0) { $status = 'EXPIRED' }
                elseif ($days -lt $warnDays) { $status = 'EXPIRING' }
                $lines += (Format-CsvField $v.VaultName) + ',' + (Format-CsvField $c.Name) + ',' + $days + ',' + (Format-CsvField $status)
                if ($status -ne 'OK') {
                  Add-Note ('Cert ' + $v.VaultName + '/' + $c.Name + ': ' + $status + ' (' + $days + 'd)')
                  $expiring = $true
                }
              }
            }
            $lines | Set-Content -LiteralPath $csvPath
            $status = if ($expiring) { 'WARNING' } else { 'OK' }
            Add-Summary 'Certificates' 'expiry scan' $status

      # ── STEP 12 — Weekly cost ─────────────────────────────────────────────
      #   Uses the Az PowerShell Cost Management cmdlet (Invoke-AzCostManagementQuery)
      #   instead of `az rest` — the service connection wires up the Az context, so
      #   there is no hand-rolled REST URL/body/JSON-parsing to maintain.
      - task: AzurePowerShell@5
        displayName: 12. Weekly cost
        continueOnError: true
        inputs:
          azureSubscription: $(AZURE_SERVICE_CONNECTION)
          azurePowerShellVersion: LatestVersion
          pwsh: true
          ScriptType: InlineScript
          Inline: |
            $ErrorActionPreference = 'Stop'
            . '$(libps)'   # Invoke-Kql/Add-Summary/Add-Note/Format-CsvField/Or-Zero

            $sub           = '$(subscriptionId)'
            $rg            = '$(resourceGroup)'
            $costCsv       = Join-Path $WorkDir '10_Weekly_Cost.csv'
            $costThreshold = ${{ parameters.costIncreasePercentThreshold }}

            # 10_Weekly_Cost.csv — Cost stays a bare number, matching the jq @csv rows.
            '"Scope","Period","Cost","Note"' | Set-Content -LiteralPath $costCsv
            function Add-CostRow($scope, $period, $cost, $note) {
              $c = 0.0; [double]::TryParse([string]$cost, [ref]$c) | Out-Null
              ('{0},{1},{2},{3}' -f (Format-CsvField $scope), (Format-CsvField $period), $c, (Format-CsvField $note)) |
                Add-Content -LiteralPath $costCsv
            }

            # Get-Cost <scope> <from> <to> -> @{ Out = <double|$null>; Err = '<why empty>' }.
            # An empty result says WHY it was empty — 403/permission vs "0 rows" (no
            # billed usage) vs unsupported offer — never a blanket "returned nothing".
            function Get-Cost($scope, [datetime]$from, [datetime]$to) {
              try {
                $q = Invoke-AzCostManagementQuery -Scope $scope -Type ActualCost -Timeframe Custom `
                       -TimePeriodFrom $from -TimePeriodTo $to `
                       -DatasetGranularity None `
                       -DatasetAggregation @{ totalCost = @{ name = 'Cost'; function = 'Sum' } } -ErrorAction Stop
                if ($q.Row -and $q.Row.Count -gt 0 -and $null -ne $q.Row[0][0]) {
                  return @{ Out = [double]$q.Row[0][0]; Err = '' }
                }
                return @{ Out = $null; Err = 'query ok but 0 rows (no billed usage in window)' }
              } catch {
                $msg = ($_.Exception.Message -replace '\s+', ' ').Trim()
                if (-not $msg) { $msg = 'Invoke-AzCostManagementQuery failed (empty error)' }
                if ($msg.Length -gt 200) { $msg = $msg.Substring(0, 200) }
                return @{ Out = $null; Err = $msg }
              }
            }

            # Weekly windows (UTC): this week = last 7 full days, prior = the 7 before.
            $today   = [datetime]::UtcNow.Date
            $cwEnd   = $today.AddDays(-1);  $cwStart = $today.AddDays(-8)
            $pwEnd   = $today.AddDays(-9);  $pwStart = $today.AddDays(-15)
            $cwLabel = 'This week ('  + $cwStart.ToString('yyyy-MM-dd') + '..' + $cwEnd.ToString('yyyy-MM-dd') + ')'
            $pwLabel = 'Prior week (' + $pwStart.ToString('yyyy-MM-dd') + '..' + $pwEnd.ToString('yyyy-MM-dd') + ')'

            $subScope = 'subscriptions/' + $sub
            $rgScope  = 'subscriptions/' + $sub + '/resourceGroups/' + $rg

            # ── Subscription scope ──
            $subCw = Get-Cost $subScope $cwStart $cwEnd
            $subPw = Get-Cost $subScope $pwStart $pwEnd
            Add-CostRow 'Subscription' $cwLabel (Or-Zero $subCw.Out) $subCw.Err
            Add-CostRow 'Subscription' $pwLabel (Or-Zero $subPw.Out) $subPw.Err

            # ── Resource-group scope — analysed too, to tell a subscription-level
            #    permission/scope problem apart from genuine no-data ──
            $rgCw = Get-Cost $rgScope $cwStart $cwEnd
            $rgPw = Get-Cost $rgScope $pwStart $pwEnd
            Add-CostRow ('RG ' + $rg) $cwLabel (Or-Zero $rgCw.Out) $rgCw.Err
            Add-CostRow ('RG ' + $rg) $pwLabel (Or-Zero $rgPw.Out) $rgPw.Err

            # ── Verdict: prefer subscription scope; surface the real reason on empty ──
            if ($null -ne $subCw.Out -or $null -ne $subPw.Out) {
              $c = [double](Or-Zero $subCw.Out); $p = [double](Or-Zero $subPw.Out)
              $status = 'OK'
              $result = 'this $' + ('{0:F2}' -f $c) + ' vs prior $' + ('{0:F2}' -f $p)
              if ($p -gt 0 -and ((($c - $p) / $p) * 100) -gt $costThreshold) {
                $status = 'WARNING'
                $pct = '{0:F1}' -f ((($c - $p) / $p) * 100)
                $result = $result + ' (+' + $pct + '%)'
                Add-Note ('Cost up ' + $pct + '% week-over-week')
              }
              Add-Summary 'Weekly Cost' $result $status
            }
            elseif ($null -ne $rgCw.Out -or $null -ne $rgPw.Out) {
              $rgS = '{0:F2}' -f (Or-Zero $rgCw.Out)
              Add-Summary 'Weekly Cost' ('sub scope empty (' + $subCw.Err + '); RG ' + $rg + ' = $' + $rgS) 'WARNING'
              Add-Note ('Weekly Cost: subscription scope empty (' + $subCw.Err + ') but RG ' + $rg + ' has data — this is a subscription-level scope/permission gap, not missing data.')
            }
            else {
              Add-Summary 'Weekly Cost' ('returned nothing — sub: ' + $subCw.Err + ' | rg: ' + $rgCw.Err) 'FAILED'
              Add-Note ('Weekly Cost FAILED — sub scope: ' + $subCw.Err + '; rg scope: ' + $rgCw.Err + ". If both say 403/permission, grant the SP 'Cost Management Reader'.")
            }

      # ── STEP 13 — Secure score (with list fallback) ───────────────────────
      - task: AzurePowerShell@5
        displayName: 13. Secure score
        continueOnError: true
        inputs:
          azureSubscription: $(AZURE_SERVICE_CONNECTION)
          azurePowerShellVersion: LatestVersion
          pwsh: true
          ScriptType: InlineScript
          Inline: |
            . '$(libps)'
            # Prefer the overall 'ascScore'; fall back to the first score in the list.
            $pct = $null
            try { $pct = (Get-AzSecuritySecureScore -Name 'ascScore' -ErrorAction Stop).PercentageScore }
            catch {
              try { $pct = (Get-AzSecuritySecureScore -ErrorAction Stop | Select-Object -First 1).PercentageScore } catch {}
            }
            $csvPath = Join-Path $WorkDir '11_Secure_Score.csv'
            $lines   = @('"Metric","Value"')
            if ($null -ne $pct -and "$pct" -ne '') {
              $val = '{0:F0}%' -f ([double]$pct * 100)
              $lines += '"Secure Score",' + (Format-CsvField $val)
              Add-Summary 'Secure Score' $val 'OK'
            } else {
              $lines += '"Secure Score","unavailable"'
              Add-Summary 'Secure Score' 'unavailable (Defender plan / permissions)' 'SKIP'
            }
            $lines | Set-Content -LiteralPath $csvPath

      # ── STEP 14 — AKS pods + nodes ────────────────────────────────────────
      - task: Kubernetes@1
        displayName: 14a. AKS login
        continueOnError: true
        inputs:
          connectionType: Kubernetes Service Connection
          kubernetesServiceEndpoint: $(aksServiceConnection)
          command: login
      - bash: |
          set -uo pipefail
          source "$(lib)"
          BAD=$(kubectl get pods -A --no-headers 2>/dev/null | grep -Ev 'Running|Completed' || true)
          { echo 'Namespace,Pod,Status'; [ -n "$BAD" ] && echo "$BAD" | awk 'NF{print $1","$2","$4}'; } > "$WORKDIR/12_AKS_Pods.csv"
          NODES=$(kubectl top nodes --no-headers 2>/dev/null || true)   # NAME CPU CPU% MEM MEM%
          { echo 'Node,CPUcores,CPUpct,Memory,Mempct'; [ -n "$NODES" ] && echo "$NODES" | awk 'NF{print $1","$2","$3","$4","$5}'; } > "$WORKDIR/13_AKS_Nodes.csv"
          if [ -z "$NODES" ]; then summary "AKS Pods/Nodes" "kubectl returned nothing (login failed?)" FAILED; note "AKS check FAILED — kubectl unreachable."
          elif [ -n "$BAD" ]; then summary "AKS Pods/Nodes" "unhealthy pods found" WARNING; note "Pods not Running/Completed found"
          else summary "AKS Pods/Nodes" "all pods healthy" OK; fi
        displayName: 14b. AKS pod/node check
        continueOnError: true

      # ── STEP 15 — render CSVs into one multi-sheet .xlsx report ────────────
      #   Built inline with openpyxl (installed in step 0): one sheet per CSV.
      - bash: |
          set -euo pipefail
          ls "$(workDir)"/*.csv >/dev/null 2>&1 || { echo "No CSVs — nothing to render."; exit 0; }
          mkdir -p "$(reportDir)"
          REPORT="$(reportDir)/preflight-report-$(date -u '+%Y-%m-%d-%H%M').xlsx"
          python3 - "$(workDir)" "$REPORT" <<'PY'
          import csv, glob, os, sys
          import openpyxl
          workdir, report = sys.argv[1], sys.argv[2]
          wb = openpyxl.Workbook(); wb.remove(wb.active)
          for path in sorted(glob.glob(os.path.join(workdir, "*.csv"))):
              # Sheet names: max 31 chars, no []:*?/\ — strip the numeric prefix.
              name = os.path.splitext(os.path.basename(path))[0]
              name = name.split("_", 1)[-1] if name[:2].isdigit() else name
              for ch in r'[]:*?/\\':
                  name = name.replace(ch, " ")
              ws = wb.create_sheet(name[:31] or "Sheet")
              with open(path, newline='') as f:
                  for row in csv.reader(f):
                      ws.append(row)
          wb.save(report)
          print("Wrote", report, "with", len(wb.sheetnames), "sheet(s)")
          PY
          echo "##vso[task.setvariable variable=reportPath]$REPORT"
        displayName: 15. Build .xlsx report
        condition: always()

      # ── STEP 16 — publish the .xlsx report as a pipeline artifact ─────────
      - publish: $(reportDir)
        artifact: preflight-report
        displayName: 16. Publish report artifact
        condition: always()

      # ── STEP 17 — upload the .xlsx report to blob: sa18436/preflight ──────
      - task: AzurePowerShell@5
        displayName: 17. Upload report to blob (sa18436/preflight)
        condition: always()
        inputs:
          azureSubscription: $(AZURE_SERVICE_CONNECTION)
          azurePowerShellVersion: LatestVersion
          pwsh: true
          ScriptType: InlineScript
          Inline: |
            $reportPath = $env:REPORTPATH
            if (-not $reportPath -or -not (Test-Path -LiteralPath $reportPath)) {
              Write-Host 'No .xlsx report — nothing to upload.'
            } else {
              $acct = '$(storageAccount)'; $rg = '$(resourceGroup)'; $container = '$(blobContainer)'
              $key = (Get-AzStorageAccountKey -ResourceGroupName $rg -Name $acct)[0].Value
              $ctx = New-AzStorageContext -StorageAccountName $acct -StorageAccountKey $key
              if (-not (Get-AzStorageContainer -Name $container -Context $ctx -ErrorAction SilentlyContinue)) {
                New-AzStorageContainer -Name $container -Context $ctx | Out-Null
              }
              $prefix   = 'preflight-' + [datetime]::UtcNow.ToString('yyyy-MM-dd-HHmm')
              $fileName = Split-Path -Leaf $reportPath
              Set-AzStorageBlobContent -File $reportPath -Container $container `
                -Blob ($prefix + '/' + $fileName) -Context $ctx -Force | Out-Null
              Write-Host ('Uploaded ' + $fileName + ' to ' + $acct + '/' + $container + '/' + $prefix + '/')
            }
        env:
          REPORTPATH: $(reportPath)

      # ── STEP 18 — Google Chat: threaded Card V2 "Preflight" run status ────
      #   Shows only the actual Preflight checks (Auth probe rows excluded),
      #   grouped into Checked / Needs attention / Skipped, plus a button that
      #   opens the report's blob container in the Azure portal. Posted into a
      #   stable thread so weekly runs land under one "Preflight" thread.
      - bash: |
          set -uo pipefail
          [ -z "${GCHAT_WEBHOOK_URL:-}" ] && { echo "No webhook — skipping."; exit 0; }
          # NOTE: do NOT name this GROUPS — that is a special bash array (the
          # current user's group IDs) and the assignment gets silently clobbered,
          # so $GROUPS would expand to a numeric GID and break the jq below.
          CARD_GROUPS=$(python3 - "$(workDir)/00_Summary.csv" <<'PY'
          import csv, sys, json
          g = {"passed": [], "attention": [], "skipped": []}
          with open(sys.argv[1], newline='') as f:
              r = csv.reader(f); next(r, None)
              for row in r:
                  if len(row) < 3: continue
                  check, res, st = row[0], row[1], row[2]
                  if check.startswith("Auth:"):   # infra probe, not a preflight check
                      continue
                  label = f"{check} — {res}" if res else check
                  if st in ("WARNING", "ALERT", "FAILED"): g["attention"].append(label)
                  elif st in ("SKIP", "EMPTY"):            g["skipped"].append(label)
                  else:                                     g["passed"].append(label)
          for k in g: g[k] = g[k][:30]
          print(json.dumps(g))
          PY
          )
          # Azure portal link to the report's blob container (opens in the tenant/directory).
          BLOB_URL="https://portal.azure.com/#@/resource/subscriptions/$(subscriptionId)/resourceGroups/$(resourceGroup)/providers/Microsoft.Storage/storageAccounts/$(storageAccount)/containersList"
          PAYLOAD=$(jq -n --argjson g "$CARD_GROUPS" \
            --arg ts "$(date -u '+%Y-%m-%d %H:%M UTC')" \
            --arg url "$(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)" \
            --arg blob "$BLOB_URL" '
            def sec(t; icon; items):
              if (items|length) > 0
              then {header:(t+" ("+(items|length|tostring)+")"),
                    widgets:(items|map({decoratedText:{startIcon:{materialIcon:{name:icon}},text:.}}))}
              else empty end;
            {cardsV2:[{cardId:"asgardeo-preflight",card:{
              header:{title:"Preflight",
                      subtitle:($ts+"  |  Checked:"+($g.passed|length|tostring)+"  Attention:"+($g.attention|length|tostring)+"  Skipped:"+($g.skipped|length|tostring))},
              sections:([
                sec("Needs attention";"warning";$g.attention),
                sec("Checked";"check_circle";$g.passed),
                sec("Skipped / Not applicable";"do_not_disturb_on";$g.skipped),
                {widgets:[{buttonList:{buttons:[
                  {text:"Open pipeline run",onClick:{openLink:{url:$url}}},
                  {text:"Open blob container",onClick:{openLink:{url:$blob}}}
                ]}}]}
              ])}}]}')
          # Bail loudly if the card never built — otherwise we'd POST an empty
          # body and still print "Posted", masking the real failure.
          [ -z "$PAYLOAD" ] && { echo "##[error]Card payload is empty (jq failed) — not posting."; exit 1; }
          CODE=$(curl -sS -o /tmp/gchat_resp -w '%{http_code}' -H "Content-Type: application/json" -d "$PAYLOAD" "$GCHAT_WEBHOOK_URL")
          if [ "$CODE" = "200" ]; then
            echo "Posted 'Preflight' card to Google Chat."
          else
            echo "##[error]Google Chat POST failed (HTTP $CODE): $(cat /tmp/gchat_resp)"; exit 1
          fi
        displayName: 18. Notify Google Chat
        condition: always()
        env:
          GCHAT_WEBHOOK_URL: $(GCHAT_WEBHOOK_URL)